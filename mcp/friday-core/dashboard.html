<!DOCTYPE html>
<!--
  Agent Friday Dashboard — Holographic AI Desktop
  Served by the friday-core HTTP bridge at GET /

  NOTE: index.js should serve this file at the root route:
    if (route === '/' && req.method === 'GET') {
      res.setHeader('Content-Type', 'text/html');
      const html = await fs.readFile(new URL('./dashboard.html', import.meta.url), 'utf-8');
      res.end(html);
      return;
    }
  Place this handler BEFORE the 404 fallback in the HTTP bridge request handler.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Friday</title>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js" } }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #030303; color: #e0e0e0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
         overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

  /* HUD overlay */
  #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; padding: 20px;
         display: grid; grid-template-rows: auto 1fr auto; grid-template-columns: 1fr 1fr; }
  #hud > div { pointer-events: auto; }
  .hud-label { font-size: 0.65em; text-transform: uppercase; letter-spacing: 0.12em; color: #666; margin-bottom: 2px; }
  .hud-value { font-size: 0.85em; color: #e0e0e0; }
  .hud-accent { color: #00f0ff; }
  .hud-warn { color: #ff6b35; }
  .hud-ok { color: #2ecc71; }

  /* Top left */
  .tl { grid-row: 1; grid-column: 1; }
  .tl h1 { font-size: 1.3em; font-weight: 600; color: #00f0ff; letter-spacing: 0.08em; margin-bottom: 8px; }
  .tl .meta { display: flex; flex-direction: column; gap: 4px; }

  /* Top right */
  .tr { grid-row: 1; grid-column: 2; text-align: right; }
  .tr .meta { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

  /* Bottom left */
  .bl { grid-row: 3; grid-column: 1; align-self: end; }
  .bl .meta { display: flex; flex-direction: column; gap: 4px; }

  /* Bottom right */
  .br { grid-row: 3; grid-column: 2; align-self: end; text-align: right; }
  .br .meta { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

  /* Connection indicator */
  #conn-indicator { position: fixed; top: 12px; right: 12px; z-index: 20; display: flex; align-items: center; gap: 6px; }
  #conn-dot { width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; transition: background 0.4s;
              box-shadow: 0 0 6px #2ecc7188; }
  #conn-dot.disconnected { background: #e74c3c; box-shadow: 0 0 6px #e74c3c88; }
  #conn-label { font-size: 0.65em; color: #e74c3c; display: none; letter-spacing: 0.08em; text-transform: uppercase; }
  #conn-dot.disconnected + #conn-label { display: inline; }

  /* Center bottom subsystem bar */
  #subsystems { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
                display: flex; gap: 6px; align-items: center; background: #0a0a0a99; border: 1px solid #00f0ff22;
                border-radius: 20px; padding: 8px 16px; backdrop-filter: blur(8px); }
  .sub-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.4s; }
  .sub-dot.on { background: #2ecc71; box-shadow: 0 0 6px #2ecc7188; }
  .sub-dot:hover::after { content: attr(data-name); position: absolute; bottom: 28px; left: 50%;
                          transform: translateX(-50%); font-size: 0.65em; color: #aaa; white-space: nowrap;
                          background: #111; padding: 2px 6px; border-radius: 4px; }
  .sub-dot { position: relative; cursor: pointer; }

  /* Subsystem tooltip popup */
  #sub-tooltip { position: absolute; z-index: 30; background: #0d0d1aee; border: 1px solid #00f0ff44;
                 border-radius: 8px; padding: 10px 14px; min-width: 160px; pointer-events: auto;
                 backdrop-filter: blur(8px); display: none; }
  #sub-tooltip .tt-name { font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.1em;
                          color: #00f0ff; margin-bottom: 6px; font-weight: 600; }
  #sub-tooltip .tt-row { font-size: 0.7em; color: #ccc; margin-bottom: 2px; }
  #sub-tooltip .tt-row span { color: #e0e0e0; }

  /* Memory search */
  #mem-search-wrap { position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%); z-index: 15;
                     display: flex; gap: 6px; align-items: center; }
  #mem-search { width: 260px; padding: 7px 12px; background: #0a0a0a99; border: 1px solid #00f0ff22;
                border-radius: 16px; color: #e0e0e0; font-size: 0.75em; outline: none;
                backdrop-filter: blur(8px); }
  #mem-search:focus { border-color: #00f0ff66; }
  #mem-search::placeholder { color: #555; }

  /* Memory search results panel */
  #mem-results { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); z-index: 15;
                 background: #0d0d1aee; border: 1px solid #00f0ff33; border-radius: 10px;
                 padding: 12px 16px; max-width: 420px; width: 90%; display: none;
                 backdrop-filter: blur(8px); max-height: 260px; overflow-y: auto; }
  #mem-results .mr-close { position: absolute; top: 6px; right: 10px; cursor: pointer; color: #666;
                           font-size: 0.75em; }
  #mem-results .mr-close:hover { color: #aaa; }
  #mem-results .mr-item { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #ffffff0a; }
  #mem-results .mr-item:last-child { margin-bottom: 0; border-bottom: none; }
  #mem-results .mr-content { font-size: 0.75em; color: #e0e0e0; margin-bottom: 3px; }
  #mem-results .mr-meta { font-size: 0.6em; color: #666; display: flex; gap: 10px; }
  #mem-results .mr-meta .tier { color: #00f0ff; }
  #mem-results .mr-empty { font-size: 0.75em; color: #555; font-style: italic; }

  /* 768px tablet reflow */
  @media (max-width: 768px) {
    #hud { grid-template-rows: auto auto 1fr auto auto; grid-template-columns: 1fr;
           padding: 16px; }
    .tl { grid-row: 1; grid-column: 1; }
    .tr { grid-row: 2; grid-column: 1; text-align: left; }
    .tr .meta { align-items: flex-start; }
    .bl { grid-row: 4; grid-column: 1; align-self: end; }
    .br { grid-row: 5; grid-column: 1; align-self: end; text-align: left; }
    .br .meta { align-items: flex-start; }
    #subsystems { flex-wrap: wrap; max-width: 220px; justify-content: center; }
    #mem-search { width: 200px; }
  }

  /* Passphrase gate */
  #gate { position: fixed; inset: 0; z-index: 100; background: #030303ee; display: flex;
          justify-content: center; align-items: center; transition: opacity 0.6s; }
  #gate.hidden { opacity: 0; pointer-events: none; }
  .gate-box { background: #0d0d1a; border: 1px solid #00f0ff33; border-radius: 12px;
              padding: 36px; max-width: 400px; width: 90%; }
  .gate-box h2 { color: #00f0ff; font-size: 1.2em; margin-bottom: 4px; }
  .gate-box .sub { color: #666; font-size: 0.8em; margin-bottom: 20px; }
  .gate-box input { width: 100%; padding: 11px 14px; background: #080810; border: 1px solid #333;
                    border-radius: 6px; color: #e0e0e0; font-size: 0.95em; margin-bottom: 12px; outline: none; }
  .gate-box input:focus { border-color: #00f0ff; }
  .gate-box button { width: 100%; padding: 11px; background: #00f0ff15; border: 1px solid #00f0ff55;
                     border-radius: 6px; color: #00f0ff; font-size: 0.95em; cursor: pointer; transition: background 0.2s; }
  .gate-box button:hover { background: #00f0ff25; }
  .gate-msg { margin-top: 12px; font-size: 0.8em; padding: 8px 10px; border-radius: 6px; }
  .gate-msg.err { background: #2a0a0a; border: 1px solid #5a2020; color: #ff6b6b; }
  .gate-msg.ok { background: #0a2a0a; border: 1px solid #205a20; color: #6bff6b; }

  @media (max-width: 600px) {
    #hud { padding: 12px; }
    .tl h1 { font-size: 1em; }
    .hud-value, .hud-label { font-size: 0.6em; }
    #subsystems { gap: 4px; padding: 6px 10px; }
    .sub-dot { width: 6px; height: 6px; }
    .gate-box { padding: 24px; }
  }
</style>

<script type="module">
import * as THREE from 'three';

// --- State ---
const SUBS = ['vault','identity','privacy','ollama','p2p','llm','memory','context',
              'trust','personality','agents','tools','connectors','gateway','briefing','voice','enterprise'];
const startTime = Date.now();
let vaultUnlocked = false;
let connected = false;

// --- Particle data binding state ---
let targetParticleCount = 400;
let activeParticleCount = 400;
const MAX_PARTICLES = 400;
// Per-particle tier assignment: 0=short (cyan), 1=medium (blue), 2=long (white)
const particleTiers = new Uint8Array(MAX_PARTICLES);
for (let i = 0; i < MAX_PARTICLES; i++) particleTiers[i] = 0; // default: short-term cyan

// --- Orb pulse rate state ---
let orbPulseSpeed = 2.5; // base pulse speed, driven by event count

// --- Connection indicator ---
const connDot = document.getElementById('conn-dot');

function setConnected(state) {
  connected = state;
  connDot.classList.toggle('disconnected', !state);
}

// --- Cached subsystem metrics for tooltip display ---
let cachedMetrics = {};

// --- Subsystem dots ---
const subBar = document.getElementById('subsystems');
SUBS.forEach(name => {
  const dot = document.createElement('div');
  dot.className = 'sub-dot';
  dot.dataset.name = name;
  dot.title = name;
  subBar.appendChild(dot);
});

// --- Three.js Scene ---
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x030303, 0.045);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 5, 12);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x030303);
document.body.prepend(renderer.domElement);

// Ambient light
scene.add(new THREE.AmbientLight(0x00f0ff, 0.15));

// --- Neural grid (floor plane) ---
const gridGeo = new THREE.BufferGeometry();
const gridLines = [];
const gridSize = 30, gridStep = 1.5;
for (let i = -gridSize; i <= gridSize; i += gridStep) {
  gridLines.push(-gridSize, 0, i, gridSize, 0, i);
  gridLines.push(i, 0, -gridSize, i, 0, gridSize);
}
gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridLines, 3));
const gridMat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.08 });
const grid = new THREE.LineSegments(gridGeo, gridMat);
grid.position.y = -2;
scene.add(grid);

// --- Particle field (data-bound) ---
const pGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(MAX_PARTICLES * 3);
const pVelocities = new Float32Array(MAX_PARTICLES * 3);
const pColors = new Float32Array(MAX_PARTICLES * 3);
const pAlphas = new Float32Array(MAX_PARTICLES); // per-particle alpha for fade in/out
for (let i = 0; i < MAX_PARTICLES; i++) {
  const i3 = i * 3;
  pPositions[i3]     = (Math.random() - 0.5) * 30;
  pPositions[i3 + 1] = Math.random() * 12 - 2;
  pPositions[i3 + 2] = (Math.random() - 0.5) * 30;
  pVelocities[i3]     = (Math.random() - 0.5) * 0.005;
  pVelocities[i3 + 1] = (Math.random() - 0.5) * 0.003;
  pVelocities[i3 + 2] = (Math.random() - 0.5) * 0.005;
  // Default color: cyan (short-term)
  pColors[i3] = 0; pColors[i3 + 1] = 0.94; pColors[i3 + 2] = 1;
  pAlphas[i] = 1.0;
}
pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pPositions, 3));
pGeo.setAttribute('color', new THREE.Float32BufferAttribute(pColors, 3));
const pMat = new THREE.PointsMaterial({
  size: 0.08, transparent: true, opacity: 0.7, vertexColors: true,
  sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// --- Connection lines (dynamic) ---
const MAX_CONNECTIONS = 60;
const connGeo = new THREE.BufferGeometry();
const connPositions = new Float32Array(MAX_CONNECTIONS * 6);
connGeo.setAttribute('position', new THREE.Float32BufferAttribute(connPositions, 3));
connGeo.setDrawRange(0, 0);
const connMat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.12,
                                              blending: THREE.AdditiveBlending, depthWrite: false });
const connections = new THREE.LineSegments(connGeo, connMat);
scene.add(connections);

// --- Central orb ---
const orbGeo = new THREE.SphereGeometry(0.7, 32, 32);
const orbMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.35 });
const orb = new THREE.Mesh(orbGeo, orbMat);
orb.position.set(0, 1.5, 0);
scene.add(orb);

// Orb glow shell
const glowGeo = new THREE.SphereGeometry(1.1, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.07,
                                               side: THREE.BackSide, blending: THREE.AdditiveBlending });
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.position.copy(orb.position);
scene.add(glow);

// Orb inner point light
const orbLight = new THREE.PointLight(0x00f0ff, 2, 15);
orbLight.position.copy(orb.position);
scene.add(orbLight);

/**
 * Update particle colors and visibility based on memory tier counts.
 * Assigns particles to tiers proportionally and sets colors.
 * Fades out particles beyond the target count.
 */
function updateParticleBinding(shortCount, midCount, longCount) {
  const total = shortCount + midCount + longCount;
  targetParticleCount = Math.min(total, MAX_PARTICLES);

  if (total === 0) {
    // No data yet -- keep particles with default cyan
    return;
  }

  // Proportional allocation
  const ratio = Math.min(total, MAX_PARTICLES) / total;
  const nShort = Math.round(shortCount * ratio);
  const nMid = Math.round(midCount * ratio);
  const nLong = Math.min(Math.round(longCount * ratio), MAX_PARTICLES - nShort - nMid);

  // Assign tiers and colors
  let idx = 0;
  for (let i = 0; i < nShort && idx < MAX_PARTICLES; i++, idx++) {
    particleTiers[idx] = 0;
    const i3 = idx * 3;
    pColors[i3] = 0; pColors[i3 + 1] = 0.94; pColors[i3 + 2] = 1; // cyan
  }
  for (let i = 0; i < nMid && idx < MAX_PARTICLES; i++, idx++) {
    particleTiers[idx] = 1;
    const i3 = idx * 3;
    pColors[i3] = 0.15; pColors[i3 + 1] = 0.35; pColors[i3 + 2] = 1; // blue
  }
  for (let i = 0; i < nLong && idx < MAX_PARTICLES; i++, idx++) {
    particleTiers[idx] = 2;
    const i3 = idx * 3;
    pColors[i3] = 0.9; pColors[i3 + 1] = 0.92; pColors[i3 + 2] = 1; // white
  }

  // Mark remaining as faded
  for (; idx < MAX_PARTICLES; idx++) {
    pAlphas[idx] = 0;
  }

  // Mark active as visible
  const activeCount = nShort + nMid + nLong;
  for (let i = 0; i < activeCount; i++) {
    pAlphas[i] = 1.0;
  }

  activeParticleCount = activeCount;
  pGeo.attributes.color.needsUpdate = true;
}

// --- Animation ---
function animate(time) {
  requestAnimationFrame(animate);
  const t = time * 0.001;

  // Particle drift
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < MAX_PARTICLES; i++) {
    // Fade inactive particles: move them far away
    if (pAlphas[i] <= 0 && i >= activeParticleCount) {
      const i3 = i * 3;
      pos[i3 + 1] = -100; // hide below scene
      continue;
    }

    const i3 = i * 3;
    pos[i3]     += pVelocities[i3];
    pos[i3 + 1] += pVelocities[i3 + 1];
    pos[i3 + 2] += pVelocities[i3 + 2];
    // Wrap around
    if (pos[i3] > 15) pos[i3] = -15;
    if (pos[i3] < -15) pos[i3] = 15;
    if (pos[i3 + 1] > 10) pos[i3 + 1] = -2;
    if (pos[i3 + 1] < -2) pos[i3 + 1] = 10;
    if (pos[i3 + 2] > 15) pos[i3 + 2] = -15;
    if (pos[i3 + 2] < -15) pos[i3 + 2] = 15;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Connection lines between nearby active particles
  const cp = connections.geometry.attributes.position.array;
  let ci = 0, drawn = 0;
  const threshold = 4;
  const limit = Math.min(activeParticleCount, MAX_PARTICLES);
  for (let a = 0; a < limit && drawn < MAX_CONNECTIONS; a++) {
    for (let b = a + 1; b < limit && drawn < MAX_CONNECTIONS; b++) {
      const a3 = a * 3, b3 = b * 3;
      const dx = pos[a3] - pos[b3], dy = pos[a3+1] - pos[b3+1], dz = pos[a3+2] - pos[b3+2];
      const d2 = dx*dx + dy*dy + dz*dz;
      if (d2 < threshold * threshold) {
        cp[ci++] = pos[a3]; cp[ci++] = pos[a3+1]; cp[ci++] = pos[a3+2];
        cp[ci++] = pos[b3]; cp[ci++] = pos[b3+1]; cp[ci++] = pos[b3+2];
        drawn++;
      }
    }
  }
  connections.geometry.setDrawRange(0, drawn * 2);
  connections.geometry.attributes.position.needsUpdate = true;

  // Orb pulse -- speed driven by event count
  const pulse = 1 + 0.08 * Math.sin(t * orbPulseSpeed);
  orb.scale.setScalar(pulse);
  glow.scale.setScalar(pulse * 1.6);
  orbMat.opacity = 0.3 + 0.1 * Math.sin(t * (orbPulseSpeed * 1.2));
  glowMat.opacity = 0.05 + 0.03 * Math.sin(t * (orbPulseSpeed * 0.8));
  orbLight.intensity = 1.5 + 0.8 * Math.sin(t * orbPulseSpeed);

  // Grid pulse
  gridMat.opacity = 0.06 + 0.03 * Math.sin(t * 1.2);

  // Gentle camera orbit
  camera.position.x = 12 * Math.sin(t * 0.05);
  camera.position.z = 12 * Math.cos(t * 0.05);
  camera.lookAt(0, 1, 0);

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// Resize handler
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// --- Data fetching ---
function fmt(s) { return s == null ? '--' : s; }

function uptimeStr() {
  let sec = Math.floor((Date.now() - startTime) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  const h = Math.floor(sec/3600);
  return h + 'h ' + Math.floor((sec%3600)/60) + 'm';
}

/**
 * Call an MCP tool via the HTTP bridge using POST with empty args.
 */
async function callTool(name) {
  const resp = await fetch(`/tool/${name}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ args: {} })
  });
  return resp.json();
}

async function poll() {
  document.getElementById('v-uptime').textContent = uptimeStr();

  // Vault status (GET endpoint, not a tool)
  let status = null;
  try {
    const r = await fetch('/status');
    if (r.ok) {
      status = await r.json();
      setConnected(true);
    } else {
      setConnected(false);
    }
  } catch {
    setConnected(false);
  }

  if (status) {
    const locked = status.vault !== 'unlocked';
    const el = document.getElementById('v-vault');
    el.textContent = status.vault || '--';
    el.className = 'hud-value ' + (locked ? 'hud-warn' : 'hud-ok');
    if (!locked && !vaultUnlocked) {
      vaultUnlocked = true;
      document.getElementById('gate').classList.add('hidden');
    }
    if (locked && vaultUnlocked) {
      vaultUnlocked = false;
      document.getElementById('gate').classList.remove('hidden');
    }
    if (!locked) document.getElementById('gate').classList.add('hidden');
  }

  // Subsystem stats (from registry.stats via status endpoint if available, else mark all on)
  const dots = subBar.querySelectorAll('.sub-dot');
  if (status && status.meta && status.meta.subsystems) {
    dots.forEach(d => {
      const info = status.meta.subsystems[d.dataset.name];
      d.classList.toggle('on', info ? info.started : false);
    });
  } else {
    // If no subsystem data, assume started if vault is unlocked
    dots.forEach(d => d.classList.toggle('on', vaultUnlocked));
  }

  if (!vaultUnlocked) return; // Skip tool endpoints when locked

  // Memory status (POST)
  try {
    const memRaw = await callTool('memory_status');
    // MCP tools return { content: [{ text: "..." }] } -- parse inner text
    const mem = parseMcpResult(memRaw);
    if (mem && mem.tiers) {
      const shortCount = mem.tiers.shortTerm || 0;
      const midCount = mem.tiers.mediumTerm || 0;
      const longCount = mem.tiers.longTerm || 0;
      document.getElementById('v-mem-short').textContent = shortCount;
      document.getElementById('v-mem-mid').textContent = midCount;
      document.getElementById('v-mem-long').textContent = longCount;
      // Bind to particles
      updateParticleBinding(shortCount, midCount, longCount);
      // Cache for tooltip
      cachedMetrics.memory = { shortTerm: shortCount, mediumTerm: midCount, longTerm: longCount };
    }
  } catch { /* memory not available */ }

  // Trust graph (POST)
  try {
    const trustRaw = await callTool('trust_graph_status');
    const trust = parseMcpResult(trustRaw);
    if (trust) {
      const personCount = trust.personCount ?? trust.persons ?? 0;
      const avg = trust.averageTrust ?? trust.avg_trust;
      document.getElementById('v-trust-persons').textContent = fmt(personCount);
      document.getElementById('v-trust-avg').textContent = avg != null ? Number(avg).toFixed(2) : '--';
      // Cache for tooltip
      cachedMetrics.trust = { personCount, avgScore: avg != null ? Number(avg).toFixed(2) : '--' };
    }
  } catch { /* trust not available */ }

  // Ollama (POST)
  try {
    const ollamaRaw = await callTool('ollama_status');
    const ollama = parseMcpResult(ollamaRaw);
    if (ollama) {
      const el = document.getElementById('v-ollama');
      const healthy = ollama.healthy || ollama.status === 'healthy';
      const modelInfo = ollama.models != null
        ? (Array.isArray(ollama.models) ? ollama.models.length + ' models' : ollama.models + ' models')
        : '';
      el.textContent = (healthy ? 'healthy' : 'offline') + (modelInfo ? ' / ' + modelInfo : '');
      el.className = 'hud-value ' + (healthy ? 'hud-ok' : 'hud-warn');
    }
  } catch { /* ollama not available */ }

  // P2P peers (POST)
  try {
    const peersRaw = await callTool('peer_list');
    const peers = parseMcpResult(peersRaw);
    if (peers) {
      const channels = peers.channels;
      const count = Array.isArray(channels) ? channels.length : (peers.count || 0);
      document.getElementById('v-peers').textContent = count + ' connected';
    }
  } catch { /* peers not available */ }

  // Context snapshot for orb pulse rate (POST)
  try {
    const ctxRaw = await callTool('context_snapshot');
    const ctx = parseMcpResult(ctxRaw);
    if (ctx && ctx.recentEvents) {
      const eventCount = Array.isArray(ctx.recentEvents) ? ctx.recentEvents.length : 0;
      // Map event count to pulse speed: 0 events = 1.5, 50+ events = 6.0
      orbPulseSpeed = 1.5 + Math.min(eventCount / 50, 1) * 4.5;
    }
  } catch { /* context not available */ }

  // Personality status for tooltip (POST)
  try {
    const pRaw = await callTool('personality_status');
    const p = parseMcpResult(pRaw);
    if (p) {
      cachedMetrics.personality = { mode: p.mode || '--', challengeLevel: p.challengeLevel ?? p.challenge_level ?? '--' };
    }
  } catch { /* personality not available */ }

  // Connectors status for tooltip (POST)
  try {
    const cRaw = await callTool('connector_status');
    const c = parseMcpResult(cRaw);
    if (c) {
      cachedMetrics.connectors = { detected: c.detected || c.connectors || [] };
    }
  } catch { /* connectors not available */ }
}

/**
 * Parse MCP tool result. Tools return { content: [{ type: 'text', text: '...' }] }.
 * The inner text is JSON-stringified data.
 */
function parseMcpResult(raw) {
  if (!raw) return null;
  // Direct data (from GET fallback or already parsed)
  if (raw.content && Array.isArray(raw.content)) {
    const textBlock = raw.content.find(c => c.type === 'text');
    if (textBlock && textBlock.text) {
      try { return JSON.parse(textBlock.text); } catch { return null; }
    }
  }
  // Already a plain object (from old-style GET responses)
  return raw;
}

// Poll immediately, then every 5 seconds
poll();
setInterval(poll, 5000);

// --- Passphrase gate ---
document.getElementById('gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pp = document.getElementById('gate-pp').value;
  const btn = document.getElementById('gate-btn');
  const msg = document.getElementById('gate-msg');
  btn.disabled = true;
  btn.textContent = 'Deriving keys...';
  msg.style.display = 'none';
  try {
    const resp = await fetch('/unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passphrase: pp })
    });
    const data = await resp.json();
    if (data.success) {
      msg.className = 'gate-msg ok';
      msg.textContent = 'Vault unlocked.';
      msg.style.display = 'block';
      vaultUnlocked = true;
      setTimeout(() => document.getElementById('gate').classList.add('hidden'), 600);
      poll();
    } else {
      msg.className = 'gate-msg err';
      msg.textContent = data.error || 'Unlock failed';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Unlock Vault';
    }
  } catch (err) {
    msg.className = 'gate-msg err';
    msg.textContent = err.message;
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Unlock Vault';
  }
  document.getElementById('gate-pp').value = '';
});

// --- Clickable subsystem dot tooltips ---
const tooltip = document.getElementById('sub-tooltip');
const ttName = tooltip.querySelector('.tt-name');
const ttBody = tooltip.querySelector('.tt-body');
let tooltipTimer = null;

function buildTooltipContent(name) {
  const isOn = document.querySelector(`.sub-dot[data-name="${name}"]`)?.classList.contains('on');
  const statusText = isOn ? 'running' : 'stopped';

  if (name === 'memory' && cachedMetrics.memory) {
    const m = cachedMetrics.memory;
    return `<div class="tt-row">Short-term: <span>${m.shortTerm}</span></div>` +
           `<div class="tt-row">Medium-term: <span>${m.mediumTerm}</span></div>` +
           `<div class="tt-row">Long-term: <span>${m.longTerm}</span></div>`;
  }
  if (name === 'trust' && cachedMetrics.trust) {
    const t = cachedMetrics.trust;
    return `<div class="tt-row">Persons: <span>${t.personCount}</span></div>` +
           `<div class="tt-row">Avg score: <span>${t.avgScore}</span></div>`;
  }
  if (name === 'personality' && cachedMetrics.personality) {
    const p = cachedMetrics.personality;
    return `<div class="tt-row">Mode: <span>${p.mode}</span></div>` +
           `<div class="tt-row">Challenge: <span>${p.challengeLevel}</span></div>`;
  }
  if (name === 'connectors' && cachedMetrics.connectors) {
    const c = cachedMetrics.connectors;
    const list = Array.isArray(c.detected) && c.detected.length > 0
      ? c.detected.join(', ')
      : 'none';
    return `<div class="tt-row">Detected: <span>${list}</span></div>`;
  }
  return `<div class="tt-row">Status: <span>${statusText}</span></div>`;
}

function showTooltip(dot) {
  const name = dot.dataset.name;
  ttName.textContent = name;
  ttBody.innerHTML = buildTooltipContent(name);

  // Position near the dot
  const rect = dot.getBoundingClientRect();
  tooltip.style.left = (rect.left + rect.width / 2) + 'px';
  tooltip.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
  tooltip.style.transform = 'translateX(-50%)';
  tooltip.style.display = 'block';

  // Auto-dismiss after 5 seconds
  if (tooltipTimer) clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(hideTooltip, 5000);
}

function hideTooltip() {
  tooltip.style.display = 'none';
  if (tooltipTimer) { clearTimeout(tooltipTimer); tooltipTimer = null; }
}

subBar.addEventListener('click', (e) => {
  const dot = e.target.closest('.sub-dot');
  if (dot) {
    showTooltip(dot);
    e.stopPropagation();
  }
});

// Click outside tooltip to dismiss
document.addEventListener('click', (e) => {
  if (!tooltip.contains(e.target) && !e.target.closest('.sub-dot')) {
    hideTooltip();
  }
});

// --- Memory search ---
const memSearchInput = document.getElementById('mem-search');
const memResultsPanel = document.getElementById('mem-results');
const mrBody = document.getElementById('mr-body');
const mrClose = memResultsPanel.querySelector('.mr-close');

memSearchInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const query = memSearchInput.value.trim();
  if (!query || !vaultUnlocked) return;

  mrBody.innerHTML = '<div class="mr-empty">Searching...</div>';
  memResultsPanel.style.display = 'block';

  try {
    const resp = await fetch('/tool/memory_recall', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ args: { query, limit: 5 } })
    });
    const raw = await resp.json();
    const data = parseMcpResult(raw);
    const results = data?.results || data?.memories || (Array.isArray(data) ? data : []);

    if (results.length === 0) {
      mrBody.innerHTML = '<div class="mr-empty">No results found.</div>';
    } else {
      mrBody.innerHTML = results.map(r => {
        const content = r.content || r.text || JSON.stringify(r);
        const tier = r.tier || '--';
        const recency = r.timestamp ? new Date(r.timestamp).toLocaleString() : (r.recency || '--');
        return `<div class="mr-item">` +
               `<div class="mr-content">${escHtml(content.slice(0, 200))}</div>` +
               `<div class="mr-meta"><span class="tier">${tier}</span><span>${recency}</span></div>` +
               `</div>`;
      }).join('');
    }
  } catch (err) {
    mrBody.innerHTML = `<div class="mr-empty">Error: ${escHtml(err.message)}</div>`;
  }
});

mrClose.addEventListener('click', () => { memResultsPanel.style.display = 'none'; });

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
