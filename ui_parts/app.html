function FWin({id,title,emoji,children,onClose,zIndex,onFocus}){

  const dOff=useRef({x:0,y:0});const rStart=useRef({x:0,y:0,w:0,h:0});
  useEffect(()=>{if(!dragging)return;const mv=e=>setPos({x:Math.max(0,e.clientX-dOff.current.x),y:Math.max(0,e.clientY-dOff.current.y)});const up=()=>setDragging(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[dragging]);
  useEffect(()=>{if(!resizing)return;const mv=e=>setSize({w:Math.max(400,rStart.current.w+e.clientX-rStart.current.x),h:Math.max(280,rStart.current.h+e.clientY-rStart.current.y)});const up=()=>setResizing(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[resizing]);
  return(<div className="fwin" style={{left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex}} onClick={onFocus}>
    <div className="fwin-bar" onMouseDown={e=>{if(e.target.closest('.fwin-btns'))return;setDragging(true);dOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y};onFocus()}}>

}

  const[chatOpen,setChatOpen]=useState(false);const[chatMsgs,setChatMsgs]=useState([]);const[chatIn,setChatIn]=useState('');const[chatLoad,setChatLoad]=useState(false);
  const[clock,setClock]=useState(new Date());const[notifs,setNotifs]=useState([]);
  const chatEnd=useRef(null);
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{fetch('/api/chat/history').then(r=>r.json()).then(d=>{if(d.messages)setChatMsgs(d.messages)}).catch(()=>{})},[]);
  useEffect(()=>{fetch('/api/notifications').then(r=>r.json()).then(d=>setNotifs(d.items||[])).catch(()=>{});const iv=setInterval(()=>{fetch('/api/notifications').then(r=>r.json()).then(d=>setNotifs(d.items||[])).catch(()=>{})},30000);return()=>clearInterval(iv)},[]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'})},[chatMsgs]);
  const toggle=id=>{setOpenWins(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});bringFront(id)};
  const close=id=>setOpenWins(p=>{const n=new Set(p);n.delete(id);return n});
  const bringFront=id=>{setFocusWin(id);setZC(c=>{setZMap(m=>({...m,[id]:c}));return c+1})};
  const sendChat=async()=>{if(!chatIn.trim())return;const m=chatIn.trim();setChatIn('');setChatMsgs(p=>[...p,{role:'user',text:m,time:new Date().toLocaleTimeString()}]);setChatLoad(true);
    try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m})});const d=await r.json();setChatMsgs(p=>[...p,{role:'friday',text:d.response,time:new Date().toLocaleTimeString()}])}catch(e){setChatMsgs(p=>[...p,{role:'friday',text:'[Error]',time:new Date().toLocaleTimeString()}])}setChatLoad(false)};
  const wsMap={home:<HomeWS/>,career:<CareerWS/>,wiki:<WikiWS/>,coparent:<CoparentWS/>,futurespeak:<FuturespeakWS/>,family:<FamilyWS/>,studio:<StudioWS/>,trust:<TrustWS/>,system:<SystemWS/>,code:<CodeWS/>,news:<NewsWS/>};
  const wsInfo=WS.reduce((a,w)=>{a[w.id]=w;return a},{});
  const unread=notifs.filter(n=>!n.read).length;
  return(<>
    <div className="top-bar">
      <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontFamily:'Orbitron',fontWeight:900,fontSize:16,color:'#00d4ff'}}>FRIDAY</span><span style={{color:'rgba(124,58,237,0.4)'}}>|</span><span style={{fontFamily:'Orbitron',fontSize:10,color:'rgba(124,58,237,0.5)',letterSpacing:'.08em'}}>FutureSpeak.AI</span></div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#555'}}>{clock.toLocaleTimeString('en-US',{hour12:false})}</span>
        <button onClick={()=>{}} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:14,position:'relative'}}>🔔{unread>0&&<span style={{position:'absolute',top:-4,right:-4,width:14,height:14,borderRadius:'50%',background:'#ff0080',fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{unread}</span>}</button>
        <button onClick={()=>setChatOpen(!chatOpen)} style={{background:'none',border:'none',color:chatOpen?'#00d4ff':'#555',cursor:'pointer',fontSize:14}}>💬</button>
        <div style={{width:7,height:7,borderRadius:'50%',background:'#00ff80'}}/>
      </div>
    </div>
    {[...openWins].map(id=>{const w=wsInfo[id];if(!w)return null;return(<FWin key={id} id={id} title={w.label} emoji={w.ico} zIndex={zMap[id]||41} onClose={()=>close(id)} onFocus={()=>bringFront(id)}>{wsMap[id]||<div>Coming soon</div>}</FWin>)})}
    <div className={`chat-panel ${chatOpen?'open':''}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>FRIDAY CHAT</span>
        <button onClick={()=>setChatOpen(false)} style={{background:'none',border:'none',color:'#555',cursor:'pointer'}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:12}}>
        {chatMsgs.length===0&&<div style={{textAlign:'center',color:'#444',fontSize:12,marginTop:30}}>Talk to Friday...</div>}
        {chatMsgs.map((m,i)=><div key={i} style={{textAlign:m.role==='user'?'right':'left',marginBottom:8}}>
          <div style={{display:'inline-block',maxWidth:'80%',padding:'7px 11px',borderRadius:8,fontSize:12,background:m.role==='user'?'rgba(124,58,237,0.12)':'rgba(255,255,255,0.03)',color:m.role==='user'?'#b794f6':'#bbb'}}>{m.text}</div>
          <div style={{fontSize:9,color:'#444',marginTop:1}}>{m.role==='user'?'You':'Friday'} · {m.time}</div>
        </div>)}
        {chatLoad&&<div style={{fontSize:11,color:'#00d4ff'}}>Friday is thinking...</div>}
        <div ref={chatEnd}/>
      </div>
      <div style={{padding:10,borderTop:'1px solid rgba(255,255,255,0.04)'}}>
        <div style={{display:'flex',gap:6}}><input className="input" style={{flex:1}} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendChat()} placeholder="Talk to Friday..."/><button className="btn" onClick={sendChat}>Send</button></div>
      </div>
    </div>
    <div className="dock">{WS.map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''}`} onClick={()=>toggle(w.id)}><span className="ico">{w.ico}</span><span>{w.label}</span><span className="dot"/></button>)}</div>
  </>);
}
ReactDOM.createRoot(document.getElementById('ui-root')).render(<App/>);
</script>
</body>
</html>
