// ═══ FRIDAY-DOC — branded markdown renderer ═══
// Single source of truth for rendering any markdown/plain-text content inside
// Friday's UI. Prefers marked.js (loaded via CDN in head.html) and falls back
// to a tiny regex parser if marked isn't ready yet. Output is always wrapped
// in .friday-doc so the holographic CSS in head.html takes over.
function fridayEscapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fridayFallbackMd(md){
  const lines=String(md||'').replace(/\r\n/g,'\n').split('\n');
  let html='',inCode=false,codeBuf=[],inList=null,listBuf=[];
  const flushList=()=>{if(inList){html+='<'+inList+'>'+listBuf.join('')+'</'+inList+'>';listBuf=[];inList=null}};
  const inline=(t)=>fridayEscapeHtml(t)
    .replace(/`([^`]+)`/g,(_,c)=>'<code>'+c+'</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  for(const raw of lines){
    if(/^```/.test(raw)){if(inCode){html+='<pre><code>'+fridayEscapeHtml(codeBuf.join('\n'))+'</code></pre>';codeBuf=[];inCode=false}else{flushList();inCode=true}continue;}
    if(inCode){codeBuf.push(raw);continue;}
    const h=raw.match(/^(#{1,6})\s+(.*)$/);
    if(h){flushList();html+='<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>';continue;}
    if(/^\s*[-*]\s+/.test(raw)){if(inList!=='ul'){flushList();inList='ul'}listBuf.push('<li>'+inline(raw.replace(/^\s*[-*]\s+/,''))+'</li>');continue;}
    if(/^\s*\d+\.\s+/.test(raw)){if(inList!=='ol'){flushList();inList='ol'}listBuf.push('<li>'+inline(raw.replace(/^\s*\d+\.\s+/,''))+'</li>');continue;}
    if(/^>\s?/.test(raw)){flushList();html+='<blockquote>'+inline(raw.replace(/^>\s?/,''))+'</blockquote>';continue;}
    if(/^\s*---+\s*$/.test(raw)){flushList();html+='<hr/>';continue;}
    if(raw.trim()===''){flushList();continue;}
    flushList();html+='<p>'+inline(raw)+'</p>';
  }
  flushList();
  if(inCode)html+='<pre><code>'+fridayEscapeHtml(codeBuf.join('\n'))+'</code></pre>';
  return html;
}
function renderFridayMarkdown(mdText,opts){
  const compact=!!(opts&&opts.compact);
  const src=mdText==null?'':String(mdText);
  if(!src.trim())return'<div class="friday-doc'+(compact?' compact':'')+'"></div>';
  if(/^\s*<(?:!DOCTYPE|html|head|body)\b/i.test(src))return src;
  let body;
  try{
    if(typeof marked!=='undefined'&&marked&&typeof marked.parse==='function'){
      body=marked.parse(src,{breaks:true,gfm:true});
    }else{
      body=fridayFallbackMd(src);
    }
  }catch(e){body=fridayFallbackMd(src);}
  body=body.replace(/<a\s+(?![^>]*\btarget=)([^>]*)>/gi,'<a target="_blank" rel="noopener" $1>');
  return'<div class="friday-doc'+(compact?' compact':'')+'">'+body+'</div>';
}
if(typeof window!=='undefined'){window.renderFridayMarkdown=renderFridayMarkdown;}

function FridayDoc({text,compact,style,className}){
  const html=renderFridayMarkdown(text||'',{compact:!!compact});
  return <div className={className} style={style} dangerouslySetInnerHTML={{__html:html}}/>;
}

function FWin({id,title,emoji,children,onClose,zIndex,onFocus}){
  const[pos,setPos]=useState({x:60+Math.random()*300,y:40+Math.random()*80});
  const[size,setSize]=useState({w:660,h:460});
  const[dragging,setDragging]=useState(false);const[resizing,setResizing]=useState(false);
  const dOff=useRef({x:0,y:0});const rStart=useRef({x:0,y:0,w:0,h:0});
  useEffect(()=>{if(!dragging)return;const mv=e=>setPos({x:Math.max(0,e.clientX-dOff.current.x),y:Math.max(30,e.clientY-dOff.current.y)});const up=()=>setDragging(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[dragging]);
  useEffect(()=>{if(!resizing)return;const mv=e=>setSize({w:Math.max(400,rStart.current.w+e.clientX-rStart.current.x),h:Math.max(280,rStart.current.h+e.clientY-rStart.current.y)});const up=()=>setResizing(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[resizing]);
  return(<div className="fwin" style={{left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex}} onClick={onFocus}>
    <div className="fwin-bar" onMouseDown={e=>{if(e.target.closest('.fwin-btns'))return;setDragging(true);dOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y};onFocus()}}>
      <span className="fwin-title">{emoji} {title}</span><div className="fwin-btns"><button onClick={onClose}>×</button></div>
    </div><div className="fwin-body">{children}</div>
    <div className="resize-h" onMouseDown={e=>{e.stopPropagation();setResizing(true);rStart.current={x:e.clientX,y:e.clientY,w:size.w,h:size.h};onFocus()}}/>
  </div>);
}

// ═══ COMMAND PALETTE (Ctrl+K) ═══
function CommandPalette({onClose,onOpenWs,openWins}){
  const[q,setQ]=useState('');
  const[sel,setSel]=useState(0);
  const[contacts,setContacts]=useState([]);
  const[routines,setRoutines]=useState([]);
  const inputRef=useRef(null);

  useEffect(()=>{inputRef.current?.focus()},[]);
  useEffect(()=>{
    fetch('/api/contacts').then(r=>r.json()).then(d=>setContacts(d.contacts||d.items||[])).catch(()=>{});
    fetch('/api/routines').then(r=>r.json()).then(d=>setRoutines(d.routines||d.items||[])).catch(()=>{});
  },[]);

  const query=q.trim().toLowerCase();
  const wsResults=WS.filter(w=>!query||w.label.toLowerCase().includes(query)||w.id.includes(query))
    .map(w=>({kind:'ws',id:w.id,ico:w.ico,label:w.label,meta:openWins.has(w.id)?'open':'open workspace'}));
  const contactResults=(query?contacts.filter(c=>(c.name||c.label||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(c=>({kind:'contact',id:c.id||c.name,ico:'👤',label:c.name||c.label,meta:c.email||c.role||'contact'}));
  const routineResults=(query?routines.filter(r=>(r.label||r.name||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(r=>({kind:'routine',id:r.id,ico:'⚡',label:r.label||r.name,meta:r.schedule||r.category||'routine'}));
  const sections=[
    {title:'Workspaces',items:wsResults},
    {title:'Contacts',items:contactResults},
    {title:'Routines',items:routineResults},
  ].filter(s=>s.items.length>0);
  const flat=sections.flatMap(s=>s.items);
  useEffect(()=>{setSel(0)},[q]);

  const activate=(item)=>{
    if(!item)return;
    if(item.kind==='ws')onOpenWs(item.id);
    else if(item.kind==='routine'){
      fetch(`/api/routines/${item.id}/run`,{method:'POST'}).catch(()=>{});
      onClose();
    }else if(item.kind==='contact'){
      onOpenWs('contacts');
    }
  };

  const onKey=(e)=>{
    if(e.key==='Escape'){e.preventDefault();onClose()}
    else if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(flat.length-1,s+1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(0,s-1))}
    else if(e.key==='Enter'){e.preventDefault();activate(flat[sel])}
  };

  return(<div className="cmd-palette-overlay" onClick={onClose}>
    <div className="cmd-palette" onClick={e=>e.stopPropagation()} onKeyDown={onKey}>
      <input ref={inputRef} className="cmd-palette-input" placeholder="Search workspaces, contacts, routines…"
        value={q} onChange={e=>setQ(e.target.value)}/>
      <div className="cmd-palette-results">
        {flat.length===0&&<div className="cmd-palette-empty">No matches</div>}
        {(()=>{let idx=-1;return sections.map(s=>(<div key={s.title}>
          <div className="cmd-palette-section">{s.title}</div>
          {s.items.map(it=>{idx++;const i=idx;return(
            <div key={`${it.kind}-${it.id}`} className={`cmd-palette-item ${i===sel?'selected':''}`}
              onMouseEnter={()=>setSel(i)} onClick={()=>activate(it)}>
              <span className="ico">{it.ico}</span>
              <span>{it.label}</span>
              <span className="meta">{it.meta}</span>
            </div>
          )})}
        </div>))})()}
      </div>
    </div>
  </div>);
}

// ═══ SEND-TO DROPDOWN (Data Flow) ═══
function SendTo({content,personName,eventId,emailThreadId,dataType,options}){
  const[open,setOpen]=useState(false);const[status,setStatus]=useState(null);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[open]);
  const defaultOpts=[
    {label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},
    {label:'Save to Trust Graph',dest:'trust_graph',ico:'🔗',needsPerson:true},
    {label:'Send to Calendar',dest:'calendar_notes',ico:'📅',needsEvent:true},
    {label:'Add to Briefing',dest:'briefing',ico:'📰'},
    {label:'Draft Email',dest:'gmail_draft',ico:'✉️'},
  ];
  const opts=(options||defaultOpts).filter(o=>{
    if(o.needsPerson&&!personName)return false;
    if(o.needsEvent&&!eventId)return false;
    return true;
  });
  const send=async(dest)=>{
    setStatus('sending');setOpen(false);
    try{
      const r=await fetch('/api/flow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        data_type:dataType||'general',content:typeof content==='function'?content():content,
        metadata:{person_name:personName||'',event_id:eventId||'',email_thread_id:emailThreadId||''},
        destinations:[dest]
      })});
      const d=await r.json();
      const ok=d.results&&d.results[0]&&d.results[0].ok;
      setStatus(ok?'ok':'fail');
    }catch(e){setStatus('fail')}
    setTimeout(()=>setStatus(null),2000);
  };
  if(opts.length===0)return null;
  return(<div ref={ref} style={{position:'relative',display:'inline-block'}}>
    <button onClick={e=>{e.stopPropagation();setOpen(!open)}} style={{background:'none',border:'1px solid rgba(0,212,255,0.15)',borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:status==='ok'?'#00ff80':status==='fail'?'#ff0080':'#00d4ff',transition:'color .2s'}} title="Send to...">{status==='ok'?'✓':status==='fail'?'✗':status==='sending'?'⏳':'📤'}</button>
    {open&&<div style={{position:'absolute',right:0,top:'100%',marginTop:4,background:'rgba(10,10,18,0.95)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:6,padding:4,minWidth:160,zIndex:9999,backdropFilter:'blur(12px)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
      {opts.map((o,i)=><div key={i} onClick={()=>send(o.dest)} style={{padding:'6px 10px',fontSize:11,color:'#ccc',cursor:'pointer',borderRadius:4,display:'flex',alignItems:'center',gap:6,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,212,255,0.08)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}><span>{o.ico}</span><span>{o.label}</span></div>)}
    </div>}
  </div>);
}

function OutreachPanel(){

function DraftWS(){
  const[mode,setMode]=useState('freeform');
  const[prompt,setPrompt]=useState('');
  const[context,setContext]=useState('');
  const[showCtx,setShowCtx]=useState(false);
  const[draft,setDraft]=useState('');
  const[loading,setLoading]=useState(false);
  const[copied,setCopied]=useState(false);
  const[history,setHistory]=useState([]);
  const[charCount,setCharCount]=useState(0);
  const[taskId,setTaskId]=useState(null);
  const[editing,setEditing]=useState(false);
  const pollRef=useRef(null);

  useEffect(()=>{
    if(!taskId)return;
    pollRef.current=setInterval(async()=>{
      try{
        const r=await fetch('/api/tasks/'+taskId);
        const t=await r.json();
        if(t.status==='complete'){
          clearInterval(pollRef.current);setTaskId(null);setLoading(false);
          const txt=t.result||'';
          setDraft(txt);setCharCount(txt.length);
          setHistory(h=>[{mode,prompt:prompt.substring(0,60),draft:txt,time:new Date().toLocaleTimeString()},...h].slice(0,20));
        }else if(t.status==='failed'){
          clearInterval(pollRef.current);setTaskId(null);setLoading(false);
          setDraft('[Error] '+(t.result||'Generation failed'));
        }
      }catch(e){clearInterval(pollRef.current);setTaskId(null);setLoading(false);setDraft('[Error] '+e.message)}
    },1500);
    return()=>clearInterval(pollRef.current);
  },[taskId]);

  const generate=async()=>{
    if(!prompt.trim()||loading)return;
    setLoading(true);setCopied(false);setDraft('');
    try{
      const r=await fetch('/api/draft',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({mode,prompt,context:showCtx?context:''})});
      const d=await r.json();
      if(d.status==='queued'&&d.task_id){
        setTaskId(d.task_id);
      }else if(d.status==='ok'){
        setDraft(d.draft);setCharCount(d.char_count||d.draft.length);
        setHistory(h=>[{mode,prompt:prompt.substring(0,60),draft:d.draft,time:new Date().toLocaleTimeString()},...h].slice(0,20));
        setLoading(false);
      }else{setDraft('[Error] '+(d.message||'Generation failed'));setLoading(false)}
    }catch(e){setDraft('[Error] '+e.message);setLoading(false)}
  };

  const deploy=async(dest)=>{
    if(!draft)return;
    setCopied(false);
    try{
      const r=await fetch('/api/draft/deploy',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:draft,destination:dest})});
      const d=await r.json();
      if(d.status==='ok'&&dest==='clipboard'){setCopied(true);setTimeout(()=>setCopied(false),2000)}
    }catch(e){console.error('Deploy error:',e)}
  };

  return(<div>
    <FridaySays text="Draft engine ready. Pick a mode, describe what you need, and generate."/>
    {/* Mode selector */}
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
      {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(mode===m.id?'':'btn-magenta')}
        style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setMode(m.id)}>
        {m.ico} {m.label}
      </button>)}
    </div>

    {/* Prompt input */}
    <textarea className="input" style={{width:'100%',height:60,resize:'vertical',marginBottom:8,fontFamily:'JetBrains Mono',fontSize:12}}
      value={prompt} onChange={e=>setPrompt(e.target.value)}
      onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)generate()}}
      placeholder={mode==='linkedin_post'?'Write a LinkedIn post about...':mode==='email_reply'?'Reply to this email saying...':mode==='tweet'?'Tweet about...':mode==='ofw_response'?'Respond to this OFW message...':'Describe what to write...'}/>

    {/* Context toggle */}
    <div style={{marginBottom:8}}>
      <button className="btn" style={{fontSize:11,padding:'2px 8px',marginRight:6}} onClick={()=>setShowCtx(!showCtx)}>
        {showCtx?'Hide Context':'+ Context'}
      </button>
      {showCtx&&<textarea className="input" style={{width:'100%',height:50,resize:'vertical',marginTop:4,fontSize:11}}
        value={context} onChange={e=>setContext(e.target.value)}
        placeholder="Paste the message you're replying to, or describe what you're looking at..."/>}
    </div>

    {/* Actions */}
    <div style={{display:'flex',gap:4,marginBottom:12}}>
      <button className="btn" onClick={generate} disabled={loading} style={{fontWeight:600}}>
        {loading?'Generating...':'Generate'}
      </button>
      {draft&&<button className="btn" onClick={generate} disabled={loading} style={{fontSize:11}}>Regenerate</button>}
    </div>

    {/* Draft output */}
    {draft&&<div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>DRAFT OUTPUT</span>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:mode==='tweet'&&charCount>280?'#ff0080':'#555'}}>
            {charCount} chars{mode==='tweet'&&charCount>280?' ⚠️ over limit':''}
          </span>
          <button className="btn" style={{fontSize:11,padding:'1px 6px'}} onClick={()=>setEditing(!editing)}>
            {editing?'Preview':'Edit'}
          </button>
        </div>
      </div>
      {editing
        ?<textarea className="input" style={{width:'100%',minHeight:120,resize:'vertical',fontFamily:'JetBrains Mono',fontSize:12,lineHeight:1.6,color:'#e0e0e8'}}
            value={draft} onChange={e=>{setDraft(e.target.value);setCharCount(e.target.value.length)}}/>
        :<DraftPreview text={draft}/>
      }
      <div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
        <button className="btn" onClick={()=>deploy('clipboard')} style={{fontWeight:600}}>
          {copied?'✓ Copied!':'📋 Copy'}
        </button>
        <button className="btn" onClick={()=>openDraftTab(draft,mode,prompt)} style={{fontSize:11}}>
          🔗 New Tab
        </button>
        <button className="btn btn-magenta" onClick={()=>deploy('gmail_draft')} style={{fontSize:11}}>
          📧 Gmail
        </button>
      </div>
    </div>}

    {/* History */}
    {history.length>0&&<div>
      <div style={{fontFamily:'Orbitron',fontSize:11,color:'#999',marginBottom:6}}>RECENT DRAFTS</div>
      {history.map((h,i)=><div key={i} className="card" style={{marginBottom:4,cursor:'pointer',padding:'6px 10px'}}
        onClick={()=>{setDraft(h.draft);setCharCount(h.draft.length);setMode(h.mode)}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
          <span style={{color:'#aaa'}}>{DRAFT_MODES.find(m=>m.id===h.mode)?.ico||'📝'} {h.prompt}...</span>
          <span style={{color:'#999'}}>{h.time}</span>
        </div>
      </div>)}
    </div>}
  </div>);
}

// ═══ CAMERA MODE ═══
// Source can be 'screen' | 'webcam' | 'both'. Captures a JPEG frame from each
// active stream every `intervalSec` seconds and stashes it on window.fridayCamera
// so chat sends and the Live-API bridge can pick it up.
function CameraMode({source,intervalSec,onClose,frameRef,setSendIndicator,facing,onChangeFacing}){
  const screenVideoRef=useRef(null);
  const webcamVideoRef=useRef(null);
  const screenStreamRef=useRef(null);
  const webcamStreamRef=useRef(null);
  const captureCanvasRef=useRef(null);
  const captureTimerRef=useRef(null);
  const[screenErr,setScreenErr]=useState('');
  const[webcamErr,setWebcamErr]=useState('');
  const[pos,setPos]=useState({x:window.innerWidth-180,y:window.innerHeight-160});
  const[dragging,setDragging]=useState(false);
  const dragOff=useRef({x:0,y:0});

  // Acquire / release streams whenever source or facing changes.
  // Cleanup only flips a cancellation flag; the body itself stops streams we
  // no longer want. Stopping all streams on every re-run would cause repeat
  // permission prompts when the user flips the front/rear webcam toggle.
  useEffect(()=>{
    let cancelled=false;
    const stopStream=(streamRef)=>{try{streamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){};streamRef.current=null};
    const wantScreen=source==='screen'||source==='both';
    const wantWebcam=source==='webcam'||source==='both';
    (async()=>{
      if(wantScreen&&!screenStreamRef.current){
        try{
          const s=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:15},audio:false});
          if(cancelled){s.getTracks().forEach(t=>t.stop());return}
          screenStreamRef.current=s;
          if(screenVideoRef.current){screenVideoRef.current.srcObject=s;screenVideoRef.current.play().catch(()=>{})}
          s.getVideoTracks()[0]?.addEventListener('ended',()=>{stopStream(screenStreamRef);if(!cancelled)onClose()});
          setScreenErr('');
        }catch(e){setScreenErr(e.name||'denied');if(source==='screen')onClose()}
      }
      if(!wantScreen&&screenStreamRef.current)stopStream(screenStreamRef);
      if(wantWebcam){
        const cur=webcamStreamRef.current;
        const curFacing=cur?.getVideoTracks?.()[0]?.getSettings?.()?.facingMode;
        if(!cur||(facing&&curFacing&&curFacing!==facing)){
          stopStream(webcamStreamRef);
          try{
            const constraints={video:facing?{facingMode:{ideal:facing}}:true,audio:false};
            const w=await navigator.mediaDevices.getUserMedia(constraints);
            if(cancelled){w.getTracks().forEach(t=>t.stop());return}
            webcamStreamRef.current=w;
            if(webcamVideoRef.current){webcamVideoRef.current.srcObject=w;webcamVideoRef.current.play().catch(()=>{})}
            setWebcamErr('');
          }catch(e){setWebcamErr(e.name||'denied');if(source==='webcam')onClose()}
        }
      }
      if(!wantWebcam&&webcamStreamRef.current)stopStream(webcamStreamRef);
    })();
    return()=>{cancelled=true};
  },[source,facing]);
  // Stop all streams on unmount.
  useEffect(()=>()=>{
    try{screenStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
    try{webcamStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
  },[]);

  // Frame capture loop.
  useEffect(()=>{
    if(!captureCanvasRef.current)captureCanvasRef.current=document.createElement('canvas');
    const grab=(video)=>{
      if(!video||video.readyState<2||!video.videoWidth)return null;
      const c=captureCanvasRef.current;c.width=Math.min(640,video.videoWidth);c.height=Math.round(c.width*video.videoHeight/video.videoWidth);
      const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);
      try{return c.toDataURL('image/jpeg',0.7).split(',')[1]}catch(e){return null}
    };
    const tick=()=>{
      const screen=grab(screenVideoRef.current);
      const webcam=grab(webcamVideoRef.current);
      const primary=screen||webcam;
      if(primary){frameRef.current={screen,webcam,primary,ts:Date.now()};setSendIndicator(true);setTimeout(()=>setSendIndicator(false),400)}
    };
    const ms=Math.max(500,(intervalSec||3)*1000);
    captureTimerRef.current=setInterval(tick,ms);
    setTimeout(tick,400); // first frame quickly
    return()=>{if(captureTimerRef.current)clearInterval(captureTimerRef.current)};
  },[intervalSec,source,facing]);

  // Drag handlers — keep PiP inside the viewport.
  useEffect(()=>{if(!dragging)return;
    const mv=e=>setPos(p=>{const x=Math.max(4,Math.min(window.innerWidth-164,e.clientX-dragOff.current.x));const y=Math.max(44,Math.min(window.innerHeight-124,e.clientY-dragOff.current.y));return{x,y}});
    const up=()=>setDragging(false);
    addEventListener('mousemove',mv);addEventListener('mouseup',up);
    return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)};
  },[dragging]);

  const showScreen=source==='screen'||source==='both';
  const showWebcam=source==='webcam'||source==='both';
  const isBoth=source==='both';

  const pip=(refKey,label,err,extraStyle)=>(<div className={`camera-pip ${dragging?'dragging':''}`}
      style={{left:pos.x+extraStyle.dx,top:pos.y+extraStyle.dy,width:isBoth?120:160,height:isBoth?90:120}}
      onMouseDown={e=>{setDragging(true);dragOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y}}}>
    {refKey==='screen'?<video ref={screenVideoRef} muted playsInline/>:<video ref={webcamVideoRef} muted playsInline/>}
    <span className="cam-label">{label}</span>
    {refKey==='webcam'&&onChangeFacing&&<button className="cam-close" style={{right:30,padding:'1px 6px'}} title="Flip camera"
      onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onChangeFacing()}}>⇄</button>}
    <button className="cam-close" onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onClose()}} title="Stop camera">×</button>
    <span className="cam-active"><span className="pulse"/>LIVE</span>
    {err&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',color:'#ff4d6a',fontSize:11,fontFamily:'JetBrains Mono'}}>{err}</div>}
  </div>);

  return(<>{showScreen&&pip('screen','SCREEN',screenErr,{dx:0,dy:0})}{showWebcam&&pip('webcam','WEBCAM',webcamErr,{dx:isBoth?-130:0,dy:0})}</>);
}

// ═══ TASK TRAY (background task runner UI) ═══
function fmtElapsed(sec){if(sec==null)return'0s';const s=Math.floor(sec);if(s<60)return s+'s';const m=Math.floor(s/60);const r=s%60;if(m<60)return m+'m '+r+'s';const h=Math.floor(m/60);return h+'h '+(m%60)+'m'}
function TaskCard({task,expanded,onToggle,onCancel,onView}){
  const status=task.status||'running';
  return(<div className={'task-card '+status}>
    <div className="task-card-edge"/>
    <div className="task-card-row">
      <div style={{flex:1,minWidth:0,cursor:'pointer'}}
        role="button" tabIndex={0}
        onClick={onToggle}
        onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onToggle()}}}
        title={expanded?'Click to collapse':'Click to expand log'}
        aria-expanded={expanded}>
        <div className="task-card-title">{task.name||'Task'}</div>
        {task.description&&<div className="task-card-sub">{task.description}</div>}
      </div>
      <div className="task-card-actions">
        <button className="task-card-btn" onClick={e=>{e.stopPropagation();onToggle()}} title={expanded?'Collapse':'Expand'} aria-label={expanded?'Collapse task log':'Expand task log'}>{expanded?'▾':'▸'}</button>
        {status==='running'&&<button className="task-card-btn cancel" onClick={e=>{e.stopPropagation();onCancel()}} title="Cancel" aria-label="Cancel task">✕</button>}
      </div>
    </div>
    <div className="task-card-meta">
      <span className="task-card-status">
        {status==='running'&&<><span className="task-card-spinner"/>EXECUTING</>}
        {status==='complete'&&<><span className="task-card-check">✓</span>COMPLETE{task.evaluation&&<span style={{marginLeft:6,fontSize:'0.75em',opacity:0.7}}>{(task.evaluation.match(/GRADE:\s*(\w+)/)||[])[1]||''}</span>}</>}
        {status==='completed_unverified'&&<><span style={{color:'#f59e0b',fontWeight:700}}>⚠</span>UNVERIFIED</>}
        {status==='failed'&&<><span style={{color:'#ff0080',fontWeight:700}}>✕</span>FAILED</>}
      </span>
      <span className="task-card-elapsed">{fmtElapsed(task.elapsed)}</span>
    </div>
    {(status==='complete'||status==='completed_unverified')&&<div style={{marginTop:6,display:'flex',gap:4}}>
      <button className="task-card-btn results" onClick={onView}>View Results</button>
    </div>}
    {expanded&&<div className="task-card-log">
      {(task.log||[]).length===0?<div className="task-card-log-line" style={{color:'#888'}}>— waiting for activity —</div>:
        (task.log||[]).slice(-30).map((line,i)=><div key={i} className="task-card-log-line">→ {line}</div>)}
    </div>}
  </div>);
}
function TaskTray({tasks,onCancel,onView}){
  const[expanded,setExpanded]=useState({});
  const[collapsed,setCollapsed]=useState(false);
  const sorted=[...tasks].sort((a,b)=>(b.created||0)-(a.created||0));
  const running=sorted.filter(t=>(t.status||'running')==='running').length;
  const total=sorted.length;
  if(total===0)return null;
  if(collapsed){
    return(<div className="task-tray-pill" onClick={()=>setCollapsed(false)}>
      {running>0?<><span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#f59e0b',marginRight:6,verticalAlign:'middle',boxShadow:'0 0 5px rgba(245,158,11,0.7)'}}/>{running} task{running===1?'':'s'} running</>:total+' task'+(total===1?'':'s')}
    </div>);
  }
  return(<div className="task-tray">
    <div className="task-tray-header">
      <span>{running>0?`${running}/${total} TASKS · LIVE`:`${total} TASKS`}</span>
      <button className="task-card-btn" style={{padding:'1px 6px'}} onClick={()=>setCollapsed(true)} title="Collapse">_</button>
    </div>
    {sorted.slice(0,8).map(t=><TaskCard key={t.task_id} task={t}
      expanded={!!expanded[t.task_id]}
      onToggle={()=>setExpanded(e=>({...e,[t.task_id]:!e[t.task_id]}))}
      onCancel={()=>onCancel(t.task_id)}
      onView={()=>onView(t)}/>)}
  </div>);
}

    if(settingsOpen||chatOpen||quickDraft||paletteOpen||notifOpen){
      setTopBarHidden(false);
      if(topBarTimer.current){clearTimeout(topBarTimer.current);topBarTimer.current=null;}
      setModelMenuOpen(false);
    }
  },[settingsOpen,chatOpen,quickDraft,paletteOpen,notifOpen]);

  // Anchor notif dropdown below bell + close on outside click / Escape
  useEffect(()=>{
    if(!notifOpen)return;
    if(bellRef.current){
      const r=bellRef.current.getBoundingClientRect();
      setNotifAnchor({top:r.bottom+8,right:Math.max(8,window.innerWidth-r.right-4)});
    }
    const onDown=(e)=>{
      if(notifPanelRef.current&&notifPanelRef.current.contains(e.target))return;
      if(bellRef.current&&bellRef.current.contains(e.target))return;
      setNotifOpen(false);
    };
    const onKey=(e)=>{if(e.key==='Escape')setNotifOpen(false)};
    document.addEventListener('mousedown',onDown);
    document.addEventListener('keydown',onKey);
    return()=>{document.removeEventListener('mousedown',onDown);document.removeEventListener('keydown',onKey)};
  },[notifOpen]);

  // Settings panel: Escape closes (outside click handled via the slide-out itself + dedicated × button)
  useEffect(()=>{
    if(!settingsOpen)return;
    const onKey=(e)=>{if(e.key==='Escape')setSettingsOpen(false)};
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[settingsOpen]);
  // Audio device popup: outside-click close
  useEffect(()=>{
    if(!audioDevicePopup)return;
    const h=(e)=>{
      if(audioDevicePopupRef.current&&audioDevicePopupRef.current.contains(e.target))return;
      if(e.target.closest('[data-audio-device-toggle]'))return;
      setAudioDevicePopup(false);
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[audioDevicePopup]);
  // Quick Draft popup: Escape + outside-click close
  const quickDraftRef=useRef(null);
  useEffect(()=>{
    if(!quickDraft)return;
    const onDown=(e)=>{
      if(quickDraftRef.current&&quickDraftRef.current.contains(e.target))return;
      // Avoid stealing clicks aimed at the top-bar ✍️ toggle button itself
      if(e.target.closest&&e.target.closest('[title="Quick Draft"]'))return;
      setQuickDraft(false);
    };
    const onKey=(e)=>{if(e.key==='Escape')setQuickDraft(false)};
    document.addEventListener('mousedown',onDown);
    document.addEventListener('keydown',onKey);
    return()=>{document.removeEventListener('mousedown',onDown);document.removeEventListener('keydown',onKey)};
  },[quickDraft]);

  const toggle=id=>{setOpenWins(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});bringFront(id)};
  const close=id=>setOpenWins(p=>{const n=new Set(p);n.delete(id);return n});
  const bringFront=id=>{setFocusWin(id);setZC(c=>{setZMap(m=>({...m,[id]:c}));return c+1})};

  // ─── Camera Mode ────────────────────────────────────────────
  const[cameraOn,setCameraOn]=useState(false);
  const[cameraSource,setCameraSource]=useState('screen');     // 'screen' | 'webcam' | 'both'
  const[cameraFacing,setCameraFacing]=useState('user');       // 'user' | 'environment'
  const[cameraIntervalSec,setCameraIntervalSec]=useState(3);
  const[cameraAutoDescribe,setCameraAutoDescribe]=useState(false);
  const[cameraControlsOpen,setCameraControlsOpen]=useState(false);
  const[cameraSendIndicator,setCameraSendIndicator]=useState(false);
  const cameraFrameRef=useRef(null);
  // Expose latest frame so external code (e.g. friday_live.html voice mode) can pull it.
  useEffect(()=>{window.fridayCamera={latestFrame:()=>cameraFrameRef.current,isOn:()=>cameraOn,source:()=>cameraSource,intervalSec:()=>cameraIntervalSec}},[cameraOn,cameraSource,cameraIntervalSec]);
  // Persist camera prefs through /api/settings (interval + auto-describe).
  useEffect(()=>{if(typeof agentSettings.camera_interval_sec==='number')setCameraIntervalSec(agentSettings.camera_interval_sec);if(typeof agentSettings.camera_auto_describe==='boolean')setCameraAutoDescribe(agentSettings.camera_auto_describe)},[agentSettings.camera_interval_sec,agentSettings.camera_auto_describe]);
  const toggleCamera=()=>{if(cameraOn){setCameraOn(false);setCameraControlsOpen(false);cameraFrameRef.current=null}else{setCameraOn(true);setCameraControlsOpen(true)}};

  const sendChat=async(overrideMsg)=>{const m=(overrideMsg||chatIn).trim();if(!m)return;setChatIn('');setChatMsgs(p=>[...p,{role:'user',text:m,time:new Date().toLocaleTimeString()}]);setChatLoad(true);
    try{
      const body={message:m,voice_mode:voiceOn};
      if(focusWin)body.workspace=focusWin;
      const frame=cameraOn?cameraFrameRef.current?.primary:null;
      if(frame)body.image=frame;
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      setChatMsgs(p=>[...p,{role:'friday',text:d.response,time:new Date().toLocaleTimeString()}])
    }catch(e){setChatMsgs(p=>[...p,{role:'friday',text:'[Connection error]',time:new Date().toLocaleTimeString()}])}
    setChatLoad(false)
  };
  const sendPrompt=()=>{if(!promptText.trim())return;setChatOpen(true);sendChat(promptText);setPromptText('')};

  const wsMap={home:<HomeWS/>,career:<CareerWS/>,wiki:<WikiWS/>,coparent:<CoparentWS/>,futurespeak:<FuturespeakWS/>,family:<FamilyWS/>,studio:<StudioWS/>,trust:<TrustWS/>,system:<SystemWS/>,code:<CodeWS/>,news:<NewsWS/>,draft:<DraftWS/>,finance:<FinanceWS/>,health:<HealthWS/>,contacts:<ContactsWS/>,content:<ContentWS/>};
  const wsInfo=WS.reduce((a,w)=>{a[w.id]=w;return a},{});
  const unread=notifs.filter(n=>!n.read).length;
  const runningTaskCount=bgTasks.filter(t=>(t.status||'running')==='running').length;
  const bellBadgeCount=runningTaskCount>0?runningTaskCount:unread;
  const sortedBgTasks=[...bgTasks].sort((a,b)=>(b.created||0)-(a.created||0));
  const noWindows=openWins.size===0;

  const structures=window.fridayVibe?.getStructures?.()??[];
  const moods=window.fridayVibe?.getMoods?.()??['LISTENING','REASONING','EXECUTING','EXCITED','CALM'];

  return(<>
    {/* ── Setup Wizard (first-run) ── */}
    {!setupDone&&<SetupWizard
      step={wizStep}
      data={wizData}
      onChange={patch=>setWizData(d=>({...d,...patch}))}
      onNext={()=>setWizStep(s=>Math.min(s+1,WIZARD_STEPS.length-1))}
      onBack={()=>setWizStep(s=>Math.max(s-1,0))}
      onComplete={completeWizard}
    />}
    {/* Top Bar */}
    <div className={`top-bar ${topBarHidden?'hidden':''}`}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{display:'flex',alignItems:'baseline',gap:5,lineHeight:1}}>
          <span onClick={()=>toggle('system')} style={{fontFamily:'Orbitron',fontWeight:900,fontSize:15,color:'#00d4ff',cursor:'pointer',userSelect:'none',letterSpacing:'0.06em',textShadow:'0 0 14px rgba(0,212,255,0.45)',transition:'text-shadow .2s'}} title="Open System workspace">{agentSettings.agent_name||'AGENT FRIDAY'}</span>
          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'rgba(255,255,255,0.72)',letterSpacing:'0.04em',marginLeft:4,textShadow:'0 0 6px rgba(0,0,0,0.8)'}}>by</span>
          <a href="https://futurespeak.ai/agent-friday-live" target="_blank" rel="noopener noreferrer"
            style={{fontFamily:'Orbitron',fontWeight:900,fontSize:15,color:'#f59e0b',textDecoration:'none',letterSpacing:'0.06em',transition:'color .2s,text-shadow .2s',textShadow:'0 0 14px rgba(245,158,11,0.55)'}}
            onMouseEnter={e=>{e.currentTarget.style.color='#fbbf24';e.currentTarget.style.textShadow='0 0 18px rgba(245,158,11,0.85)'}}
            onMouseLeave={e=>{e.currentTarget.style.color='#f59e0b';e.currentTarget.style.textShadow='0 0 14px rgba(245,158,11,0.55)'}}>
            FutureSpeak.AI
          </a>
        </div>
        <span aria-hidden="true" style={{color:'rgba(255,255,255,0.28)',fontSize:13,userSelect:'none'}}>|</span>
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(255,255,255,0.72)',letterSpacing:'.05em',textShadow:'0 0 6px rgba(0,0,0,0.8)'}}>{structureName}</span>
        <span aria-hidden="true" style={{color:'rgba(255,255,255,0.28)',fontSize:13,userSelect:'none'}}>|</span>
        {/* Model selector pill — click to open dropdown */}
        <div ref={modelMenuRef} style={{position:'relative'}}>
          <button onClick={()=>setModelMenuOpen(o=>!o)}
            style={{background:'rgba(0,0,0,0.35)',border:'1px solid rgba(255,255,255,0.18)',borderRadius:10,padding:'3px 9px',cursor:'pointer',fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(255,255,255,0.88)',display:'flex',alignItems:'center',gap:6,transition:'border-color .2s,background .2s'}}
            title="Model selection — click to swap orchestrator / subagent / creative / voice models"
            aria-label="Model selection">
            <span className="dot active" style={{width:6,height:6}}/>
            {orchModel.short} · {creativeModel.short}
            <span style={{fontSize:10,opacity:0.85}} aria-hidden="true">▾</span>
          </button>
          {modelMenuOpen&&<div style={{position:'absolute',top:'calc(100% + 6px)',left:0,width:320,background:'rgba(10,14,26,0.75)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:10,zIndex:200,padding:'10px 0',boxShadow:'0 4px 30px rgba(0,0,0,0.3)',fontFamily:'Inter',fontSize:11}}>
            {[
              {label:'Orchestrator',subtitle:'Main agent brain',key:'orchestrator_model',models:ORCHESTRATOR_MODELS},
              {label:'Subagent',subtitle:'Background tasks & drafts',key:'subagent_model',models:SUBAGENT_MODELS},
              {label:'Creative',subtitle:'Images, voice, vision',key:'creative_model',models:CREATIVE_MODELS},
              {label:'Voice',subtitle:'Live audio',key:'voice_model',models:VOICE_MODELS},
            ].map(cat=>(
              <div key={cat.key} style={{padding:'6px 12px 8px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}>
                  <span style={{fontFamily:'Orbitron',fontSize:10,color:'#00d4ff',letterSpacing:'0.08em'}}>{cat.label}</span>
                  <span style={{fontSize:9,color:'rgba(255,255,255,0.4)'}}>{cat.subtitle}</span>
                </div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {cat.models.map(m=>(
                    <button key={m.id}
                      onClick={()=>{saveAgentSettings({[cat.key]:m.id})}}
                      style={{background:agentSettings[cat.key]===m.id?'rgba(0,212,255,0.15)':'rgba(255,255,255,0.04)',border:'1px solid '+(agentSettings[cat.key]===m.id?'rgba(0,212,255,0.5)':'rgba(255,255,255,0.1)'),borderRadius:5,padding:'3px 8px',cursor:'pointer',color:agentSettings[cat.key]===m.id?'#00d4ff':'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',transition:'all .15s'}}>
                      {m.label}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>{clock.toLocaleTimeString('en-US',{hour12:false})}</span>
        <button ref={bellRef} onClick={()=>{setNotifOpen(o=>!o);if(!notifOpen){setSettingsOpen(false);setChatOpen(false);setQuickDraft(false)}}}
          style={{background:'none',border:'none',color:notifOpen?'#00d4ff':'#ddd',cursor:'pointer',fontSize:14,position:'relative'}}
          title={runningTaskCount>0?`${runningTaskCount} task${runningTaskCount===1?'':'s'} running`:'Notifications'}
          aria-label={runningTaskCount>0?`${runningTaskCount} tasks running, open notifications`:'Open notifications'}>
          <span style={{fontSize:13}}>&#x1F514;</span>
          {bellBadgeCount>0&&<span className={runningTaskCount>0?'bell-badge-pulse':''}
            style={{position:'absolute',top:-4,right:-4,minWidth:14,height:14,padding:'0 3px',borderRadius:7,background:runningTaskCount>0?'#f59e0b':'#ff0080',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#0a0a0f',fontWeight:700,fontFamily:'Orbitron'}}>{bellBadgeCount}</span>}
        </button>
        <button onClick={()=>{setQuickDraft(!quickDraft);if(!quickDraft){setChatOpen(false);setSettingsOpen(false)}}}
          style={{background:'none',border:'none',color:quickDraft?'#00d4ff':'#bbb',cursor:'pointer',fontSize:14}}
          title="Quick Draft" aria-label="Open Quick Draft">
          <span style={{fontSize:13}}>&#x270D;&#xFE0F;</span>
        </button>
        <button onClick={()=>{setChatOpen(!chatOpen);if(!chatOpen){setSettingsOpen(false);setQuickDraft(false)}}}
          style={{background:'none',border:'none',color:chatOpen?'#00d4ff':'#bbb',cursor:'pointer',fontSize:14}}
          title={chatOpen?'Close chat':'Open chat with Friday'}
          aria-label={chatOpen?'Close chat':'Open chat with Friday'}>
          <span style={{fontSize:13}}>&#x1F4AC;</span>
        </button>
        <button onClick={()=>{if(cameraOn){setCameraControlsOpen(o=>!o)}else{toggleCamera()}}}
          onContextMenu={e=>{e.preventDefault();if(cameraOn){toggleCamera()}else{toggleCamera();}}}
          style={{background:'none',border:'none',color:cameraOn?'#00d4ff':'#bbb',cursor:'pointer',fontSize:14,filter:cameraOn?'drop-shadow(0 0 6px rgba(0,212,255,0.6))':'none'}}
          title={cameraOn?'Camera ON — click for controls (right-click to stop)':'Camera Mode'}
          aria-label={cameraOn?'Camera on, open controls':'Enable camera mode'}>
          <span>&#x1F4F7;</span>{cameraOn&&cameraSendIndicator&&<span style={{position:'relative',top:-6,marginLeft:-4,fontSize:10,color:'#00d4ff'}}>&#x1F441;</span>}
        </button>
        {ccGranted&&<span className="cc-indicator" title="Computer control ACTIVE — Friday can move your mouse and type. Press Ctrl+Shift+Q or click STOP to terminate."><span className="cc-dot"/><span>CC LIVE</span></span>}
        <button onClick={()=>{setSettingsOpen(!settingsOpen);if(!settingsOpen)setChatOpen(false)}}
          style={{background:'none',border:'none',color:settingsOpen?'#00d4ff':'#bbb',cursor:'pointer',fontSize:15}}
          title="Settings" aria-label="Open settings">
          <span>&#x2699;</span>
        </button>
        {/* Connection status text indicator (top-right) */}
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,fontWeight:600,letterSpacing:'0.06em',color:connHealth==='ok'?'#00ff80':connHealth==='degraded'?'#f59e0b':connHealth==='down'?'#ff0080':'#888',transition:'color .3s',textShadow:'0 0 6px rgba(0,0,0,0.8)'}}
          title={connHealth==='ok'?'Connected':connHealth==='degraded'?'Degraded — server returned a non-OK status':connHealth==='down'?'Disconnected — cannot reach /api/health':'Checking…'}>
          {connHealth==='ok'?'● LIVE':connHealth==='degraded'?'● DEGRADED':connHealth==='down'?'○ DOWN':'○ —'}
        </span>
      </div>
    </div>

    {/* Floating Kill Switch — visible whenever computer control is active */}
    {ccGranted&&<button className="kill-switch" onClick={killSwitch} title="STOP — terminate all computer control immediately (Ctrl+Shift+Q)">
      <span className="ks-icon">&#x26D4;</span>STOP
    </button>}

    {/* Calm Default State — greeting with ticker */}
    {noWindows&&<div style={{position:'fixed',inset:0,zIndex:5,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      {/* Radial dark backdrop — wider + more opaque so greeting reads against any scene state */}
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-52%)',width:720,height:360,borderRadius:'50%',background:'radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.65) 40%, rgba(0,0,0,0.28) 65%, transparent 100%)',pointerEvents:'none',zIndex:0}}/>
      <div style={{position:'relative',zIndex:1,fontFamily:'Orbitron',fontSize:26,color:'rgba(0,212,255,0.98)',marginBottom:12,animation:'fadeIn 1s ease',letterSpacing:'0.06em',textShadow:'0 0 12px rgba(0,0,0,0.95), 0 0 32px rgba(0,212,255,0.35), 0 2px 4px rgba(0,0,0,0.85)'}}>{getGreeting()}, Stephen.</div>
      {countdowns.length>0&&<div className="greeting-ticker" style={{marginBottom:28,position:'relative',zIndex:1}}>
        {countdowns.map((c,i)=><React.Fragment key={i}>
          {i>0&&<span className="greeting-ticker-sep"/>}
          <span className="greeting-ticker-item">
            <span>{c.emoji||''} {c.label||c.name}</span>
            <span className="days">{c.days||c.days_until}d</span>
          </span>
        </React.Fragment>)}
      </div>}
      {countdowns.length===0&&<div style={{position:'relative',zIndex:1,fontFamily:'JetBrains Mono',fontSize:12,color:'rgba(255,255,255,0.78)',marginBottom:28,textShadow:'0 1px 3px rgba(0,0,0,0.85)'}}>All systems nominal.</div>}
      <div style={{position:'relative',zIndex:1,pointerEvents:'auto',display:'flex',gap:8,alignItems:'center'}}>
        <input value={promptText} onChange={e=>setPromptText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendPrompt()}
          placeholder="Ask Friday anything..."
          style={{width:360,background:'rgba(10,14,26,0.75)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:24,padding:'10px 20px',color:'#f0f0f8',fontSize:13,outline:'none',fontFamily:'Inter',transition:'border-color .2s',boxShadow:'0 4px 30px rgba(0,0,0,0.3)'}}/>
        <button onClick={()=>{if(promptText.trim())sendPrompt();else{setChatOpen(true);toggleVoice()}}}
          title={promptText.trim()?'Send message':'Open chat and start voice mode'}
          style={{width:40,height:40,borderRadius:'50%',background:'rgba(0,212,255,0.18)',border:'1px solid rgba(0,212,255,0.4)',color:'#00d4ff',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(0,0,0,0.5)'}}>&#x1F3A4;</button>
      </div>
    </div>}

    {/* Camera Mode — PiP previews + control popover */}
    {cameraOn&&<CameraMode source={cameraSource} intervalSec={cameraIntervalSec}
      frameRef={cameraFrameRef} setSendIndicator={setCameraSendIndicator}
      facing={cameraSource==='screen'?null:cameraFacing}
      onChangeFacing={()=>setCameraFacing(f=>f==='user'?'environment':'user')}
      onClose={()=>{setCameraOn(false);setCameraControlsOpen(false);cameraFrameRef.current=null}}/>}
    {cameraOn&&cameraControlsOpen&&<div className="camera-control-panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>CAMERA MODE</span>
        <button onClick={()=>setCameraControlsOpen(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer',fontSize:13}}>&#x2715;</button>
      </div>
      <div style={{fontSize:11,color:'rgba(255,255,255,0.8)',marginTop:4}}>Source</div>
      <div className="row">
        {['screen','webcam','both'].map(s=>
          <button key={s} className={`src-btn ${cameraSource===s?'active':''}`} onClick={()=>setCameraSource(s)}>{s}</button>
        )}
      </div>
      {(cameraSource==='webcam'||cameraSource==='both')&&<div style={{marginTop:8,display:'flex',gap:6,alignItems:'center',fontSize:11,color:'rgba(255,255,255,0.6)'}}>
        <span>Facing</span>
        <button className={`src-btn ${cameraFacing==='user'?'active':''}`} style={{flex:1}} onClick={()=>setCameraFacing('user')}>front</button>
        <button className={`src-btn ${cameraFacing==='environment'?'active':''}`} style={{flex:1}} onClick={()=>setCameraFacing('environment')}>rear</button>
      </div>}
      <div className="camera-privacy-banner"><span className="pulse"/>Camera is active</div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8,fontSize:11,color:'rgba(255,255,255,0.8)',fontFamily:'JetBrains Mono'}}>
        <span>Frame every {cameraIntervalSec}s</span>
        <button className="src-btn" style={{padding:'4px 10px'}} onClick={()=>{setCameraOn(false);setCameraControlsOpen(false);cameraFrameRef.current=null}}>Stop</button>
      </div>
    </div>}

    {/* Floating Windows */}
    {[...openWins].map(id=>{const w=wsInfo[id];if(!w)return null;return(<FWin key={id} id={id} title={w.label} emoji={w.ico} zIndex={zMap[id]||41} onClose={()=>close(id)} onFocus={()=>bringFront(id)}><Safe name={w.label}>{wsMap[id]||<div>Coming soon</div>}</Safe></FWin>)})}

    {/* Chat Panel */}
    <div className={`chat-panel ${chatOpen?'open':''}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>FRIDAY CHAT</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>{setChatMsgs([]);fetch('/api/chat/clear',{method:'POST'}).catch(()=>{})}} title="Start a new conversation (pinned messages preserved)" style={{background:'rgba(0,212,255,0.06)',border:'1px solid rgba(0,212,255,0.2)',color:'#00d4ff',cursor:'pointer',fontSize:11,padding:'3px 8px',borderRadius:4,fontFamily:'Inter'}}>+ New Chat</button>
          <button onClick={()=>setChatOpen(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer'}}>&#x2715;</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:12}}>
        {chatMsgs.length===0&&<div style={{textAlign:'center',color:'#888',fontSize:12,marginTop:30}}>Talk to Friday. Type, speak, or drop a file.</div>}
        {chatMsgs.map((m,i)=><div key={i} style={{textAlign:m.role==='user'?'right':'left',marginBottom:8}}>
          <div style={{display:'inline-flex',alignItems:'flex-start',gap:4,maxWidth:'80%',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{padding:'7px 11px',borderRadius:8,fontSize:12,background:m.role==='user'?'rgba(124,58,237,0.12)':'rgba(255,255,255,0.03)',color:m.role==='user'?'#b794f6':'#bbb'}}>
              {m.role==='friday'&&m.via!=='voice'
                ?<div dangerouslySetInnerHTML={{__html:renderFridayMarkdown(m.text||'',{compact:true})}}/>
                :m.text}
            </div>
            {m.role!=='user'&&<SendTo content={m.text} dataType="general" options={[{label:'Copy to Clipboard',dest:'clipboard',ico:'📋'}]}/>}
          </div>
          <div style={{fontSize:11,color:'#888',marginTop:1}}>
            {m.role==='user'?'You':'Friday'} · {m.time||''}
            {m.via==='voice'&&<span style={{marginLeft:6,padding:'1px 5px',borderRadius:3,background:'rgba(0,212,255,0.12)',border:'1px solid rgba(0,212,255,0.3)',color:'#00d4ff',fontSize:9,letterSpacing:'0.05em'}}>🎤 VOICE</span>}
          </div>
        </div>)}
        {chatLoad&&<div className="typing-indicator"><span className="label">Friday is thinking</span><span className="dot"/><span className="dot"/><span className="dot"/></div>}
        <div ref={chatEnd}/>
      </div>

            <div className="settings-subtitle">Camera &amp; Vision</div>
            <div className="settings-toggle" onClick={toggleCamera} style={{paddingTop:0}}>
              <span className="settings-toggle-label">Enable camera (screen / webcam capture)</span>
              <div className={`settings-toggle-switch ${cameraOn?'on':''}`}/>
            </div>
            {cameraOn&&<div className="camera-privacy-banner" style={{marginBottom:8}}><span className="pulse"/>Camera is active</div>}
            <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',marginTop:6,marginBottom:4}}>Frame Capture Interval</div>
            <div className="settings-grid" style={{gridTemplateColumns:'1fr 1fr 1fr',marginBottom:6}}>
              {[1,3,5].map(s=>
                <button key={s} className={`settings-btn ${cameraIntervalSec===s?'active':''}`}
                  style={{textAlign:'center'}}
                  onClick={()=>{setCameraIntervalSec(s);saveAgentSettings({camera_interval_sec:s})}}>{s}s</button>
              )}
            </div>
            <div className="settings-toggle" onClick={()=>{const v=!cameraAutoDescribe;setCameraAutoDescribe(v);saveAgentSettings({camera_auto_describe:v})}}>
              <span className="settings-toggle-label">Auto-describe what Friday sees</span>
              <div className={`settings-toggle-switch ${cameraAutoDescribe?'on':''}`}/>
            </div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.72)',marginBottom:14}}>When off, Friday only references the camera when you ask. When on, expect proactive commentary.</div>

            {/* Computer Control — kept inside Account & Security as it's a high-trust permission. */}
            <div style={{border:'1px solid rgba(255,50,50,0.2)',borderRadius:6,padding:10,background:'rgba(255,50,50,0.02)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <div className="settings-section-title" style={{margin:0,color:'rgba(255,100,100,0.85)'}}>Computer Control</div>
                {ccGranted&&<span style={{fontSize:10,fontFamily:'Orbitron',color:'#ff3333',padding:'1px 6px',borderRadius:4,background:'rgba(255,0,0,0.12)',border:'1px solid rgba(255,0,0,0.3)'}}>ACTIVE</span>}
              </div>
              {!ccAvailable&&<div style={{fontSize:11,color:'#f59e0b',padding:'6px 8px',background:'rgba(245,158,11,0.08)',borderRadius:4,marginBottom:10}}>pyautogui not installed. Run <code style={{color:'#00d4ff'}}>pip install pyautogui</code> in the venv and restart the server.</div>}
              <div style={{fontSize:11,color:'rgba(255,200,200,0.85)',marginBottom:10,lineHeight:1.6}}>
                When enabled, Friday can move your mouse, click, type, and take screenshots.<br/>
                <strong style={{color:'#ff6060'}}>Permission is revoked on every server restart.</strong>
              </div>
              <div className="settings-toggle" onClick={()=>{
                if(ccGranted){
                  fetch('/api/control/permission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'revoke'})}).then(()=>setCcGranted(false)).catch(()=>{});
                }else{
                  fetch('/api/control/permission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'grant'})}).then(r=>r.json()).then(d=>setCcGranted(!!d.granted)).catch(()=>{});
                }
              }} style={{borderColor:ccGranted?'rgba(255,50,50,0.4)':'undefined'}}>
                <span className="settings-toggle-label" style={{color:ccGranted?'#ff6060':undefined}}>{ccGranted?'🔴 Computer Control ACTIVE':'🟢 Computer Control OFF'}</span>
                <div className={`settings-toggle-switch ${ccGranted?'on':''}`} style={ccGranted?{background:'linear-gradient(90deg,#cc0000,#ff2222)'}:{}}/>
              </div>
              {ccGranted&&<div style={{marginTop:10,padding:'10px 12px',background:'rgba(255,0,0,0.06)',border:'1px solid rgba(255,0,0,0.2)',borderRadius:6}}>
                <div style={{fontFamily:'Orbitron',fontSize:11,color:'#ff4444',marginBottom:6,letterSpacing:'.05em'}}>&#x26D4; KILL SWITCH</div>
                <div style={{fontSize:11,color:'rgba(255,200,200,0.8)',marginBottom:8}}>Immediately stop all computer control. Also available via <code style={{color:'#ff9999'}}>Ctrl+Shift+Q</code>.</div>
                <button onClick={killSwitch} style={{width:'100%',padding:'8px',background:'linear-gradient(135deg,#aa0000,#cc2222)',border:'1px solid rgba(255,50,50,0.5)',borderRadius:5,color:'#fff',fontFamily:'Orbitron',fontSize:12,letterSpacing:'.1em',cursor:'pointer',fontWeight:700}}>&#x26D4; KILL COMPUTER CONTROL</button>
              </div>}
            </div>
          </div>
        </div>
      </div>

      {/* ── 5) ABOUT ── branding + system health snapshot. */}
      <div className="settings-section" style={{padding:0}}>
        <div className={`settings-coll-header ${openSections.about?'open':''}`} onClick={()=>toggleSection('about')}>
          <div className="settings-section-title" style={{margin:0}}>About</div>
          <span className="chev">{openSections.about?'▾':'▸'}</span>
        </div>
        <div className={`settings-coll-body ${openSections.about?'open':''}`}>
          <div style={{padding:'0 16px 14px'}}>
            <div style={{textAlign:'center',marginBottom:14,padding:'14px 8px',background:'linear-gradient(135deg,rgba(245,158,11,0.06),rgba(0,212,255,0.04))',borderRadius:8,border:'1px solid rgba(245,158,11,0.15)'}}>
              <div style={{fontFamily:'Orbitron',fontSize:18,color:'#f59e0b',letterSpacing:'0.08em',fontWeight:700,marginBottom:4,textShadow:'0 0 14px rgba(245,158,11,0.35)'}}>AGENT FRIDAY</div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(255,255,255,0.55)',marginBottom:8}}>v1.0 · Desktop OS</div>
              <div style={{fontFamily:'Orbitron',fontSize:10,color:'#00d4ff',letterSpacing:'0.18em'}}>BY FUTURESPEAK.AI</div>
            </div>

            <div className="settings-subtitle">System Health</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11,marginBottom:8}}>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Evolution Day</div>
                <div style={{fontFamily:'Orbitron',fontSize:15,color:'#00d4ff'}}>{stEvo?.day??'—'}</div>
              </div>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Mood</div>
                <div style={{fontFamily:'Orbitron',fontSize:13,color:'#7c3aed'}}>{sceneState.mood||'—'}</div>
              </div>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Uptime</div>
                <div style={{fontFamily:'Orbitron',fontSize:13,color:'#00ff80'}}>{formatUptime(stHealth?.uptime_seconds)}</div>
              </div>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Creations Today</div>
                <div style={{fontFamily:'Orbitron',fontSize:15,color:'#f59e0b'}}>{stHealth?.creations_today??'—'}</div>
              </div>
            </div>
            <div style={{marginTop:8}}>
              <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:4}}>Active Models</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {(stHealth?.models||[{name:'Claude',active:true},{name:'Gemini',active:true}]).map((m,i)=>(
                  <span key={i} className="model-pill" style={{fontSize:11}}>
                    <span className={`dot ${m.active?'active':'idle'}`}/>
                    {m.name}
                  </span>
                ))}
              </div>
            </div>
            {stEvo?.structure&&<div style={{marginTop:8,fontSize:11,color:'#a8a8b4',fontFamily:'JetBrains Mono'}}>{stEvo.structure}</div>}

            <div className="settings-subtitle" style={{marginTop:14}}>Acknowledgments</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',lineHeight:1.6,fontFamily:'JetBrains Mono'}}>
              Context compression powered by{' '}
              <a href="https://github.com/chopratejas/headroom" target="_blank" rel="noopener noreferrer" style={{color:'#00d4ff',textDecoration:'none'}}>Headroom</a>
              {' '}by Tejas Chopra — Apache 2.0. Compresses tool outputs, JSON, code, and prose before they reach the LLM (60-95% fewer tokens, same answers).
            </div>
          </div>
        </div>
      </div>
    </div>

    {/* Quick Draft Popup */}
    {quickDraft&&<div ref={quickDraftRef} style={{position:'fixed',top:42,right:120,width:360,background:'rgba(10,14,26,0.75)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:12,zIndex:9999,padding:14,boxShadow:'0 4px 30px rgba(0,0,0,0.3)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>QUICK DRAFT</span>
        <button onClick={()=>setQuickDraft(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer'}}>&#x2715;</button>
      </div>
      <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap'}}>
        {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(qdMode===m.id?'':'btn-magenta')} style={{fontSize:11,padding:'2px 6px'}} onClick={()=>setQdMode(m.id)}>{m.ico} {m.label}</button>)}
      </div>
      <textarea className="input" style={{width:'100%',height:48,resize:'none',fontSize:11,marginBottom:6}} value={qdPrompt} onChange={e=>setQdPrompt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)qdGenerate()}} placeholder="What do you need drafted? (Ctrl+Enter)"/>
      <div style={{display:'flex',gap:4,marginBottom:qdResult||qdLoading?8:0,flexWrap:'wrap'}}>
        <button className="btn" onClick={qdGenerate} disabled={qdLoading} style={{fontSize:11,fontWeight:600}}>{qdLoading?'Generating...':'Generate'}</button>
        {qdResult&&<button className="btn" onClick={qdCopy} style={{fontSize:11}}>{qdCopied?'✓ Copied':'📋 Copy'}</button>}
        {qdResult&&<button className="btn" onClick={()=>openDraftTab(qdResult,qdMode,qdPrompt)} style={{fontSize:11}}>🔗 New Tab</button>}
      </div>
      {qdLoading&&!qdResult&&<div style={{fontSize:11,color:'#a8a8b4',fontStyle:'italic',marginBottom:6}}>⏳ Running in background — progress visible in the bell menu</div>}
      {qdResult&&<div style={{maxHeight:220,overflowY:'auto',background:'rgba(0,0,0,0.45)',border:'1px solid rgba(0,212,255,0.1)',borderRadius:8,padding:'14px 16px'}}>
        {qdResult.split(/\n\n+/).filter(Boolean).map((p,i)=><p key={i} style={{fontFamily:'Inter',fontSize:i===0?13:12,lineHeight:1.75,color:i===0?'#e8e8f0':'#ccc',marginBottom:10,whiteSpace:'pre-wrap'}}>{p}</p>)}
      </div>}
    </div>}

    {/* Dock — grouped (Life / Work / System) */}
    <div className={`dock ${dockHidden?'hidden':''}`}>
      {DOCK_GROUPS.map((g,gi)=>(<React.Fragment key={g.name}>
        {gi>0&&<div className="dock-sep"/>}
        <div className="dock-group">
          <div className="dock-group-btns">
            {g.items.map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''}`} onClick={()=>toggle(w.id)} style={{position:'relative'}}>
              <span className="ico"><img src={`assets/icons/${w.id}.svg`} alt={w.label} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='inline'}}/><span style={{display:'none'}}>{w.ico}</span></span><span>{w.label}</span><span className="dot"/>
              {w.id==='wiki'&&wikiPending>0&&<span style={{position:'absolute',top:2,right:2,minWidth:14,height:14,padding:'0 4px',borderRadius:7,background:'#f59e0b',color:'#0a0a0f',fontSize:9,fontWeight:700,fontFamily:'Orbitron',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 8px rgba(245,158,11,0.7)'}}>{wikiPending}</span>}
            </button>)}
          </div>
          <div className="dock-group-label">{g.name}</div>
        </div>
      </React.Fragment>))}
    </div>
    {paletteOpen&&<CommandPalette onClose={()=>setPaletteOpen(false)} onOpenWs={id=>{toggle(id);setPaletteOpen(false)}} openWins={openWins}/>}

    {/* Background tasks now live in the bell-icon dropdown above */}

    {/* Task Result Modal */}
    {taskResultModal&&<div onClick={()=>setTaskResultModal(null)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(720px, 90vw)',maxHeight:'85vh',overflowY:'auto',background:'rgba(10,10,18,0.96)',border:'1px solid rgba(0,212,255,0.25)',borderRadius:12,padding:18,boxShadow:'0 12px 40px rgba(0,0,0,0.8)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00d4ff',letterSpacing:'.08em'}}>TASK RESULT · {(taskResultModal.status||'').toUpperCase()}</div>
            <div style={{fontSize:14,color:'#fff',marginTop:3}}>{taskResultModal.name}</div>
          </div>
          <button className="btn" onClick={()=>setTaskResultModal(null)}>Close</button>
        </div>
        {taskResultModal.description&&<div style={{fontSize:11,color:'#888',marginBottom:10,fontStyle:'italic'}}>{taskResultModal.description}</div>}
        {taskResultModal.result
          ?<FridayDoc compact text={taskResultModal.result} style={{background:'rgba(0,0,0,0.4)',padding:12,borderRadius:8,border:'1px solid rgba(255,255,255,0.04)'}}/>
          :<div style={{background:'rgba(0,0,0,0.4)',padding:12,borderRadius:8,border:'1px solid rgba(255,255,255,0.04)',color:'#888',fontSize:12,fontStyle:'italic'}}>(no result text)</div>}
        {(taskResultModal.log||[]).length>0&&<div style={{marginTop:12}}>
          <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff',letterSpacing:'.08em',marginBottom:6}}>ACTIVITY LOG</div>
          <div style={{background:'rgba(0,0,0,0.4)',padding:8,borderRadius:6,maxHeight:180,overflowY:'auto'}}>
            {(taskResultModal.log||[]).map((l,i)=><div key={i} style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(200,200,220,0.7)',padding:'1px 0'}}>→ {l}</div>)}
          </div>
        </div>}
      </div>
    </div>}
  </>);
}

// Mount with error surface so mobile failures are visible instead of a blank dock.
(function mountFriday(){
  try{
    var target=document.getElementById('ui-inner')||document.getElementById('ui-root');
    if(!target){throw new Error('Mount target #ui-inner/#ui-root not found');}
    ReactDOM.createRoot(target).render(<App/>);
  }catch(err){
    console.error('[FRIDAY] React mount failed:',err);
    var host=document.getElementById('ui-inner')||document.getElementById('ui-root')||document.body;
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:rgba(20,0,10,.92);border:1px solid #ff0080;border-radius:10px;padding:12px 14px;color:#ffdbe8;font:12px/1.4 monospace;pointer-events:auto;max-height:45vh;overflow:auto';
    box.innerHTML='<div style="color:#ff5599;font-weight:700;margin-bottom:6px">FRIDAY UI failed to mount</div><pre style="white-space:pre-wrap;margin:0">'+(err&&err.stack?err.stack:String(err))+'</pre>';
    host.appendChild(box);
  }
})();
</script>
</body>
</html>
