<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FRIDAY Desktop — FutureSpeak.AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; cursor: default; }
        canvas { display: block; }
        
        /* --- ETHEREAL HUD OVERLAY --- */
        #hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
            --hud-r: 0; --hud-g: 255; --hud-b: 255;
            --hud-opacity: 0.25;
        }

        /* ELEGANT OPTICAL ARCS */
        .hud-corner {
            position: absolute; width: 6vw; height: 6vw; max-width: 60px; max-height: 60px;
            border: 1px solid rgba(var(--hud-r), var(--hud-g), var(--hud-b), var(--hud-opacity));
            transition: border-color 1s ease, box-shadow 1s ease;
        }
        .top-left { top: 60px; left: 80px; border-right: none; border-bottom: none; border-top-left-radius: 100%; }
        .top-right { top: 60px; right: 80px; border-left: none; border-bottom: none; border-top-right-radius: 100%; }
        .bottom-left { bottom: 60px; left: 80px; border-right: none; border-top: none; border-bottom-left-radius: 100%; }
        .bottom-right { bottom: 60px; right: 80px; border-left: none; border-top: none; border-bottom-right-radius: 100%; }

        .hud-corner .dot {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: rgba(var(--hud-r), var(--hud-g), var(--hud-b), calc(var(--hud-opacity) + 0.4));
            box-shadow: 0 0 10px rgba(var(--hud-r), var(--hud-g), var(--hud-b), 1.0);
        }
        .top-left .dot { top: 25%; left: 25%; }
        .top-right .dot { top: 25%; right: 25%; }
        .bottom-left .dot { bottom: 25%; left: 25%; }
        .bottom-right .dot { bottom: 25%; right: 25%; }

        /* HEADER */
        .hud-header {
            position: absolute; top: 80px; left: 140px; right: 140px;
            display: flex; justify-content: space-between; align-items: flex-start;
            font-family: 'Courier New', Courier, monospace; font-size: 9px;
            color: rgba(var(--hud-r), var(--hud-g), var(--hud-b), calc(var(--hud-opacity) + 0.5));
            letter-spacing: 4px; text-shadow: 0 0 10px rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.5);
            font-weight: 300; text-transform: uppercase;
        }

        .hud-title-container { display: flex; flex-direction: column; gap: 6px; }
        .hud-main-title { 
            font-size: 13px; color: #fff; letter-spacing: 6px; font-weight: 400; 
            text-decoration: none; pointer-events: auto; cursor: pointer; transition: text-shadow 0.3s;
        }
        .hud-main-title:hover { text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        
        .hud-laws { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .status-dot.green { background: #00ff66; box-shadow: 0 0 10px #00ff66, 0 0 2px #fff inset; }
        .status-dot.red { background: #ff0033; box-shadow: 0 0 10px #ff0033, 0 0 2px #fff inset; }
        .status-dot.yellow { background: #ffcc00; box-shadow: 0 0 10px #ffcc00, 0 0 2px #fff inset; }

        /* API PROVIDER READOUT (Left Sidebar) */
        .hud-api-panel {
            position: absolute; top: 50%; left: 120px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px;
            font-family: 'Courier New', Courier, monospace; font-size: 8px;
            color: rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.8);
            letter-spacing: 2px; text-transform: uppercase;
            width: 140px; transition: width 0.4s cubic-bezier(0.1, 0.8, 0.3, 1);
            overflow: hidden; pointer-events: auto; cursor: pointer;
            padding: 10px 0;
        }
        .hud-api-panel.collapsed { width: 24px; }
        .api-item {
            display: flex; align-items: center; gap: 12px; justify-content: space-between;
            width: 130px; border-bottom: 1px solid rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.1);
            padding-bottom: 4px; transition: opacity 0.3s ease;
        }
        .api-name { white-space: nowrap; transition: opacity 0.3s; }
        .hud-api-panel.collapsed .api-name { opacity: 0; }

        /* TELEMETRY & APP TRAY (Right Sidebar) */
        .hud-side-panel {
            position: absolute; top: 50%; transform: translateY(-50%); right: 120px;
            display: flex; flex-direction: column; gap: 6px; width: 40px; align-items: flex-end;
            pointer-events: auto; cursor: pointer; z-index: 52;
            padding: 20px 0;
        }
        .telemetry-bar {
            height: 1px; background: rgba(var(--hud-r), var(--hud-g), var(--hud-b), var(--hud-opacity));
            transition: width 0.3s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 0.3s ease;
            box-shadow: 0 0 5px rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.3);
        }

        #app-tray {
            position: absolute; right: 120px; top: 50%; transform: translateY(-50%);
            width: 0px; height: 320px; background: rgba(0, 5, 15, 0.6);
            border: 1px solid rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.2);
            backdrop-filter: blur(15px); border-radius: 8px;
            transition: width 0.4s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 0.4s, right 0.4s;
            opacity: 0; pointer-events: none; overflow: hidden;
            display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 60px; gap: 15px; box-sizing: border-box;
            z-index: 51;
        }
        #app-tray.open {
            width: 220px; opacity: 1; pointer-events: auto; right: 180px; padding: 20px;
        }
        .app-icon {
            width: 100%; height: 100%; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02); transition: all 0.2s; cursor: pointer;
        }
        .app-icon:hover { background: rgba(255,255,255,0.1); border-color: rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.5); }

        /* INSTRUCTIONS PANEL */
        .hud-instructions {
            position: absolute; bottom: 120px; left: 140px;
            display: flex; flex-direction: column; gap: 10px; align-items: flex-start;
            font-family: 'Courier New', Courier, monospace; font-size: 8px;
            color: rgba(0, 255, 255, 0.8); letter-spacing: 2px; text-transform: uppercase;
            pointer-events: none; z-index: 100;
        }
        .hud-instructions .instr-box {
            background: rgba(0, 15, 30, 0.6); padding: 8px 12px; border-radius: 4px;
            border-left: 2px solid #00ffff; backdrop-filter: blur(4px);
            opacity: 0; transform: translateX(-20px); transition: all 0.5s cubic-bezier(0.1, 0.8, 0.3, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .hud-instructions .instr-box.active { opacity: 1; transform: translateX(0); }

        /* FOOTER */
        .hud-footer {
            position: absolute; bottom: 80px; left: 140px; right: 140px;
            display: flex; justify-content: space-between; align-items: flex-end;
            font-family: 'Courier New', Courier, monospace; font-size: 9px;
            color: rgba(var(--hud-r), var(--hud-g), var(--hud-b), calc(var(--hud-opacity) + 0.5));
            letter-spacing: 2px; text-transform: uppercase;
        }
        .discord-link {
            color: #00ffff; text-decoration: none; pointer-events: auto;
            border-bottom: 1px solid rgba(0,255,255,0.3); transition: all 0.3s ease;
            padding-bottom: 2px; text-shadow: 0 0 8px rgba(0,255,255,0.5);
        }
        .discord-link:hover { color: #fff; border-bottom-color: #fff; text-shadow: 0 0 12px rgba(255,255,255,0.8); }

        /* MINORITY REPORT HAND CURSOR */
        #hand-cursor {
            position: fixed; top: -50px; left: -50px; width: 24px; height: 24px;
            border-radius: 50%; border: 4px solid rgba(0, 255, 255, 0.8);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 9999;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), inset 0 0 6px rgba(0, 255, 255, 0.3);
            display: none; opacity: 0; transition: transform 0.1s, border-color 0.2s, opacity 0.3s;
            justify-content: center; align-items: center;
        }
        #hand-cursor.active { display: flex; opacity: 1; }
        #hand-cursor.hidden { opacity: 0; }
        #hand-cursor.pinching { transform: translate(-50%, -50%) scale(0.8); border-color: #fff; box-shadow: 0 0 15px #fff; }
        
        #pinch-progress { position: absolute; top: -5px; left: -5px; width: 34px; height: 34px; transform: rotate(-90deg); opacity: 0; }
        .pinch-circle { fill: none; stroke: #ff00ff; stroke-width: 4; stroke-dasharray: 95; stroke-dashoffset: 95; transition: stroke-dashoffset 0.1s linear; }
        
        .ripple {
            position: fixed; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 9998;
            animation: rippleAnim 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes rippleAnim {
            0% { width: 0px; height: 0px; opacity: 1; border: 4px solid var(--r-color); }
            100% { width: 100px; height: 100px; opacity: 0; border: 1px solid var(--r-color); }
        }

        /* CAMERA TRACKING INDICATOR */
        #camera-indicator {
            position: fixed; bottom: 20px; right: 20px; width: 6px; height: 6px; 
            border-radius: 50%; background: #444; z-index: 200; transition: background 0.3s, box-shadow 0.3s;
        }

        /* --- CONTROL PANEL --- */
        #control-panel {
            position: fixed; top: 150px; right: 100px; display: flex; gap: 15px; z-index: 110;
            opacity: 0.05; transition: opacity 0.8s ease; max-height: calc(100vh - 300px); pointer-events: auto;
        }
        #control-panel:hover { opacity: 1.0; }

        .panel-section {
            display: flex; flex-direction: column; gap: 6px;
            background: rgba(0, 5, 15, 0.4); backdrop-filter: blur(15px);
            padding: 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow-y: auto;
        }
        .panel-section::-webkit-scrollbar { width: 0px; }

        .panel-title {
            color: rgba(255, 255, 255, 0.6); font-size: 8px; text-align: center; margin-bottom: 8px;
            letter-spacing: 3px; font-weight: 400; font-family: 'Courier New', monospace;
        }

        .btn {
            background: none; border: 1px solid transparent; color: rgba(255, 255, 255, 0.4);
            padding: 6px 14px; font-size: 8px; cursor: pointer; text-align: left; border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.1, 0.8, 0.3, 1); text-transform: uppercase; letter-spacing: 2px; min-width: 150px;
            font-family: 'Courier New', monospace; pointer-events: auto;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; border-color: rgba(255,255,255,0.2); }
        .btn.active {
            color: #fff; background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .btn.dev-btn { border-color: rgba(255, 0, 0, 0.3); color: rgba(255, 100, 100, 0.8); margin-top: 5px; text-align: center; }
        .btn.dev-btn:hover { background: rgba(255, 0, 0, 0.1); color: #fff; border-color: #ff0000; }
        .btn.dev-btn.active { background: rgba(255, 0, 0, 0.2); color: #fff; border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }

        .btn.holo-btn { border-color: rgba(0, 255, 150, 0.3); color: rgba(0, 255, 150, 0.8); text-align: center; margin-bottom: 5px;}
        .btn.holo-btn:hover { background: rgba(0, 255, 150, 0.1); color: #fff; border-color: #00ff96; }
        .btn.holo-btn.active { background: rgba(0, 255, 150, 0.2); color: #fff; border-color: #00ff96; box-shadow: 0 0 15px rgba(0, 255, 150, 0.3); }

        .btn.hand-btn { border-color: rgba(200, 100, 255, 0.3); color: rgba(200, 100, 255, 0.8); text-align: center; margin-bottom: 10px;}
        .btn.hand-btn:hover { background: rgba(200, 100, 255, 0.1); color: #fff; border-color: #c864ff; }
        .btn.hand-btn.active { background: rgba(200, 100, 255, 0.2); color: #fff; border-color: #c864ff; box-shadow: 0 0 15px rgba(200, 100, 255, 0.3); }

        #interaction-prompt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,2,5,0.6); backdrop-filter: blur(8px); color: #fff;
            font-family: 'Courier New', Courier, monospace; cursor: pointer; z-index: 200;
            transition: opacity 1.5s ease, visibility 1.5s; letter-spacing: 6px; text-transform: uppercase; text-align: center; padding: 20px;
            font-weight: 300; font-size: 14px; pointer-events: auto;
        }
        #interaction-prompt.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        .hint { font-size: 10px; opacity: 0.6; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
