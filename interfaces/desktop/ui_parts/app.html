<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const DOCK_GROUPS=[
  {name:'Life',items:[
    {id:'home',ico:'🏠',label:'Home'},
    {id:'family',ico:'👪',label:'Family'},
    {id:'coparent',ico:'👨‍👩‍👧',label:'Co-Parent'},
    {id:'health',ico:'❤️',label:'Health'},
    {id:'finance',ico:'💰',label:'Finance'},
  ]},
  {name:'Work',items:[
    {id:'career',ico:'💼',label:'Career'},
    {id:'futurespeak',ico:'🚀',label:'FutureSpeak'},
    {id:'contacts',ico:'👥',label:'Contacts'},
    {id:'draft',ico:'✍️',label:'Draft'},
    {id:'content',ico:'📝',label:'Content'},
  ]},
  {name:'System',items:[
    {id:'news',ico:'📰',label:'News'},
    {id:'wiki',ico:'📚',label:'Wiki'},
    {id:'trust',ico:'🔗',label:'Trust'},
    {id:'studio',ico:'🎨',label:'Studio'},
    {id:'code',ico:'💻',label:'Code'},
    {id:'system',ico:'🖥️',label:'System'},
  ]},
];
const WS=DOCK_GROUPS.flatMap(g=>g.items);
function getGreeting(){const h=new Date().getHours();if(h<5)return'Late night';if(h<12)return'Good morning';if(h<17)return'Good afternoon';if(h<21)return'Good evening';return'Late night'}

function FWin({id,title,emoji,children,onClose,zIndex,onFocus}){
  const[pos,setPos]=useState({x:60+Math.random()*300,y:40+Math.random()*80});
  const[size,setSize]=useState({w:660,h:460});
  const[dragging,setDragging]=useState(false);const[resizing,setResizing]=useState(false);
  const dOff=useRef({x:0,y:0});const rStart=useRef({x:0,y:0,w:0,h:0});
  useEffect(()=>{if(!dragging)return;const mv=e=>setPos({x:Math.max(0,e.clientX-dOff.current.x),y:Math.max(30,e.clientY-dOff.current.y)});const up=()=>setDragging(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[dragging]);
  useEffect(()=>{if(!resizing)return;const mv=e=>setSize({w:Math.max(400,rStart.current.w+e.clientX-rStart.current.x),h:Math.max(280,rStart.current.h+e.clientY-rStart.current.y)});const up=()=>setResizing(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[resizing]);
  return(<div className="fwin" style={{left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex}} onClick={onFocus}>
    <div className="fwin-bar" onMouseDown={e=>{if(e.target.closest('.fwin-btns'))return;setDragging(true);dOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y};onFocus()}}>
      <span className="fwin-title">{emoji} {title}</span><div className="fwin-btns"><button onClick={onClose}>×</button></div>
    </div><div className="fwin-body">{children}</div>
    <div className="resize-h" onMouseDown={e=>{e.stopPropagation();setResizing(true);rStart.current={x:e.clientX,y:e.clientY,w:size.w,h:size.h};onFocus()}}/>
  </div>);
}

// ═══ ERROR WRAPPER ═══
function Safe({children,name}){
  const[err,setErr]=useState(false);
  if(err)return(<div style={{padding:20,textAlign:'center'}}><div style={{color:'#ff0080',fontSize:13}}>⚠️ {name} encountered an error</div><button className="btn" style={{marginTop:8}} onClick={()=>setErr(false)}>Retry</button></div>);
  try{return children}catch(e){setErr(true);return null}
}

// ═══ FRIDAY SAYS (proactive insight) ═══
function FridaySays({text}){
  if(!text)return null;
  return(<div style={{background:'rgba(0,212,255,0.04)',border:'1px solid rgba(0,212,255,0.1)',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:12,color:'#00d4ff',fontStyle:'italic'}}>💡 {text}</div>);
}

// ═══ COMMAND PALETTE (Ctrl+K) ═══
function CommandPalette({onClose,onOpenWs,openWins}){
  const[q,setQ]=useState('');
  const[sel,setSel]=useState(0);
  const[contacts,setContacts]=useState([]);
  const[routines,setRoutines]=useState([]);
  const inputRef=useRef(null);

  useEffect(()=>{inputRef.current?.focus()},[]);
  useEffect(()=>{
    fetch('/api/contacts').then(r=>r.json()).then(d=>setContacts(d.contacts||d.items||[])).catch(()=>{});
    fetch('/api/routines').then(r=>r.json()).then(d=>setRoutines(d.routines||d.items||[])).catch(()=>{});
  },[]);

  const query=q.trim().toLowerCase();
  const wsResults=WS.filter(w=>!query||w.label.toLowerCase().includes(query)||w.id.includes(query))
    .map(w=>({kind:'ws',id:w.id,ico:w.ico,label:w.label,meta:openWins.has(w.id)?'open':'open workspace'}));
  const contactResults=(query?contacts.filter(c=>(c.name||c.label||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(c=>({kind:'contact',id:c.id||c.name,ico:'👤',label:c.name||c.label,meta:c.email||c.role||'contact'}));
  const routineResults=(query?routines.filter(r=>(r.label||r.name||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(r=>({kind:'routine',id:r.id,ico:'⚡',label:r.label||r.name,meta:r.schedule||r.category||'routine'}));
  const sections=[
    {title:'Workspaces',items:wsResults},
    {title:'Contacts',items:contactResults},
    {title:'Routines',items:routineResults},
  ].filter(s=>s.items.length>0);
  const flat=sections.flatMap(s=>s.items);
  useEffect(()=>{setSel(0)},[q]);

  const activate=(item)=>{
    if(!item)return;
    if(item.kind==='ws')onOpenWs(item.id);
    else if(item.kind==='routine'){
      fetch(`/api/routines/${item.id}/run`,{method:'POST'}).catch(()=>{});
      onClose();
    }else if(item.kind==='contact'){
      onOpenWs('contacts');
    }
  };

  const onKey=(e)=>{
    if(e.key==='Escape'){e.preventDefault();onClose()}
    else if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(flat.length-1,s+1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(0,s-1))}
    else if(e.key==='Enter'){e.preventDefault();activate(flat[sel])}
  };

  return(<div className="cmd-palette-overlay" onClick={onClose}>
    <div className="cmd-palette" onClick={e=>e.stopPropagation()} onKeyDown={onKey}>
      <input ref={inputRef} className="cmd-palette-input" placeholder="Search workspaces, contacts, routines…"
        value={q} onChange={e=>setQ(e.target.value)}/>
      <div className="cmd-palette-results">
        {flat.length===0&&<div className="cmd-palette-empty">No matches</div>}
        {(()=>{let idx=-1;return sections.map(s=>(<div key={s.title}>
          <div className="cmd-palette-section">{s.title}</div>
          {s.items.map(it=>{idx++;const i=idx;return(
            <div key={`${it.kind}-${it.id}`} className={`cmd-palette-item ${i===sel?'selected':''}`}
              onMouseEnter={()=>setSel(i)} onClick={()=>activate(it)}>
              <span className="ico">{it.ico}</span>
              <span>{it.label}</span>
              <span className="meta">{it.meta}</span>
            </div>
          )})}
        </div>))})()}
      </div>
    </div>
  </div>);
}

// ═══ SEND-TO DROPDOWN (Data Flow) ═══
function SendTo({content,personName,eventId,emailThreadId,dataType,options}){
  const[open,setOpen]=useState(false);const[status,setStatus]=useState(null);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[open]);
  const defaultOpts=[
    {label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},
    {label:'Save to Trust Graph',dest:'trust_graph',ico:'🔗',needsPerson:true},
    {label:'Send to Calendar',dest:'calendar_notes',ico:'📅',needsEvent:true},
    {label:'Add to Briefing',dest:'briefing',ico:'📰'},
    {label:'Draft Email',dest:'gmail_draft',ico:'✉️'},
  ];
  const opts=(options||defaultOpts).filter(o=>{
    if(o.needsPerson&&!personName)return false;
    if(o.needsEvent&&!eventId)return false;
    return true;
  });
  const send=async(dest)=>{
    setStatus('sending');setOpen(false);
    try{
      const r=await fetch('/api/flow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        data_type:dataType||'general',content:typeof content==='function'?content():content,
        metadata:{person_name:personName||'',event_id:eventId||'',email_thread_id:emailThreadId||''},
        destinations:[dest]
      })});
      const d=await r.json();
      const ok=d.results&&d.results[0]&&d.results[0].ok;
      setStatus(ok?'ok':'fail');
    }catch(e){setStatus('fail')}
    setTimeout(()=>setStatus(null),2000);
  };
  if(opts.length===0)return null;
  return(<div ref={ref} style={{position:'relative',display:'inline-block'}}>
    <button onClick={e=>{e.stopPropagation();setOpen(!open)}} style={{background:'none',border:'1px solid rgba(0,212,255,0.15)',borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:status==='ok'?'#00ff80':status==='fail'?'#ff0080':'#00d4ff',transition:'color .2s'}} title="Send to...">{status==='ok'?'✓':status==='fail'?'✗':status==='sending'?'⏳':'📤'}</button>
    {open&&<div style={{position:'absolute',right:0,top:'100%',marginTop:4,background:'rgba(10,10,18,0.95)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:6,padding:4,minWidth:160,zIndex:9999,backdropFilter:'blur(12px)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
      {opts.map((o,i)=><div key={i} onClick={()=>send(o.dest)} style={{padding:'6px 10px',fontSize:11,color:'#ccc',cursor:'pointer',borderRadius:4,display:'flex',alignItems:'center',gap:6,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,212,255,0.08)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}><span>{o.ico}</span><span>{o.label}</span></div>)}
    </div>}
  </div>);
}

// ═══ WORKSPACES ═══
function HomeWS(){
  const[cd,setCd]=useState(null);const[trust,setTrust]=useState(null);const[pers,setPers]=useState(null);const[mem,setMem]=useState(null);const[epi,setEpi]=useState(null);const[todos,setTodos]=useState([]);const[loading,setLoading]=useState(true);
  const[routines,setRoutines]=useState([]);const[runningRoutine,setRunningRoutine]=useState(null);const[routineToast,setRoutineToast]=useState('');
  const loadRoutines=()=>fetch('/api/routines').then(r=>r.json()).then(d=>setRoutines(d.routines||[])).catch(()=>{});
  useEffect(()=>{
    Promise.all([
      fetch('/api/countdowns').then(r=>r.json()).then(setCd).catch(()=>null),
      fetch('/api/trust').then(r=>r.json()).then(setTrust).catch(()=>null),
      fetch('/api/personality').then(r=>r.json()).then(setPers).catch(()=>null),
      fetch('/api/memory/stats').then(r=>r.json()).then(setMem).catch(()=>null),
      fetch('/api/epistemic').then(r=>r.json()).then(setEpi).catch(()=>null),
      fetch('/api/todos').then(r=>r.json()).then(d=>setTodos(d.todos||[])).catch(()=>[]),
      loadRoutines()
    ]).then(()=>setLoading(false));
  },[]);
  const runRoutine=async(id,label)=>{setRunningRoutine(id);try{const r=await fetch('/api/routines/'+id+'/run',{method:'POST'});const d=await r.json();setRoutineToast(d.status==='ok'?(label+' launched'):'Launch failed');loadRoutines()}catch(e){setRoutineToast('Launch failed')}setRunningRoutine(null);setTimeout(()=>setRoutineToast(''),2500)};
  const approveTodo=id=>fetch(`/api/todos/${id}/approve`,{method:'POST'}).then(()=>setTodos(t=>t.map(x=>x.id===id?{...x,status:'approved'}:x)));
  const rejectTodo=id=>fetch(`/api/todos/${id}/reject`,{method:'POST'}).then(()=>setTodos(t=>t.filter(x=>x.id!==id)));
  const runMorningRoutines=()=>{fetch('/api/vibe-code/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tasks:['Run daily news briefing','Run email scan']})}).then(()=>alert('Morning routines launched')).catch(()=>{})};
  if(loading)return <div style={{color:'#999',textAlign:'center',padding:40}}>Loading systems...</div>;
  const pending=todos.filter(t=>t.status==='proposed').length;
  const insight=cd?.countdowns?`${cd.countdowns.map(c=>`${c.label||c.name||'Event'} in ${c.days||c.days_until||'?'}d`).join(' · ')}${pending>0?` · ${pending} task${pending>1?'s':''} awaiting approval`:''}`:'Systems initializing...';
  return(<div>
    <FridaySays text={insight}/>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}><button className="btn" style={{fontSize:11}} onClick={runMorningRoutines}>Run Morning Routines</button></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div className="card"><div className="card-title">Upcoming Events</div>{cd?.countdowns?.map((c,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.03)'}}><span>{c.emoji||'📅'} {c.label||c.name}</span><span className="stat" style={{fontSize:16,color:'#00d4ff'}}>{c.days||c.days_until}d</span></div>)||<span style={{color:'#999'}}>No events</span>}</div>
      <div className="card"><div className="card-title">Personality</div>{(()=>{const sc=pers?.session_count||0;const mp=Math.min(100,Math.round(sc/50*100));return(<><div className="stat">{sc}</div><div className="stat-label">sessions · {mp}% maturity</div><div className="progress-bar" style={{marginTop:6}}><div className="progress-fill" style={{width:Math.max(mp,2)+'%',background:mp>=66?'#00ff80':mp>=33?'#f59e0b':'#7c3aed'}}/></div></>)})()}</div>
      <div className="card"><div className="card-title">Trust Network</div><div className="stat">{trust?.people?(Array.isArray(trust.people)?trust.people.length:Object.keys(trust.people).length):0}</div><div className="stat-label">entities tracked</div></div>
      <div className="card"><div className="card-title">Epistemic Score</div>{(()=>{const e=(epi?.overall_score??epi?.overall??0.72);return(<><div className="stat" style={{color:e>0.6?'#00ff80':e>0.4?'#f59e0b':'#ff0080'}}>{e.toFixed(2)}</div><div className="stat-label">{e>0.6?'making user smarter':e>0.4?'neutral':'dependency risk'}</div></>)})()}</div>
      <div className="card"><div className="card-title">Memory Banks</div><div style={{fontSize:12}}>{[['🔵','Short-term',mem?.short||0],['🟣','Medium-term',mem?.medium||0],['🟠','Long-term',mem?.long||0]].map(([e,l,v],i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'2px 0'}}><span>{e} {l}</span><span style={{fontFamily:'JetBrains Mono'}}>{v}</span></div>)}</div></div>
      <div className="card"><div className="card-title">AI To-Do List</div>{todos.length===0?<div style={{color:'#999',fontSize:11}}>No tasks proposed yet</div>:todos.slice(0,5).map(t=><div key={t.id||Math.random()} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',borderBottom:'1px solid rgba(255,255,255,0.03)',fontSize:11}}><span style={{flex:1,color:t.status==='approved'?'#00ff80':'#ccc'}}>{t.title||t.task||'Task'}</span>{t.status==='proposed'&&<><button className="btn" style={{padding:'2px 6px',fontSize:11,marginLeft:4}} onClick={()=>approveTodo(t.id)}>✓</button><button className="btn btn-magenta" style={{padding:'2px 6px',fontSize:11,marginLeft:2}} onClick={()=>rejectTodo(t.id)}>✗</button></>}</div>)}</div>
    </div>
    <div className="card" style={{marginTop:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div className="card-title" style={{margin:0}}>Routines</div>
        {routineToast&&<span style={{fontSize:11,color:'#00d4ff'}}>{routineToast}</span>}
      </div>
      {routines.length===0?<div style={{color:'#999',fontSize:11}}>No routines registered</div>:
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        {routines.map(r=>{const busy=runningRoutine===r.id;const lr=r.last_run?new Date(r.last_run).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'never';
          return(<div key={r.id} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 6px',borderRadius:6,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.04)'}}>
            <span style={{fontSize:16}}>{r.ico}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:'#ccc',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.label}</div>
              <div style={{fontSize:11,color:'#a8a8b4',fontFamily:'JetBrains Mono'}}>{r.schedule||r.category} · last {lr}</div>
            </div>
            <button className="btn" style={{fontSize:11,padding:'3px 7px'}} disabled={busy} onClick={()=>runRoutine(r.id,r.label)}>{busy?'...':'Run Now'}</button>
          </div>);
        })}
      </div>}
    </div>
  </div>);
}
function CareerWS(){
  const[tracker,setTracker]=useState(null);const[reports,setReports]=useState([]);const[pipeline,setPipeline]=useState('');

  const[reportContent,setReportContent]=useState('');const[evalUrl,setEvalUrl]=useState('');const[storyBank,setStoryBank]=useState('');
  useEffect(()=>{Promise.all([
    fetch('/api/career-ops/tracker').then(r=>r.json()).then(setTracker).catch(()=>null),
    fetch('/api/career-ops/reports').then(r=>r.json()).then(d=>setReports(d.reports||[])).catch(()=>[]),
    fetch('/api/career-ops/pipeline').then(r=>r.json()).then(d=>setPipeline(d.content||'')).catch(()=>''),
    fetch('/api/jobs').then(r=>r.json()).then(d=>setJobs(d.content||d.raw||'')).catch(()=>'')
  ]).then(()=>setLoading(false))},[]);
  const loadReport=name=>{fetch('/api/career-ops/report/'+name).then(r=>r.json()).then(d=>{setReportContent(d.content||'');setView('report')}).catch(()=>{})};
  const launchEval=()=>{if(!evalUrl.trim())return;fetch('/api/vibe-code/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tasks:['Evaluate this job: '+evalUrl]})}).then(()=>{setEvalUrl('');alert('Evaluation launched')}).catch(()=>{})};
  const launchScan=()=>{fetch('/api/vibe-code/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tasks:['Run portal scan']})}).then(()=>alert('Scan launched')).catch(()=>{})};
  if(loading)return <div style={{color:'#999',textAlign:'center',padding:40}}>Loading career pipeline...</div>;
  const entries=tracker?.entries||[];const applied=entries.filter(e=>(e.status||'').toLowerCase().includes('appli')).length;
  const interviewing=entries.filter(e=>(e.status||'').toLowerCase().includes('interview')).length;
  const offered=entries.filter(e=>(e.status||'').toLowerCase().includes('offer')).length;

  return(<div>
    {hasData?<FridaySays text={entries.length+' evaluated, '+applied+' applied, '+interviewing+' interviewing, '+reports.length+' reports. Target: $500K'}/>:<FridaySays text="Career-ops ready. Paste a job URL below to evaluate, or scan portals for new opportunities."/>}
    <div className="card" style={{marginBottom:12,padding:10}}>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}><input className="input" style={{flex:1}} value={evalUrl} onChange={e=>setEvalUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&launchEval()} placeholder="Paste a job URL to evaluate..."/><button className="btn" onClick={launchEval}>Evaluate</button></div>

    </div>
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>{['overview','tracker','reports','pipeline','curated','interview','outreach'].map(v=><button key={v} className={'btn '+(view===v?'':'btn-magenta')} style={{fontSize:11,padding:'3px 8px'}} onClick={()=>setView(v)}>{v}</button>)}</div>
    {view==='overview'&&<div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <div className="card" style={{flex:1,textAlign:'center'}}><div className="stat" style={{fontSize:20}}>{entries.length}</div><div className="stat-label">evaluated</div></div>
        <div className="card" style={{flex:1,textAlign:'center'}}><div className="stat" style={{fontSize:20,color:'#00d4ff'}}>{applied}</div><div className="stat-label">applied</div></div>

      </div>
      <div className="card" style={{marginBottom:12}}><div className="card-title">Pipeline Funnel</div>
        {[{l:'Evaluated',c:entries.length,cl:'#f59e0b',p:100},{l:'Applied',c:applied,cl:'#00d4ff',p:entries.length?Math.round(applied/entries.length*100):0},{l:'Interviewing',c:interviewing,cl:'#7c3aed',p:entries.length?Math.round(interviewing/entries.length*100):0},{l:'Offers',c:offered,cl:'#00ff80',p:entries.length?Math.round(offered/entries.length*100):0}].map((s,i)=><div key={i} style={{marginBottom:6}}><div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2}}><span style={{color:'#aaa'}}>{s.l}</span><span style={{fontFamily:'Orbitron',color:s.cl}}>{s.c} ({s.p}%)</span></div><div className="progress-bar"><div className="progress-fill" style={{width:Math.max(s.p,2)+'%',background:s.cl}}/></div></div>)}

const DRAFT_MODES=[
  {id:'linkedin_post',label:'LinkedIn',ico:'💼'},
  {id:'email_reply',label:'Email',ico:'📧'},
  {id:'slack_message',label:'Slack',ico:'💬'},
  {id:'tweet',label:'Tweet',ico:'🐦'},
  {id:'ofw_response',label:'OFW',ico:'⚖️'},
  {id:'freeform',label:'Freeform',ico:'📝'},
];
function DraftWS(){
  const[mode,setMode]=useState('freeform');
  const[prompt,setPrompt]=useState('');
  const[context,setContext]=useState('');
  const[showCtx,setShowCtx]=useState(false);
  const[draft,setDraft]=useState('');
  const[loading,setLoading]=useState(false);
  const[copied,setCopied]=useState(false);
  const[history,setHistory]=useState([]);
  const[charCount,setCharCount]=useState(0);

  const generate=async()=>{
    if(!prompt.trim()||loading)return;
    setLoading(true);setCopied(false);
    try{
      const r=await fetch('/api/draft',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({mode,prompt,context:showCtx?context:''})});
      const d=await r.json();
      if(d.status==='ok'){
        setDraft(d.draft);setCharCount(d.char_count||d.draft.length);
        setHistory(h=>[{mode,prompt:prompt.substring(0,60),draft:d.draft,time:new Date().toLocaleTimeString()},...h].slice(0,20));
      }else{setDraft('[Error] '+(d.message||'Generation failed'))}
    }catch(e){setDraft('[Error] '+e.message)}
    setLoading(false);
  };

  const deploy=async(dest)=>{
    if(!draft)return;
    setCopied(false);
    try{
      const r=await fetch('/api/draft/deploy',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:draft,destination:dest})});
      const d=await r.json();
      if(d.status==='ok'&&dest==='clipboard'){setCopied(true);setTimeout(()=>setCopied(false),2000)}
    }catch(e){console.error('Deploy error:',e)}
  };

  return(<div>
    <FridaySays text="Draft engine ready. Pick a mode, describe what you need, and generate."/>
    {/* Mode selector */}
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
      {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(mode===m.id?'':'btn-magenta')}
        style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setMode(m.id)}>
        {m.ico} {m.label}
      </button>)}
    </div>

    {/* Prompt input */}
    <textarea className="input" style={{width:'100%',height:60,resize:'vertical',marginBottom:8,fontFamily:'JetBrains Mono',fontSize:12}}
      value={prompt} onChange={e=>setPrompt(e.target.value)}
      onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)generate()}}
      placeholder={mode==='linkedin_post'?'Write a LinkedIn post about...':mode==='email_reply'?'Reply to this email saying...':mode==='tweet'?'Tweet about...':mode==='ofw_response'?'Respond to this OFW message...':'Describe what to write...'}/>

    {/* Context toggle */}
    <div style={{marginBottom:8}}>
      <button className="btn" style={{fontSize:11,padding:'2px 8px',marginRight:6}} onClick={()=>setShowCtx(!showCtx)}>
        {showCtx?'Hide Context':'+ Context'}
      </button>
      {showCtx&&<textarea className="input" style={{width:'100%',height:50,resize:'vertical',marginTop:4,fontSize:11}}
        value={context} onChange={e=>setContext(e.target.value)}
        placeholder="Paste the message you're replying to, or describe what you're looking at..."/>}
    </div>

    {/* Actions */}
    <div style={{display:'flex',gap:4,marginBottom:12}}>
      <button className="btn" onClick={generate} disabled={loading} style={{fontWeight:600}}>
        {loading?'Generating...':'Generate'}
      </button>
      {draft&&<button className="btn" onClick={generate} disabled={loading} style={{fontSize:11}}>Regenerate</button>}
    </div>

    {/* Draft output */}
    {draft&&<div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>DRAFT OUTPUT</span>
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:mode==='tweet'&&charCount>280?'#ff0080':'#555'}}>
          {charCount} chars{mode==='tweet'&&charCount>280?' ⚠️ over limit':''}
        </span>
      </div>
      <textarea className="input" style={{width:'100%',minHeight:120,resize:'vertical',fontFamily:'JetBrains Mono',fontSize:12,lineHeight:1.6,color:'#e0e0e8'}}
        value={draft} onChange={e=>{setDraft(e.target.value);setCharCount(e.target.value.length)}}/>
      <div style={{display:'flex',gap:4,marginTop:6}}>
        <button className="btn" onClick={()=>deploy('clipboard')} style={{fontWeight:600}}>
          {copied?'✓ Copied!':'📋 Copy to Clipboard'}
        </button>
        <button className="btn btn-magenta" onClick={()=>deploy('gmail_draft')} style={{fontSize:11}}>
          📧 Gmail Draft
        </button>
      </div>
    </div>}

    {/* History */}
    {history.length>0&&<div>
      <div style={{fontFamily:'Orbitron',fontSize:11,color:'#999',marginBottom:6}}>RECENT DRAFTS</div>
      {history.map((h,i)=><div key={i} className="card" style={{marginBottom:4,cursor:'pointer',padding:'6px 10px'}}
        onClick={()=>{setDraft(h.draft);setCharCount(h.draft.length);setMode(h.mode)}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
          <span style={{color:'#aaa'}}>{DRAFT_MODES.find(m=>m.id===h.mode)?.ico||'📝'} {h.prompt}...</span>
          <span style={{color:'#999'}}>{h.time}</span>
        </div>
      </div>)}
    </div>}
  </div>);
}

// ═══ CAMERA MODE ═══
// Source can be 'screen' | 'webcam' | 'both'. Captures a JPEG frame from each
// active stream every `intervalSec` seconds and stashes it on window.fridayCamera
// so chat sends and the Live-API bridge can pick it up.
function CameraMode({source,intervalSec,onClose,frameRef,setSendIndicator,facing,onChangeFacing}){
  const screenVideoRef=useRef(null);
  const webcamVideoRef=useRef(null);
  const screenStreamRef=useRef(null);
  const webcamStreamRef=useRef(null);
  const captureCanvasRef=useRef(null);
  const captureTimerRef=useRef(null);
  const[screenErr,setScreenErr]=useState('');
  const[webcamErr,setWebcamErr]=useState('');
  const[pos,setPos]=useState({x:window.innerWidth-180,y:window.innerHeight-160});
  const[dragging,setDragging]=useState(false);
  const dragOff=useRef({x:0,y:0});

  // Acquire / release streams whenever source or facing changes.
  // Cleanup only flips a cancellation flag; the body itself stops streams we
  // no longer want. Stopping all streams on every re-run would cause repeat
  // permission prompts when the user flips the front/rear webcam toggle.
  useEffect(()=>{
    let cancelled=false;
    const stopStream=(streamRef)=>{try{streamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){};streamRef.current=null};
    const wantScreen=source==='screen'||source==='both';
    const wantWebcam=source==='webcam'||source==='both';
    (async()=>{
      if(wantScreen&&!screenStreamRef.current){
        try{
          const s=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:15},audio:false});
          if(cancelled){s.getTracks().forEach(t=>t.stop());return}
          screenStreamRef.current=s;
          if(screenVideoRef.current){screenVideoRef.current.srcObject=s;screenVideoRef.current.play().catch(()=>{})}
          s.getVideoTracks()[0]?.addEventListener('ended',()=>{stopStream(screenStreamRef);if(!cancelled)onClose()});
          setScreenErr('');
        }catch(e){setScreenErr(e.name||'denied');if(source==='screen')onClose()}
      }
      if(!wantScreen&&screenStreamRef.current)stopStream(screenStreamRef);
      if(wantWebcam){
        const cur=webcamStreamRef.current;
        const curFacing=cur?.getVideoTracks?.()[0]?.getSettings?.()?.facingMode;
        if(!cur||(facing&&curFacing&&curFacing!==facing)){
          stopStream(webcamStreamRef);
          try{
            const constraints={video:facing?{facingMode:{ideal:facing}}:true,audio:false};
            const w=await navigator.mediaDevices.getUserMedia(constraints);
            if(cancelled){w.getTracks().forEach(t=>t.stop());return}
            webcamStreamRef.current=w;
            if(webcamVideoRef.current){webcamVideoRef.current.srcObject=w;webcamVideoRef.current.play().catch(()=>{})}
            setWebcamErr('');
          }catch(e){setWebcamErr(e.name||'denied');if(source==='webcam')onClose()}
        }
      }
      if(!wantWebcam&&webcamStreamRef.current)stopStream(webcamStreamRef);
    })();
    return()=>{cancelled=true};
  },[source,facing]);
  // Stop all streams on unmount.
  useEffect(()=>()=>{
    try{screenStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
    try{webcamStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
  },[]);

  // Frame capture loop.
  useEffect(()=>{
    if(!captureCanvasRef.current)captureCanvasRef.current=document.createElement('canvas');
    const grab=(video)=>{
      if(!video||video.readyState<2||!video.videoWidth)return null;
      const c=captureCanvasRef.current;c.width=Math.min(640,video.videoWidth);c.height=Math.round(c.width*video.videoHeight/video.videoWidth);
      const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);
      try{return c.toDataURL('image/jpeg',0.7).split(',')[1]}catch(e){return null}
    };
    const tick=()=>{
      const screen=grab(screenVideoRef.current);
      const webcam=grab(webcamVideoRef.current);
      const primary=screen||webcam;
      if(primary){frameRef.current={screen,webcam,primary,ts:Date.now()};setSendIndicator(true);setTimeout(()=>setSendIndicator(false),400)}
    };
    const ms=Math.max(500,(intervalSec||3)*1000);
    captureTimerRef.current=setInterval(tick,ms);
    setTimeout(tick,400); // first frame quickly
    return()=>{if(captureTimerRef.current)clearInterval(captureTimerRef.current)};
  },[intervalSec,source,facing]);

  // Drag handlers — keep PiP inside the viewport.
  useEffect(()=>{if(!dragging)return;
    const mv=e=>setPos(p=>{const x=Math.max(4,Math.min(window.innerWidth-164,e.clientX-dragOff.current.x));const y=Math.max(44,Math.min(window.innerHeight-124,e.clientY-dragOff.current.y));return{x,y}});
    const up=()=>setDragging(false);
    addEventListener('mousemove',mv);addEventListener('mouseup',up);
    return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)};
  },[dragging]);

  const showScreen=source==='screen'||source==='both';
  const showWebcam=source==='webcam'||source==='both';
  const isBoth=source==='both';

  const pip=(refKey,label,err,extraStyle)=>(<div className={`camera-pip ${dragging?'dragging':''}`}
      style={{left:pos.x+extraStyle.dx,top:pos.y+extraStyle.dy,width:isBoth?120:160,height:isBoth?90:120}}
      onMouseDown={e=>{setDragging(true);dragOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y}}}>
    {refKey==='screen'?<video ref={screenVideoRef} muted playsInline/>:<video ref={webcamVideoRef} muted playsInline/>}
    <span className="cam-label">{label}</span>
    {refKey==='webcam'&&onChangeFacing&&<button className="cam-close" style={{right:30,padding:'1px 6px'}} title="Flip camera"
      onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onChangeFacing()}}>⇄</button>}
    <button className="cam-close" onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onClose()}} title="Stop camera">×</button>
    <span className="cam-active"><span className="pulse"/>LIVE</span>
    {err&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',color:'#ff4d6a',fontSize:11,fontFamily:'JetBrains Mono'}}>{err}</div>}
  </div>);

  return(<>{showScreen&&pip('screen','SCREEN',screenErr,{dx:0,dy:0})}{showWebcam&&pip('webcam','WEBCAM',webcamErr,{dx:isBoth?-130:0,dy:0})}</>);
}

function fmtElapsed(sec){if(sec==null)return'0s';const s=Math.floor(sec);if(s<60)return s+'s';const m=Math.floor(s/60);const r=s%60;if(m<60)return m+'m '+r+'s';const h=Math.floor(m/60);return h+'h '+(m%60)+'m'}
function TaskCard({task,expanded,onToggle,onCancel,onView}){
  const status=task.status||'running';
  return(<div className={'task-card '+status}>
    <div className="task-card-edge"/>
    <div className="task-card-row">
      <div style={{flex:1,minWidth:0}}>
        <div className="task-card-title">{task.name||'Task'}</div>
        {task.description&&<div className="task-card-sub">{task.description}</div>}
      </div>
      <div className="task-card-actions">
        <button className="task-card-btn" onClick={onToggle} title={expanded?'Collapse':'Expand'}>{expanded?'▾':'▸'}</button>
        {status==='running'&&<button className="task-card-btn cancel" onClick={onCancel} title="Cancel">✕</button>}
      </div>
    </div>
    <div className="task-card-meta">
      <span className="task-card-status">
        {status==='running'&&<><span className="task-card-spinner"/>EXECUTING</>}
        {status==='complete'&&<><span className="task-card-check">✓</span>COMPLETE</>}
        {status==='failed'&&<><span style={{color:'#ff0080',fontWeight:700}}>✕</span>FAILED</>}
      </span>
      <span className="task-card-elapsed">{fmtElapsed(task.elapsed)}</span>
    </div>
    {status==='complete'&&<div style={{marginTop:6,display:'flex',gap:4}}>
      <button className="task-card-btn results" onClick={onView}>View Results</button>
    </div>}
    {expanded&&<div className="task-card-log">
      {(task.log||[]).length===0?<div className="task-card-log-line" style={{color:'#555'}}>— waiting for activity —</div>:
        (task.log||[]).slice(-30).map((line,i)=><div key={i} className="task-card-log-line">→ {line}</div>)}
    </div>}
  </div>);
}
function TaskTray({tasks,onCancel,onView}){
  const[expanded,setExpanded]=useState({});
  const[collapsed,setCollapsed]=useState(false);
  const sorted=[...tasks].sort((a,b)=>(b.created||0)-(a.created||0));
  const running=sorted.filter(t=>(t.status||'running')==='running').length;
  const total=sorted.length;
  if(total===0)return null;
  if(collapsed){
    return(<div className="task-tray-pill" onClick={()=>setCollapsed(false)}>
      {running>0?<><span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#f59e0b',marginRight:6,verticalAlign:'middle',boxShadow:'0 0 5px rgba(245,158,11,0.7)'}}/>{running} task{running===1?'':'s'} running</>:total+' task'+(total===1?'':'s')}
    </div>);
  }
  return(<div className="task-tray">
    <div className="task-tray-header">
      <span>{running>0?`${running}/${total} TASKS · LIVE`:`${total} TASKS`}</span>
      <button className="task-card-btn" style={{padding:'1px 6px'}} onClick={()=>setCollapsed(true)} title="Collapse">_</button>
    </div>
    {sorted.slice(0,8).map(t=><TaskCard key={t.task_id} task={t}
      expanded={!!expanded[t.task_id]}
      onToggle={()=>setExpanded(e=>({...e,[t.task_id]:!e[t.task_id]}))}
      onCancel={()=>onCancel(t.task_id)}
      onView={()=>onView(t)}/>)}
  </div>);
}

    setSceneState({structIdx:window.fridayVibe.getStructure?.()?.index||0,mood:window.fridayVibe.getMood?.()??'LISTENING',holo:window.fridayVibe.isHologramOn?.()??false,hands:window.fridayVibe.isHandsOn?.()??false,timelapse:window.fridayVibe.isTimeLapseOn?.()??false});
    const sig=window._fridayMoodSignals||{};
    const micOn=window.fridayVibe.isMicActive?.()??false;
    let sysMood='LISTENING';
    if(sig.ttsActive)sysMood='SPEAKING';
    else if(sig.chatLoad)sysMood='REASONING';
    else if(sig.taskRunning||sig.routineRunning)sysMood='EXECUTING';
    else if(micOn)sysMood='LISTENING';
    else sysMood='IDLE';
    window.fridayVibe.setSystemMood?.(sysMood);
    // Belt-and-suspenders: always update the HUD text so the indicator never appears stuck
    const moodEl=document.getElementById('mood-text');
    if(moodEl)moodEl.innerText='STATE: '+sysMood;
  }},1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{fetch('/api/chat/history').then(r=>r.json()).then(d=>{if(d.messages)setChatMsgs(d.messages)}).catch(()=>{})},[]);
  useEffect(()=>{fetch('/api/notifications').then(r=>r.json()).then(d=>setNotifs(d.items||[])).catch(()=>{});const iv=setInterval(()=>{fetch('/api/notifications').then(r=>r.json()).then(d=>setNotifs(d.items||[])).catch(()=>{})},30000);return()=>clearInterval(iv)},[]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'})},[chatMsgs]);
  useEffect(()=>{
    fetch('/api/countdowns').then(r=>r.json()).then(d=>{setCountdowns(d.countdowns||[])}).catch(()=>{});
    fetch('/api/profile').then(r=>r.json()).then(setUserProfile).catch(()=>{});
  },[]);
  useEffect(()=>{fetch('/api/evolution').then(r=>r.json()).then(d=>{if(typeof d.structure_index==='number')setTimeout(()=>window.fridayVibe?.setStructure(d.structure_index),600)}).catch(()=>{})},[]);
  useEffect(()=>{if(!window._fridayMoodSignals)window._fridayMoodSignals={};window._fridayMoodSignals.chatLoad=chatLoad||qdLoading;},[chatLoad,qdLoading]);

  // ─── Background Task Runner (poll /api/tasks) ───
  const[bgTasks,setBgTasks]=useState([]);
  const[taskResultModal,setTaskResultModal]=useState(null);
  const[lastNotifiedComplete,setLastNotifiedComplete]=useState(new Set());
  useEffect(()=>{
    let cancelled=false;
    const tick=async()=>{
      try{
        const r=await fetch('/api/tasks');
        if(!r.ok)return;
        const d=await r.json();
        if(cancelled)return;
        const list=Array.isArray(d)?d:(d.tasks||[]);
        setBgTasks(prev=>{
          // Detect newly completed tasks and notify in chat
          const newlyDone=list.filter(t=>(t.status==='complete'||t.status==='failed')&&!lastNotifiedComplete.has(t.task_id)
            &&prev.some(p=>p.task_id===t.task_id&&p.status==='running'));
          if(newlyDone.length>0){
            const seen=new Set(lastNotifiedComplete);
            newlyDone.forEach(t=>seen.add(t.task_id));
            setLastNotifiedComplete(seen);
            newlyDone.forEach(t=>{
              setChatMsgs(p=>[...p,{role:'friday',text:`✅ Task complete: **${t.name}**${t.result?'\n\n'+t.result.substring(0,400):''}`,time:new Date().toLocaleTimeString()}]);
            });
          }
          return list;
        });
        // Mood signal
        if(!window._fridayMoodSignals)window._fridayMoodSignals={};
        window._fridayMoodSignals.taskRunning=list.some(t=>(t.status||'running')==='running');
      }catch(e){}
    };
    tick();
    const iv=setInterval(tick,2000);
    return()=>{cancelled=true;clearInterval(iv);if(window._fridayMoodSignals)window._fridayMoodSignals.taskRunning=false};
  },[lastNotifiedComplete]);
  const cancelBgTask=async(id)=>{try{await fetch('/api/tasks/'+id,{method:'DELETE'})}catch(e){}};
  const viewBgTaskResult=(t)=>setTaskResultModal(t);

  // Ctrl+K opens command palette
  useEffect(()=>{
    const h=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){
        e.preventDefault();
        setPaletteOpen(p=>!p);
      }
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  // Top bar + dock auto-hide on idle, show on hover near respective edge
  useEffect(()=>{
    const armTop=()=>{if(topBarTimer.current)clearTimeout(topBarTimer.current);topBarTimer.current=setTimeout(()=>setTopBarHidden(true),3000);};
    const armDock=()=>{if(dockTimer.current)clearTimeout(dockTimer.current);dockTimer.current=setTimeout(()=>setDockHidden(true),3000);};
    const onMove=(e)=>{
      const y=e.clientY||0;
      const h=window.innerHeight||0;
      if(y<60){setTopBarHidden(false);if(topBarTimer.current){clearTimeout(topBarTimer.current);topBarTimer.current=null;}}
      else{armTop();}
      if(y>h-80){setDockHidden(false);if(dockTimer.current){clearTimeout(dockTimer.current);dockTimer.current=null;}}
      else{armDock();}
    };
    window.addEventListener('mousemove',onMove);
    armTop();armDock();
    return()=>{window.removeEventListener('mousemove',onMove);if(topBarTimer.current)clearTimeout(topBarTimer.current);if(dockTimer.current)clearTimeout(dockTimer.current);};
  },[]);
  // Always show top bar when any overlay panel is open
  useEffect(()=>{
    if(settingsOpen||chatOpen||quickDraft||paletteOpen){
      setTopBarHidden(false);
      if(topBarTimer.current){clearTimeout(topBarTimer.current);topBarTimer.current=null;}
    }
  },[settingsOpen,chatOpen,quickDraft,paletteOpen]);

  const[vibeMode,setVibeMode]=useState(false);
  const toggleVibe=()=>{const entering=!vibeMode;setVibeMode(entering);if(entering){setOpenWins(new Set());document.documentElement.requestFullscreen?.().catch(()=>{});const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){const r=new SR();r.continuous=false;r.onresult=e=>{const t=e.results[0][0].transcript;setChatOpen(true);sendChat(t)};r.start()}}else{document.exitFullscreen?.().catch(()=>{})}};
  const toggle=id=>{if(id==='vibe'){toggleVibe();return}setOpenWins(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});bringFront(id)};
  const close=id=>setOpenWins(p=>{const n=new Set(p);n.delete(id);return n});
  const bringFront=id=>{setFocusWin(id);setZC(c=>{setZMap(m=>({...m,[id]:c}));return c+1})};

  // ─── Camera Mode ────────────────────────────────────────────
  const[cameraOn,setCameraOn]=useState(false);
  const[cameraSource,setCameraSource]=useState('screen');     // 'screen' | 'webcam' | 'both'
  const[cameraFacing,setCameraFacing]=useState('user');       // 'user' | 'environment'
  const[cameraIntervalSec,setCameraIntervalSec]=useState(3);
  const[cameraAutoDescribe,setCameraAutoDescribe]=useState(false);
  const[cameraControlsOpen,setCameraControlsOpen]=useState(false);
  const[cameraSendIndicator,setCameraSendIndicator]=useState(false);
  const cameraFrameRef=useRef(null);
  // Expose latest frame so external code (e.g. friday_live.html voice mode) can pull it.
  useEffect(()=>{window.fridayCamera={latestFrame:()=>cameraFrameRef.current,isOn:()=>cameraOn,source:()=>cameraSource,intervalSec:()=>cameraIntervalSec}},[cameraOn,cameraSource,cameraIntervalSec]);
  // Persist camera prefs through /api/settings (interval + auto-describe).
  useEffect(()=>{if(typeof agentSettings.camera_interval_sec==='number')setCameraIntervalSec(agentSettings.camera_interval_sec);if(typeof agentSettings.camera_auto_describe==='boolean')setCameraAutoDescribe(agentSettings.camera_auto_describe)},[agentSettings.camera_interval_sec,agentSettings.camera_auto_describe]);
  const toggleCamera=()=>{if(cameraOn){setCameraOn(false);setCameraControlsOpen(false);cameraFrameRef.current=null}else{setCameraOn(true);setCameraControlsOpen(true)}};

  const sendChat=async(overrideMsg)=>{const m=(overrideMsg||chatIn).trim();if(!m)return;setChatIn('');setChatMsgs(p=>[...p,{role:'user',text:m,time:new Date().toLocaleTimeString()}]);setChatLoad(true);
    try{
      const body={message:m};
      if(focusWin)body.workspace=focusWin;
      const frame=cameraOn?cameraFrameRef.current?.primary:null;
      if(frame)body.image=frame;
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      setChatMsgs(p=>[...p,{role:'friday',text:d.response,time:new Date().toLocaleTimeString()}])
    }catch(e){setChatMsgs(p=>[...p,{role:'friday',text:'[Connection error]',time:new Date().toLocaleTimeString()}])}
    setChatLoad(false)
  };
  const sendPrompt=()=>{if(!promptText.trim())return;setChatOpen(true);sendChat(promptText);setPromptText('')};

  const wsMap={home:<HomeWS/>,career:<CareerWS/>,wiki:<WikiWS/>,coparent:<CoparentWS/>,futurespeak:<FuturespeakWS/>,family:<FamilyWS/>,studio:<StudioWS/>,trust:<TrustWS/>,system:<SystemWS/>,code:<CodeWS/>,news:<NewsWS/>,draft:<DraftWS/>,finance:<FinanceWS/>,health:<HealthWS/>,contacts:<ContactsWS/>,content:<ContentWS/>};
  const wsInfo=WS.reduce((a,w)=>{a[w.id]=w;return a},{});
  const unread=notifs.filter(n=>!n.read).length;
  const noWindows=openWins.size===0;

  const structures=window.fridayVibe?.getStructures?.()??[];
  const moods=window.fridayVibe?.getMoods?.()??['LISTENING','REASONING','EXECUTING','EXCITED','CALM'];

  return(<>
    {/* Top Bar */}
    <div className={`top-bar ${topBarHidden?'hidden':''}`}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'Orbitron',fontWeight:900,fontSize:16,color:'#00d4ff'}}>FRIDAY</span>
        <span style={{color:'rgba(255,255,255,0.08)'}}>|</span>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {models.map((m,i)=><span key={i} className="model-pill"><span className={`dot ${m.active?'active':'idle'}`}/>{m.name}</span>)}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>{clock.toLocaleTimeString('en-US',{hour12:false})}</span>
        <button onClick={()=>{}} style={{background:'none',border:'none',color:'#999',cursor:'pointer',fontSize:14,position:'relative'}}>
          <span style={{fontSize:13}}>&#x1F514;</span>{unread>0&&<span style={{position:'absolute',top:-4,right:-4,width:14,height:14,borderRadius:'50%',background:'#ff0080',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700}}>{unread}</span>}
        </button>
        <button onClick={()=>{setQuickDraft(!quickDraft);if(!quickDraft){setChatOpen(false);setSettingsOpen(false)}}} style={{background:'none',border:'none',color:quickDraft?'#00d4ff':'#555',cursor:'pointer',fontSize:14}} title="Quick Draft">
          <span style={{fontSize:13}}>&#x270D;&#xFE0F;</span>
        </button>
        <button onClick={()=>{setChatOpen(!chatOpen);if(!chatOpen){setSettingsOpen(false);setQuickDraft(false)}}} style={{background:'none',border:'none',color:chatOpen?'#00d4ff':'#555',cursor:'pointer',fontSize:14}}>
          <span style={{fontSize:13}}>&#x1F4AC;</span>
        </button>
        <button onClick={()=>{if(cameraOn){setCameraControlsOpen(o=>!o)}else{toggleCamera()}}}
          onContextMenu={e=>{e.preventDefault();if(cameraOn){toggleCamera()}else{toggleCamera();}}}
          style={{background:'none',border:'none',color:cameraOn?'#00d4ff':'#555',cursor:'pointer',fontSize:14,filter:cameraOn?'drop-shadow(0 0 6px rgba(0,212,255,0.6))':'none'}}
          title={cameraOn?'Camera ON — click for controls (right-click to stop)':'Camera Mode'}>
          <span>&#x1F4F7;</span>{cameraOn&&cameraSendIndicator&&<span style={{position:'relative',top:-6,marginLeft:-4,fontSize:10,color:'#00d4ff'}}>&#x1F441;</span>}
        </button>
        <button onClick={()=>{setSettingsOpen(!settingsOpen);if(!settingsOpen)setChatOpen(false)}} style={{background:'none',border:'none',color:settingsOpen?'#00d4ff':'#555',cursor:'pointer',fontSize:15}} title="Settings">
          <span>&#x2699;</span>
        </button>
        <div style={{width:7,height:7,borderRadius:'50%',background:'#00ff80'}} title="Connected"/>
      </div>
    </div>

    {/* Calm Default State — greeting with ticker */}
    {noWindows&&<div style={{position:'fixed',inset:0,zIndex:5,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      {/* Radial dark backdrop so greeting reads against any scene state */}
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-55%)',width:560,height:240,borderRadius:'50%',background:'radial-gradient(ellipse at center, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.45) 45%, transparent 75%)',pointerEvents:'none',zIndex:0}}/>
      <div style={{position:'relative',zIndex:1,fontFamily:'Orbitron',fontSize:26,color:'rgba(0,212,255,0.98)',marginBottom:12,animation:'fadeIn 1s ease',letterSpacing:'0.06em',textShadow:'0 0 12px rgba(0,0,0,0.95), 0 0 32px rgba(0,212,255,0.35), 0 2px 4px rgba(0,0,0,0.85)'}}>{getGreeting()}{userProfile?.user_first_name?', '+userProfile.user_first_name:''}.</div>
      {countdowns.length>0&&<div className="greeting-ticker" style={{marginBottom:28,position:'relative',zIndex:1}}>
        {countdowns.map((c,i)=><React.Fragment key={i}>
          {i>0&&<span className="greeting-ticker-sep"/>}
          <span className="greeting-ticker-item">
            <span>{c.emoji||''} {c.label||c.name}</span>
            <span className="days">{c.days||c.days_until}d</span>
          </span>
        </React.Fragment>)}
      </div>}
      {countdowns.length===0&&<div style={{position:'relative',zIndex:1,fontFamily:'JetBrains Mono',fontSize:12,color:'rgba(255,255,255,0.78)',marginBottom:28,textShadow:'0 1px 3px rgba(0,0,0,0.85)'}}>All systems nominal.</div>}
      <div style={{position:'relative',zIndex:1,pointerEvents:'auto',display:'flex',gap:8,alignItems:'center'}}>
        <input value={promptText} onChange={e=>setPromptText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendPrompt()}
          placeholder="Ask Friday anything..."
          style={{width:360,background:'rgba(6,6,11,0.88)',backdropFilter:'blur(14px)',border:'1px solid rgba(0,212,255,0.28)',borderRadius:24,padding:'10px 20px',color:'#f0f0f8',fontSize:13,outline:'none',fontFamily:'Inter',transition:'border-color .2s',boxShadow:'0 4px 16px rgba(0,0,0,0.5)'}}/>
        <button onClick={sendPrompt} style={{width:40,height:40,borderRadius:'50%',background:'rgba(0,212,255,0.18)',border:'1px solid rgba(0,212,255,0.4)',color:'#00d4ff',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(0,0,0,0.5)'}}>&#x1F3A4;</button>
      </div>
    </div>}

    {/* Camera Mode — PiP previews + control popover */}
    {cameraOn&&<CameraMode source={cameraSource} intervalSec={cameraIntervalSec}
      frameRef={cameraFrameRef} setSendIndicator={setCameraSendIndicator}
      facing={cameraSource==='screen'?null:cameraFacing}
      onChangeFacing={()=>setCameraFacing(f=>f==='user'?'environment':'user')}
      onClose={()=>{setCameraOn(false);setCameraControlsOpen(false);cameraFrameRef.current=null}}/>}
    {cameraOn&&cameraControlsOpen&&<div className="camera-control-panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>CAMERA MODE</span>
        <button onClick={()=>setCameraControlsOpen(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer',fontSize:13}}>&#x2715;</button>
      </div>
      <div style={{fontSize:11,color:'rgba(255,255,255,0.8)',marginTop:4}}>Source</div>
      <div className="row">
        {['screen','webcam','both'].map(s=>
          <button key={s} className={`src-btn ${cameraSource===s?'active':''}`} onClick={()=>setCameraSource(s)}>{s}</button>
        )}
      </div>
      {(cameraSource==='webcam'||cameraSource==='both')&&<div style={{marginTop:8,display:'flex',gap:6,alignItems:'center',fontSize:11,color:'rgba(255,255,255,0.6)'}}>
        <span>Facing</span>
        <button className={`src-btn ${cameraFacing==='user'?'active':''}`} style={{flex:1}} onClick={()=>setCameraFacing('user')}>front</button>
        <button className={`src-btn ${cameraFacing==='environment'?'active':''}`} style={{flex:1}} onClick={()=>setCameraFacing('environment')}>rear</button>
      </div>}
      <div className="camera-privacy-banner"><span className="pulse"/>Camera is active</div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8,fontSize:11,color:'rgba(255,255,255,0.8)',fontFamily:'JetBrains Mono'}}>
        <span>Frame every {cameraIntervalSec}s</span>
        <button className="src-btn" style={{padding:'4px 10px'}} onClick={()=>{setCameraOn(false);setCameraControlsOpen(false);cameraFrameRef.current=null}}>Stop</button>
      </div>
    </div>}

    {/* Floating Windows */}
    {[...openWins].map(id=>{const w=wsInfo[id];if(!w)return null;return(<FWin key={id} id={id} title={w.label} emoji={w.ico} zIndex={zMap[id]||41} onClose={()=>close(id)} onFocus={()=>bringFront(id)}><Safe name={w.label}>{wsMap[id]||<div>Coming soon</div>}</Safe></FWin>)})}

    {/* Chat Panel */}
    <div className={`chat-panel ${chatOpen?'open':''}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>FRIDAY CHAT</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>setChatMsgs([])} title="Start a new conversation" style={{background:'rgba(0,212,255,0.06)',border:'1px solid rgba(0,212,255,0.2)',color:'#00d4ff',cursor:'pointer',fontSize:11,padding:'3px 8px',borderRadius:4,fontFamily:'Inter'}}>+ New Chat</button>
          <button onClick={()=>setChatOpen(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer'}}>&#x2715;</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:12}}>
        {chatMsgs.length===0&&<div style={{textAlign:'center',color:'#888',fontSize:12,marginTop:30}}>Talk to Friday. Type, speak, or drop a file.</div>}
        {chatMsgs.map((m,i)=><div key={i} style={{textAlign:m.role==='user'?'right':'left',marginBottom:8}}>
          <div style={{display:'inline-flex',alignItems:'flex-start',gap:4,maxWidth:'80%',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{padding:'7px 11px',borderRadius:8,fontSize:12,background:m.role==='user'?'rgba(124,58,237,0.12)':'rgba(255,255,255,0.03)',color:m.role==='user'?'#b794f6':'#bbb'}}>{m.text}</div>
            {m.role!=='user'&&<SendTo content={m.text} dataType="general" options={[{label:'Copy to Clipboard',dest:'clipboard',ico:'📋'}]}/>}
          </div>
          <div style={{fontSize:11,color:'#888',marginTop:1}}>{m.role==='user'?'You':'Friday'} · {m.time||''}</div>
        </div>)}
        {chatLoad&&<div className="typing-indicator"><span className="label">Friday is thinking</span><span className="dot"/><span className="dot"/><span className="dot"/></div>}
        <div ref={chatEnd}/>
      </div>
      <div style={{padding:10,borderTop:'1px solid rgba(255,255,255,0.04)'}}>
        <div style={{display:'flex',gap:6}}>
          <input className="input" style={{flex:1}} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendChat()} placeholder="Talk to Friday..."/>
          <button className="btn" onClick={()=>sendChat()}>Send</button>
        </div>
      </div>
    </div>

    {/* Settings Panel */}
    <div className={`settings-panel ${settingsOpen?'open':''}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>SETTINGS</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {settingsSaveMsg&&<span style={{fontSize:11,color:'#00ff80',fontFamily:'JetBrains Mono'}}>{settingsSaveMsg}</span>}
          <button onClick={()=>setSettingsOpen(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer'}}>&#x2715;</button>
        </div>
      </div>

      {/* ── GROUP: Agent Intelligence (open by default) ── */}
      <div className="settings-section" style={{padding:0}}>
        <div onClick={()=>toggleSection('intel')} style={{cursor:'pointer',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',userSelect:'none'}}>
          <div className="settings-section-title" style={{margin:0}}>Agent Intelligence</div>
          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'rgba(0,212,255,0.6)'}}>{openSections.intel?'▾':'▸'}</span>
        </div>
        {openSections.intel&&<div style={{padding:'0 16px 14px'}}>
          {/* Reasoning Style */}
          <div className="settings-subtitle">Reasoning Style</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
            <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>Precise</span>
            <span style={{fontFamily:'Orbitron',fontSize:13,color:'#00d4ff'}}>{(agentSettings.temperature??0.7).toFixed(2)}</span>
            <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>Creative</span>
          </div>
          <input type="range" min="0" max="1" step="0.05"
            value={agentSettings.temperature??0.7}
            onChange={e=>setAgentSettings(s=>({...s,temperature:parseFloat(e.target.value)}))}
            onMouseUp={e=>saveAgentSettings({temperature:parseFloat(e.target.value)})}
            onTouchEnd={e=>saveAgentSettings({temperature:parseFloat(e.target.value)})}
            style={{width:'100%',accentColor:'#00d4ff',cursor:'pointer'}}/>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.72)',marginTop:4,marginBottom:14}}>Lower = deterministic, fact-anchored. Higher = exploratory, more variation.</div>

          {/* Default Model */}
          <div className="settings-subtitle">Default Model</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:14}}>
            {((stHealth?.models)||models||[]).map((m,i)=>(
              <span key={i} className="model-pill" style={{fontSize:11}}>
                <span className={`dot ${m.active?'active':'idle'}`}/>{m.name}
              </span>
            ))}
            {(!stHealth?.models||stHealth.models.length===0)&&!models?.length&&
              <span style={{fontSize:11,color:'#a8a8b4',fontFamily:'JetBrains Mono'}}>Claude Sonnet 4.6 (text) · Gemini 2.5 Flash (vision)</span>}
          </div>

          {/* Response Preferences */}
          <div className="settings-subtitle">Response Length</div>
          <div className="settings-grid" style={{gridTemplateColumns:'1fr 1fr 1fr',marginBottom:12}}>
            {['concise','standard','detailed'].map(v=>

  </>);

  try{
    var target=document.getElementById('ui-inner')||document.getElementById('ui-root');
    if(!target){throw new Error('Mount target #ui-inner/#ui-root not found');}
    ReactDOM.createRoot(target).render(<App/>);
  }catch(err){
    console.error('[FRIDAY] React mount failed:',err);
    var host=document.getElementById('ui-inner')||document.getElementById('ui-root')||document.body;
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:rgba(20,0,10,.92);border:1px solid #ff0080;border-radius:10px;padding:12px 14px;color:#ffdbe8;font:12px/1.4 monospace;pointer-events:auto;max-height:45vh;overflow:auto';
    box.innerHTML='<div style="color:#ff5599;font-weight:700;margin-bottom:6px">FRIDAY UI failed to mount</div><pre style="white-space:pre-wrap;margin:0">'+(err&&err.stack?err.stack:String(err))+'</pre>';
    host.appendChild(box);
  }
})();
</script>
</body>
</html>
