<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060b;color:#e0e0e8;font-family:'Inter',sans-serif;overflow:hidden;height:100vh}
.three-bg{position:fixed;inset:0;z-index:0}
#ui-root{position:relative;z-index:10;height:100vh}
.dock{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:2px;padding:6px 14px;background:rgba(6,6,11,0.88);backdrop-filter:blur(20px);border:1px solid rgba(0,212,255,0.08);border-radius:18px}
.dock-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;color:#555;cursor:pointer;padding:5px 8px;border-radius:10px;transition:all .15s;font-size:9px;font-family:'JetBrains Mono',monospace}
.dock-btn:hover{color:#00d4ff;background:rgba(0,212,255,0.06);transform:translateY(-2px)}
.dock-btn.active{color:#00d4ff}
.dock-btn .ico{font-size:18px;line-height:1}
.dock-btn .dot{width:4px;height:4px;border-radius:50%;background:#00d4ff;opacity:0;transition:opacity .2s}
.dock-btn.active .dot{opacity:1}
.fwin{position:fixed;z-index:40;min-width:400px;min-height:280px;background:rgba(6,6,11,0.93);backdrop-filter:blur(14px);border:1px solid rgba(0,212,255,0.1);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.6);display:flex;flex-direction:column;animation:winIn .2s ease-out}
@keyframes winIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.fwin-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;cursor:grab;border-bottom:1px solid rgba(255,255,255,0.04);user-select:none}
.fwin-bar:active{cursor:grabbing}
.fwin-title{font-family:'Orbitron',monospace;font-size:11px;color:#00d4ff;letter-spacing:.06em}
.fwin-btns{display:flex;gap:5px}
.fwin-btns button{width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .12s}
.fwin-btns button:hover{background:rgba(255,0,128,0.12);color:#ff0080}
.fwin-body{flex:1;overflow-y:auto;padding:14px;font-size:13px;line-height:1.6}
.fwin-body::-webkit-scrollbar{width:4px}
.fwin-body::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15);border-radius:2px}
.resize-h{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;opacity:.25;background:linear-gradient(135deg,transparent 50%,rgba(0,212,255,0.35) 50%);border-radius:0 0 12px 0}
.resize-h:hover{opacity:.6}
.chat-panel{position:fixed;right:0;top:0;height:100%;width:380px;background:rgba(6,6,11,0.95);backdrop-filter:blur(16px);border-left:1px solid rgba(0,212,255,0.08);z-index:55;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.chat-panel.open{transform:translateX(0)}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:45;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(6,6,11,0.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,212,255,0.06)}
.top-bar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,#00d4ff,#7c3aed,#ff0080);opacity:.4}
.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:12px;transition:all .2s}
.card:hover{border-color:rgba(0,212,255,0.12);transform:translateY(-1px)}
.card-title{font-family:'Orbitron',monospace;font-size:10px;color:#00d4ff;letter-spacing:.08em;margin-bottom:8px;text-transform:uppercase}
.stat{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-label{font-size:10px;color:#888;font-family:'JetBrains Mono',monospace}
.badge-cyan{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono';background:rgba(0,212,255,0.1);color:#00d4ff;border:1px solid rgba(0,212,255,0.2)}
.badge-green{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono';background:rgba(0,255,128,0.1);color:#00ff80;border:1px solid rgba(0,255,128,0.2)}
.badge-magenta{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono';background:rgba(255,0,128,0.1);color:#ff0080;border:1px solid rgba(255,0,128,0.2)}
.badge-amber{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono';background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.2)}
.watermark{position:fixed;bottom:8px;left:12px;z-index:1;font-family:'Orbitron',monospace;font-size:10px;color:rgba(124,58,237,0.08);letter-spacing:.1em;pointer-events:none}
.input{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:8px 12px;color:#e0e0e8;font-size:12px;outline:none;font-family:'Inter',sans-serif}
.input:focus{border-color:rgba(0,212,255,0.3)}
.btn{padding:6px 14px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);border-radius:6px;color:#00d4ff;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.btn:hover{background:rgba(0,212,255,0.15)}
.btn-magenta{background:rgba(255,0,128,0.08);border-color:rgba(255,0,128,0.15);color:#ff0080}
.btn-magenta:hover{background:rgba(255,0,128,0.15)}
.progress-bar{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
</style>

<div class="three-bg" id="three-bg"></div>
<div id="ui-root"></div>
<div class="watermark">FutureSpeak.AI</div>

<script>
let threeScene,threeCamera,threeRenderer,threeComposer,cubeGroup,orbitalRings=[],particles;
function initScene(){
  const c=document.getElementById('three-bg');
  threeScene=new THREE.Scene();threeScene.background=new THREE.Color(0x000103);
  threeCamera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);threeCamera.position.z=5;
  threeRenderer=new THREE.WebGLRenderer({antialias:true});threeRenderer.setSize(innerWidth,innerHeight);
  threeRenderer.setPixelRatio(Math.min(devicePixelRatio,2));threeRenderer.toneMapping=THREE.ACESFilmicToneMapping;threeRenderer.toneMappingExposure=1.2;
  c.appendChild(threeRenderer.domElement);
  threeComposer=new THREE.EffectComposer(threeRenderer);threeComposer.addPass(new THREE.RenderPass(threeScene,threeCamera));
  threeComposer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.8,0.4,0.2));
  threeScene.add(new THREE.AmbientLight(0x111133,0.3));
  const l1=new THREE.PointLight(0x00d4ff,0.8,20);l1.position.set(5,5,5);threeScene.add(l1);
  const l2=new THREE.PointLight(0xff0080,0.3,20);l2.position.set(-5,-3,3);threeScene.add(l2);
  cubeGroup=new THREE.Group();const sz=0.22,gp=0.12,n=3,off=(n-1)*(sz+gp)/2;
  for(let x=0;x<n;x++)for(let y=0;y<n;y++)for(let z=0;z<n;z++){
    const g=new THREE.BoxGeometry(sz,sz,sz);
    const m=new THREE.MeshPhongMaterial({color:0x7c3aed,emissive:0x3b1f8c,emissiveIntensity:0.4,transparent:true,opacity:0.15});
    const cube=new THREE.Mesh(g,m);cube.position.set(x*(sz+gp)-off,y*(sz+gp)-off,z*(sz+gp)-off);cube.userData={ix:x,iy:y,iz:z};cubeGroup.add(cube);
    const wm=new THREE.MeshBasicMaterial({color:0x00d4ff,wireframe:true,transparent:true,opacity:0.07});
    const w=new THREE.Mesh(g.clone(),wm);w.position.copy(cube.position);cubeGroup.add(w);
  }
  threeScene.add(cubeGroup);
  for(let i=0;i<3;i++){const rg=new THREE.TorusGeometry(1.6+i*0.35,0.006,8,64);const rm=new THREE.MeshBasicMaterial({color:0x00d4ff,transparent:true,opacity:0.04});const ring=new THREE.Mesh(rg,rm);ring.rotation.x=Math.PI/3+i*0.4;ring.rotation.y=i*0.6;threeScene.add(ring);orbitalRings.push(ring)}
  const pg=new THREE.BufferGeometry();const pp=new Float32Array(800*3);for(let i=0;i<2400;i++)pp[i]=(Math.random()-0.5)*60;
  pg.setAttribute('position',new THREE.BufferAttribute(pp,3));particles=new THREE.Points(pg,new THREE.PointsMaterial({color:0xffffff,size:0.04,transparent:true,opacity:0.5,sizeAttenuation:true}));threeScene.add(particles);
  addEventListener('resize',()=>{threeCamera.aspect=innerWidth/innerHeight;threeCamera.updateProjectionMatrix();threeRenderer.setSize(innerWidth,innerHeight);threeComposer.setSize(innerWidth,innerHeight)});
  animate();
}
function animate(){requestAnimationFrame(animate);const t=Date.now()*0.001;
  if(cubeGroup){cubeGroup.rotation.y=t*0.08;cubeGroup.rotation.x=Math.sin(t*0.06)*0.12;
    cubeGroup.children.forEach(c=>{if(c.userData.ix!==undefined){c.scale.setScalar(0.95+Math.sin(t*1.5+c.userData.ix*0.8+c.userData.iy*0.6+c.userData.iz*0.4)*0.05)}});}
  orbitalRings.forEach((r,i)=>{r.rotation.z=t*(0.03+i*0.01)});if(particles)particles.rotation.y=t*0.003;threeComposer.render();}
addEventListener('DOMContentLoaded',initScene);
</script>

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const WS=[
  {id:'home',ico:'🏠',label:'Home'},{id:'career',ico:'💼',label:'Career'},{id:'wiki',ico:'📚',label:'Wiki'},
  {id:'coparent',ico:'👨‍👩‍👧',label:'Co-Parent'},{id:'futurespeak',ico:'🚀',label:'FutureSpeak'},{id:'family',ico:'👪',label:'Family'},
  {id:'studio',ico:'🎨',label:'Studio'},{id:'trust',ico:'🔗',label:'Trust'},{id:'system',ico:'🖥️',label:'System'},
  {id:'code',ico:'💻',label:'Code'},{id:'news',ico:'📰',label:'News'}
];
function FWin({id,title,emoji,children,onClose,zIndex,onFocus}){
  const[pos,setPos]=useState({x:60+Math.random()*300,y:40+Math.random()*80});
  const[size,setSize]=useState({w:660,h:460});
  const[dragging,setDragging]=useState(false);const[resizing,setResizing]=useState(false);
  const dOff=useRef({x:0,y:0});const rStart=useRef({x:0,y:0,w:0,h:0});
  useEffect(()=>{if(!dragging)return;const mv=e=>setPos({x:Math.max(0,e.clientX-dOff.current.x),y:Math.max(0,e.clientY-dOff.current.y)});const up=()=>setDragging(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[dragging]);
  useEffect(()=>{if(!resizing)return;const mv=e=>setSize({w:Math.max(400,rStart.current.w+e.clientX-rStart.current.x),h:Math.max(280,rStart.current.h+e.clientY-rStart.current.y)});const up=()=>setResizing(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[resizing]);
  return(<div className="fwin" style={{left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex}} onClick={onFocus}>
    <div className="fwin-bar" onMouseDown={e=>{if(e.target.closest('.fwin-btns'))return;setDragging(true);dOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y};onFocus()}}>
      <span className="fwin-title">{emoji} {title}</span><div className="fwin-btns"><button onClick={onClose}>×</button></div>
    </div><div className="fwin-body">{children}</div>
    <div className="resize-h" onMouseDown={e=>{e.stopPropagation();setResizing(true);rStart.current={x:e.clientX,y:e.clientY,w:size.w,h:size.h};onFocus()}}/>
  </div>);
}
// ═══ WORKSPACES ═══
function HomeWS(){
  const[cd,setCd]=useState(null);const[trust,setTrust]=useState(null);const[pers,setPers]=useState(null);const[mem,setMem]=useState(null);const[epi,setEpi]=useState(null);const[todos,setTodos]=useState([]);
  useEffect(()=>{
    fetch('/api/countdowns').then(r=>r.json()).then(setCd).catch(()=>{});
    fetch('/api/trust').then(r=>r.json()).then(setTrust).catch(()=>{});
    fetch('/api/personality').then(r=>r.json()).then(setPers).catch(()=>{});
    fetch('/api/memory/stats').then(r=>r.json()).then(setMem).catch(()=>{});
    fetch('/api/epistemic').then(r=>r.json()).then(setEpi).catch(()=>{});
    fetch('/api/todos').then(r=>r.json()).then(d=>setTodos(d.todos||[])).catch(()=>{});
  },[]);
  const approveTodo=id=>fetch(`/api/todos/${id}/approve`,{method:'POST'}).then(()=>setTodos(t=>t.map(x=>x.id===id?{...x,status:'approved'}:x)));
  const rejectTodo=id=>fetch(`/api/todos/${id}/reject`,{method:'POST'}).then(()=>setTodos(t=>t.filter(x=>x.id!==id)));
  return(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
    <div className="card"><div className="card-title">Upcoming Events</div>{cd?.countdowns?.map((c,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.03)'}}><span>{c.emoji||'📅'} {c.name}</span><span className="stat" style={{fontSize:16,color:'#00d4ff'}}>{c.days_until}d</span></div>)||<span style={{color:'#555'}}>Loading...</span>}</div>
    <div className="card"><div className="card-title">Personality</div><div className="stat">{pers?.session_count||0}</div><div className="stat-label">sessions · {pers?.maturity_pct||'0%'} maturity</div><div style={{marginTop:8}}><span className="badge-green">ONLINE</span></div></div>
    <div className="card"><div className="card-title">Trust Network</div><div className="stat">{trust?.people?.length||0}</div><div className="stat-label">entities tracked</div></div>
    <div className="card"><div className="card-title">Epistemic Score</div><div className="stat" style={{color:epi?.overall>0.6?'#00ff80':epi?.overall>0.4?'#f59e0b':'#ff0080'}}>{epi?.overall?.toFixed(2)||'0.50'}</div><div className="stat-label">independence index</div></div>
    <div className="card"><div className="card-title">Memory Banks</div><div style={{fontSize:12}}><div style={{display:'flex',justifyContent:'space-between'}}><span>🔵 Short-term</span><span>{mem?.short||0}</span></div><div style={{display:'flex',justifyContent:'space-between'}}><span>🟣 Medium-term</span><span>{mem?.medium||0}</span></div><div style={{display:'flex',justifyContent:'space-between'}}><span>🟠 Long-term</span><span>{mem?.long||0}</span></div></div></div>
    <div className="card"><div className="card-title">AI To-Do List</div>{todos.length===0?<div style={{color:'#555',fontSize:11}}>No tasks proposed</div>:todos.slice(0,5).map(t=><div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.03)',fontSize:11}}><span style={{flex:1,color:t.status==='approved'?'#00ff80':'#ccc'}}>{t.title||t.task}</span>{t.status==='proposed'&&<><button className="btn" style={{padding:'2px 8px',fontSize:9,marginLeft:4}} onClick={()=>approveTodo(t.id)}>✓</button><button className="btn btn-magenta" style={{padding:'2px 8px',fontSize:9,marginLeft:2}} onClick={()=>rejectTodo(t.id)}>✗</button></>}</div>)}</div>
  </div>);
}
function CareerWS(){
  const[jobs,setJobs]=useState('');const[filter,setFilter]=useState('all');
  useEffect(()=>{fetch('/api/jobs').then(r=>r.json()).then(d=>setJobs(d.content||'')).catch(()=>setJobs('API unavailable'))},[]);
  const lines=jobs.split('\n');const roles=[];let cur=null;
  lines.forEach(l=>{if(l.startsWith('### ')){if(cur)roles.push(cur);cur={title:l.replace('### ',''),lines:[]};}else if(cur)cur.lines.push(l)});if(cur)roles.push(cur);
  return(<div>
    <div style={{display:'flex',gap:6,marginBottom:12}}>{['all','applied','not-applied'].map(f=><button key={f} className={`btn ${filter===f?'':'btn-magenta'}`} style={{fontSize:10}} onClick={()=>setFilter(f)}>{f}</button>)}</div>
    <div style={{display:'flex',gap:8,marginBottom:12}}><div className="card" style={{flex:1,textAlign:'center'}}><div className="stat" style={{fontSize:18}}>{roles.length}</div><div className="stat-label">roles</div></div></div>
    {roles.length===0?<pre style={{whiteSpace:'pre-wrap',fontSize:11,color:'#888',fontFamily:'JetBrains Mono'}}>{jobs.substring(0,2000)}</pre>:
    roles.slice(0,15).map((r,i)=>{const scoreMatch=r.lines.join(' ').match(/Score[:\s]*(\d+)/i);const score=scoreMatch?parseInt(scoreMatch[1]):50;const color=score>80?'#00ff80':score>60?'#f59e0b':'#ff0080';
      return(<div key={i} className="card" style={{marginBottom:6}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:600,fontSize:12}}>{r.title}</span><span style={{fontFamily:'Orbitron',fontSize:13,color}}>{score}</span></div><div className="progress-bar" style={{marginTop:4}}><div className="progress-fill" style={{width:score+'%',background:color}}/></div><div style={{fontSize:10,color:'#666',marginTop:4}}>{r.lines.slice(0,2).join(' ').substring(0,120)}</div></div>)})}
  </div>);
}
function WikiWS(){
  const[struct,setStruct]=useState(null);const[content,setContent]=useState('Select a file from the sidebar');const[path,setPath]=useState('');
  useEffect(()=>{fetch('/api/wiki/structure').then(r=>r.json()).then(setStruct).catch(()=>{})},[]);
  const load=(s,f)=>{setPath(`${s}/${f}`);fetch(`/api/wiki/${s}/${f}`).then(r=>r.json()).then(d=>setContent(d.content||d.error||'Empty')).catch(()=>setContent('Error'))};
  return(<div style={{display:'flex',gap:12,height:'100%'}}>
    <div style={{width:170,borderRight:'1px solid rgba(255,255,255,0.04)',paddingRight:8,overflowY:'auto',flexShrink:0}}>
      {struct?.sections?.map(s=><div key={s.name}><div style={{fontSize:10,color:'#00d4ff',fontFamily:'Orbitron',margin:'8px 0 3px',letterSpacing:'.05em'}}>{s.name}</div>{s.files?.map(f=><div key={f} onClick={()=>load(s.name,f)} style={{fontSize:11,color:path===`${s.name}/${f}`?'#00d4ff':'#666',cursor:'pointer',padding:'2px 0',transition:'color .15s'}} onMouseOver={e=>e.target.style.color='#00d4ff'} onMouseOut={e=>{if(path!==`${s.name}/${f}`)e.target.style.color='#666'}}>{f}</div>)}</div>)||<span style={{color:'#555',fontSize:11}}>Loading...</span>}
    </div>
    <div style={{flex:1,overflowY:'auto'}}>{path&&<div style={{fontSize:10,color:'#555',fontFamily:'JetBrains Mono',marginBottom:8}}>wiki/{path}</div>}<pre style={{whiteSpace:'pre-wrap',fontSize:12,color:'#bbb',fontFamily:'Inter',lineHeight:1.7}}>{content}</pre></div>
  </div>);
}
function CoparentWS(){
  const[data,setData]=useState(null);
  useEffect(()=>{fetch('/api/countdowns').then(r=>r.json()).then(setData).catch(()=>{})},[]);
  const now=new Date();const month=now.getMonth();const year=now.getFullYear();const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();const days=[];for(let i=0;i<firstDay;i++)days.push(null);for(let i=1;i<=daysInMonth;i++)days.push(i);
  const isThursday=d=>d&&new Date(year,month,d).getDay()===4;
  const weekNum=d=>{if(!d)return 0;const dt=new Date(year,month,d);const first=new Date(year,month,1);let wk=0;for(let i=1;i<=d;i++){if(new Date(year,month,i).getDay()===0)wk++}return wk+1};
  const isCustodyWeekend=d=>{if(!d)return false;const dt=new Date(year,month,d);const dow=dt.getDay();if(dow!==0&&dow!==6)return false;const wk=weekNum(d);return wk===1||wk===3||wk===5};
  return(<div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <div className="card"><div className="card-title">OFW Stats</div><div className="stat">852</div><div className="stat-label">total messages analyzed</div><div style={{marginTop:6,fontSize:11,color:'#888'}}>Response asymmetry: 25h vs 3.3h first-view</div></div>
      <div className="card"><div className="card-title">Unanswered Threads</div><div className="stat" style={{color:'#ff0080'}}>89</div><div className="stat-label">messages awaiting response</div></div>
    </div>
    <div className="card" style={{marginBottom:12}}><div className="card-title">Custody Calendar — {['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][month]} {year}</div>

function TrustWS(){

  return(<div>
    <div className="card-title">Trust Graph — {people.length} Entities</div>
    {people.map((p,i)=>{const s=p.scores?.overall||0.5;const pct=Math.round(s*100);const col=pct>70?'#00ff80':pct>40?'#f59e0b':'#ff0080';
      return(<div key={i} className="card" style={{marginBottom:6,cursor:'pointer'}} onClick={()=>setExpanded(expanded===i?null:i)}>

        <div className="progress-bar" style={{marginTop:4}}><div className="progress-fill" style={{width:pct+'%',background:col}}/></div>
        {expanded===i&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.04)'}}>

// ═══ APP ═══
function App(){
  const[openWins,setOpenWins]=useState(new Set(['home']));const[focusWin,setFocusWin]=useState('home');
  const[zMap,setZMap]=useState({home:41});const[zC,setZC]=useState(42);
  const[chatOpen,setChatOpen]=useState(false);const[chatMsgs,setChatMsgs]=useState([]);const[chatIn,setChatIn]=useState('');const[chatLoad,setChatLoad]=useState(false);
  const[clock,setClock]=useState(new Date());const[notifs,setNotifs]=useState([]);
  const chatEnd=useRef(null);
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{fetch('/api/chat/history').then(r=>r.json()).then(d=>{if(d.messages)setChatMsgs(d.messages)}).catch(()=>{})},[]);
  useEffect(()=>{fetch('/api/notifications').then(r=>r.json()).then(d=>setNotifs(d.items||[])).catch(()=>{});const iv=setInterval(()=>{fetch('/api/notifications').then(r=>r.json()).then(d=>setNotifs(d.items||[])).catch(()=>{})},30000);return()=>clearInterval(iv)},[]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'})},[chatMsgs]);
  const toggle=id=>{setOpenWins(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});bringFront(id)};
  const close=id=>setOpenWins(p=>{const n=new Set(p);n.delete(id);return n});
  const bringFront=id=>{setFocusWin(id);setZC(c=>{setZMap(m=>({...m,[id]:c}));return c+1})};
  const sendChat=async()=>{if(!chatIn.trim())return;const m=chatIn.trim();setChatIn('');setChatMsgs(p=>[...p,{role:'user',text:m,time:new Date().toLocaleTimeString()}]);setChatLoad(true);
    try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m})});const d=await r.json();setChatMsgs(p=>[...p,{role:'friday',text:d.response,time:new Date().toLocaleTimeString()}])}catch(e){setChatMsgs(p=>[...p,{role:'friday',text:'[Error]',time:new Date().toLocaleTimeString()}])}setChatLoad(false)};
  const wsMap={home:<HomeWS/>,career:<CareerWS/>,wiki:<WikiWS/>,coparent:<CoparentWS/>,futurespeak:<FuturespeakWS/>,family:<FamilyWS/>,studio:<StudioWS/>,trust:<TrustWS/>,system:<SystemWS/>,code:<CodeWS/>,news:<NewsWS/>};
  const wsInfo=WS.reduce((a,w)=>{a[w.id]=w;return a},{});
  const unread=notifs.filter(n=>!n.read).length;
  return(<>
    <div className="top-bar">
      <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontFamily:'Orbitron',fontWeight:900,fontSize:16,color:'#00d4ff'}}>FRIDAY</span><span style={{color:'rgba(124,58,237,0.4)'}}>|</span><span style={{fontFamily:'Orbitron',fontSize:10,color:'rgba(124,58,237,0.5)',letterSpacing:'.08em'}}>FutureSpeak.AI</span></div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#555'}}>{clock.toLocaleTimeString('en-US',{hour12:false})}</span>
        <button onClick={()=>{}} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:14,position:'relative'}}>🔔{unread>0&&<span style={{position:'absolute',top:-4,right:-4,width:14,height:14,borderRadius:'50%',background:'#ff0080',fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{unread}</span>}</button>
        <button onClick={()=>setChatOpen(!chatOpen)} style={{background:'none',border:'none',color:chatOpen?'#00d4ff':'#555',cursor:'pointer',fontSize:14}}>💬</button>
        <div style={{width:7,height:7,borderRadius:'50%',background:'#00ff80'}}/>
      </div>
    </div>
    {[...openWins].map(id=>{const w=wsInfo[id];if(!w)return null;return(<FWin key={id} id={id} title={w.label} emoji={w.ico} zIndex={zMap[id]||41} onClose={()=>close(id)} onFocus={()=>bringFront(id)}>{wsMap[id]||<div>Coming soon</div>}</FWin>)})}
    <div className={`chat-panel ${chatOpen?'open':''}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>FRIDAY CHAT</span>
        <button onClick={()=>setChatOpen(false)} style={{background:'none',border:'none',color:'#555',cursor:'pointer'}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:12}}>
        {chatMsgs.length===0&&<div style={{textAlign:'center',color:'#444',fontSize:12,marginTop:30}}>Talk to Friday...</div>}
        {chatMsgs.map((m,i)=><div key={i} style={{textAlign:m.role==='user'?'right':'left',marginBottom:8}}>
          <div style={{display:'inline-block',maxWidth:'80%',padding:'7px 11px',borderRadius:8,fontSize:12,background:m.role==='user'?'rgba(124,58,237,0.12)':'rgba(255,255,255,0.03)',color:m.role==='user'?'#b794f6':'#bbb'}}>{m.text}</div>
          <div style={{fontSize:9,color:'#444',marginTop:1}}>{m.role==='user'?'You':'Friday'} · {m.time}</div>
        </div>)}
        {chatLoad&&<div style={{fontSize:11,color:'#00d4ff'}}>Friday is thinking...</div>}
        <div ref={chatEnd}/>
      </div>
      <div style={{padding:10,borderTop:'1px solid rgba(255,255,255,0.04)'}}>
        <div style={{display:'flex',gap:6}}><input className="input" style={{flex:1}} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendChat()} placeholder="Talk to Friday..."/><button className="btn" onClick={sendChat}>Send</button></div>
      </div>
    </div>
    <div className="dock">{WS.map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''}`} onClick={()=>toggle(w.id)}><span className="ico">{w.ico}</span><span>{w.label}</span><span className="dot"/></button>)}</div>
  </>);
}
ReactDOM.createRoot(document.getElementById('ui-root')).render(<App/>);
</script>
