        function setGroupOpacity(group, opacityMultiplier) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData && child.material.userData.baseOpacity !== undefined) {
                    child.material.opacity = child.material.userData.baseOpacity * opacityMultiplier;
                }
            });
        }

        function updateGroupColors(group) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData) {
                    const targetColor = child.material.userData.isAccent || (child.userData && child.userData.isAccent) ? moodLerpValues.accentColor : moodLerpValues.baseColor;
                    
                    if (child === mandelbrotSystem && mandelbrotSystem && mandelbrotSystem.geometry && mandelbrotSystem.geometry.attributes.color) {
                        const colors = child.geometry.attributes.color.array; const mData = child.userData.data;
                        for(let i=0; i<mData.length; i++) {
                            const c = new THREE.Color().copy(moodLerpValues.baseColor).lerp(moodLerpValues.accentColor, mData[i].iterRatio);
                            colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                        }
                        child.geometry.attributes.color.needsUpdate = true;
                    } else if (child.material.userData.isTunnelSolid) {
                        child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.05);
                    } else if (child.material.userData.isBossSphere) {
                        child.material.color.copy(moodLerpValues.baseColor);
                    } else if (child.material.userData.isBossWire) {
                        child.material.color.copy(moodLerpValues.accentColor).multiplyScalar(0.3);
                    } else if (child.material.userData.isPlayerBody) {
                        child.material.color.setHex(0xffffff); 
                    } else if (child.material.color && targetStructure !== 'QUANTUM') {
                        child.material.color.copy(targetColor);
                        if(child.geometry && child.geometry.type === 'BoxGeometry' && !child.material.wireframe && (currentStructure === 'CUBES' || targetStructure === 'CUBES')) {
                            child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.15); 
                        }
                    }
                }
            });
        }

        async function setupAudio() {
            if (audioContext) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
                source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
                micActive = true; lastSoundTime = clock.getElapsedTime(); 
            } catch (err) { console.warn("Using procedural heartbeat."); }
        }

        function onWindowResize() {
            if(!camera || !renderer || !composer) return;
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        }

        function smoothstep(x) { return x * x * (3 - 2 * x); }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); 
            const elapsed = clock.getElapsedTime() * 0.5;

            // --- HAND CURSOR LOGIC (Minority Report) ---
            const cursor = document.getElementById('hand-cursor');
            const pRing = document.querySelector('.pinch-circle');
            if (isHandTrackingMode) {
                currHandX += (rawHandX - currHandX) * 0.25; 
                currHandY += (rawHandY - currHandY) * 0.25; 
                cursor.style.left = `${currHandX}px`; cursor.style.top = `${currHandY}px`;
                
                if (isPinching) {
                    if(!wasPinching) { pinchStartTime = performance.now(); rightClickFired = false; cursor.classList.add('pinching'); }
                    const duration = performance.now() - pinchStartTime;
                    if (duration > 200) {
                        document.getElementById('pinch-progress').style.opacity = 1;
                        const progress = Math.min(1.0, (duration - 200) / PINCH_HOLD_TIME);
                        pRing.style.strokeDashoffset = 95 * (1.0 - progress);
                        if (progress >= 1.0 && !rightClickFired) {
                            rightClickFired = true; spawnRipple(currHandX, currHandY, '#ff00ff');
                        }
                    }
                } else {
                    if (wasPinching) {
                        const duration = performance.now() - pinchStartTime;
                        cursor.classList.remove('pinching');
                        document.getElementById('pinch-progress').style.opacity = 0; pRing.style.strokeDashoffset = 95;
                        if (duration < 500) {
                            spawnRipple(currHandX, currHandY, '#00ffff');
                            cursor.style.display = 'none'; 
                            let el = document.elementFromPoint(currHandX, currHandY);
                            cursor.style.display = 'flex';
                            if (el && typeof el.click === 'function') el.click();
                        }
                    }
                }
                wasPinching = isPinching;
            }

            // --- STABILIZED TRUE 3D HOLOGRAPHIC PARALLAX OFFSET ---
            if (isHologramMode && isFaceVisible) {
                currFaceX += (rawFaceX - currFaceX) * 0.08; 
                currFaceY += (rawFaceY - currFaceY) * 0.08;
                currFaceZ += (rawFaceZ - currFaceZ) * 0.05; 
            } else {
                currFaceX += (mouseX - currFaceX) * 0.04; 
                currFaceY += (mouseY - currFaceY) * 0.04; 
                currFaceZ += (0 - currFaceZ) * 0.04;
            }

            // --- TIME LAPSE LOGIC ---
            if (timeLapseActive) {
                timeLapseTimer += delta;
                if (timeLapseTimer > 10.0) { timeLapseTimer = 0; setEvolution((currentEvolutionIdx + 1) % EVOLUTION_PATH.length); }
            }

            if (metamorphosisFlash > 0) metamorphosisFlash = Math.max(0, metamorphosisFlash - delta * 0.3);

            // --- AUDIO PROCESSING ---
            const heartbeat = (Math.sin(elapsed * Math.PI) + 1) / 2;
            if (micActive && analyser && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let low = 0, mid = 0, high = 0;
                for(let i=0; i<8; i++) low += dataArray[i]; for(let i=8; i<40; i++) mid += dataArray[i]; for(let i=40; i<100; i++) high += dataArray[i];
                audioData.low = (low / 8 / 255) + (heartbeat * 0.05); audioData.mid = mid / 32 / 255; audioData.high = high / 60 / 255;
                audioData.total = (audioData.low + audioData.mid + audioData.high) / 3;
                if (audioData.total > 0.02) lastSoundTime = elapsed;
            } else {
                audioData.low = heartbeat * 0.15; audioData.mid = heartbeat * 0.05; audioData.high = 0; audioData.total = audioData.low;
            }

            const isQuiet = (elapsed - lastSoundTime > 6.0);
            // Floor at 0.6 (was 0.2): quiet idle should still feel luminous, not dead.
            const targetIdle = isQuiet ? 0.6 : 1.0;
            idleFactor = THREE.MathUtils.lerp(idleFactor, targetIdle, delta * (isQuiet ? 0.3 : 2.0));

            // --- MOOD LERPING ---
            const moodLerp = delta * 0.5; const tMood = MOODS[currentMood];
            if(tMood) {
                moodLerpValues.baseColor.lerp(new THREE.Color(tMood.baseColor), moodLerp);
                moodLerpValues.accentColor.lerp(new THREE.Color(tMood.accentColor), moodLerp);
                moodLerpValues.rotationSpeed = THREE.MathUtils.lerp(moodLerpValues.rotationSpeed, tMood.rotationSpeed, moodLerp);
                moodLerpValues.bloomStrength = THREE.MathUtils.lerp(moodLerpValues.bloomStrength, tMood.bloomStrength, moodLerp);
                moodLerpValues.particleSpeedScale = THREE.MathUtils.lerp(moodLerpValues.particleSpeedScale, tMood.particleSpeedScale, moodLerp);
                moodLerpValues.grain = THREE.MathUtils.lerp(moodLerpValues.grain, tMood.grain, moodLerp);
            }

            // --- HUD UPDATES ---
            const hudEl = document.getElementById('hud-overlay');
            if (hudEl) {
                hudEl.style.setProperty('--hud-r', Math.floor(moodLerpValues.baseColor.r * 255));
                hudEl.style.setProperty('--hud-g', Math.floor(moodLerpValues.baseColor.g * 255));
                hudEl.style.setProperty('--hud-b', Math.floor(moodLerpValues.baseColor.b * 255));
                hudEl.style.setProperty('--hud-opacity', Math.min(0.8, 0.2 + (audioData.total * 1.5) + (metamorphosisFlash * 0.5)));
                hudEl.style.transform = `perspective(1000px) rotateY(${currFaceX * -2}deg) rotateX(${currFaceY * 2}deg) translateZ(0px)`;
            }


            nebulaClouds.forEach(cloud => {
                if(cloud && cloud.material && cloud.userData && cloud.rotation) {
                    const targetColor = cloud.userData.isAccent ? moodLerpValues.accentColor : moodLerpValues.baseColor;
                    cloud.material.color.copy(targetColor);
                    cloud.material.opacity = 0.03 + audioData.low * 0.05 + (metamorphosisFlash * 0.1);
                    cloud.rotation.z += cloud.userData.speed;
                    cloud.position.z += delta * 0.5; if(cloud.position.z > 0) cloud.position.z = -100;
                }
            });

            // --- STRUCTURE TRANSITIONS ---
            if (transitionProgress < 1.0) transitionProgress = Math.min(1.0, transitionProgress + delta * 0.125);
            const ease = smoothstep(transitionProgress); 
            const scatterIntensity = Math.sin(transitionProgress * Math.PI) + (metamorphosisFlash * 1.5); 

            Object.keys(structures).forEach(key => {
                const g = structures[key];
                if(g) {
                    updateGroupColors(g);
                    if (key === targetStructure) { g.visible = true; setGroupOpacity(g, ease); g.scale.setScalar(1.2 - ease * 0.2); }
                    else if (key === currentStructure && transitionProgress < 1.0) { setGroupOpacity(g, 1 - ease); g.scale.setScalar(1.0 + ease * 0.5); }
                    else g.visible = false;
                }
            });
            if (transitionProgress >= 1.0 && currentStructure !== targetStructure) currentStructure = targetStructure;

            // --- CINEMATIC TRUE-3D CAMERA PARALLAX ---
            if(camera) {
                if (targetStructure === 'DOME') { targetCamPos.set(0, -6 + Math.sin(elapsed*0.2)*2, 18); targetCamLook.set(0, 5, 0); } 
                else if (targetStructure === 'GRID') { targetCamPos.set(0, 2 + Math.sin(elapsed*0.2)*1, 15 - (elapsed*2) % 10); targetCamLook.set(0, 1, 0); } 
                else if (targetStructure === 'CABLES' || targetStructure === 'ASTROLABE') { targetCamPos.set(Math.sin(elapsed*0.1)*12, Math.cos(elapsed*0.1)*12, 15 + Math.sin(elapsed*0.2)*5); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'MANDELBROT') { targetCamPos.set(Math.sin(elapsed*0.2)*14, 8 + Math.sin(elapsed*0.3)*3, Math.cos(elapsed*0.2)*14); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'NETWORK') { targetCamPos.set(Math.sin(elapsed*0.2)*10, Math.sin(elapsed*0.3)*6, Math.cos(elapsed*0.2)*10); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'EDEN') { targetCamPos.set(Math.sin(elapsed*0.5)*2, Math.cos(elapsed*0.3)*1.5, 28); targetCamLook.set(0, 0, 0); } 
                else { targetCamPos.set(Math.sin(elapsed*0.15)*6, 5 + Math.cos(elapsed*0.2)*2, 18 + Math.sin(elapsed*0.1)*3); targetCamLook.set(0, 0, 0); }

                baseCamPos.lerp(targetCamPos, delta * 0.8);

                const parallaxX = currFaceX * 5.0; 
                const parallaxY = currFaceY * -5.0; 
                const parallaxZ = currFaceZ * -8.0; 

                camera.position.x = baseCamPos.x + parallaxX;
                camera.position.y = baseCamPos.y + parallaxY;
                camera.position.z = baseCamPos.z + parallaxZ;

                const lookTarget = targetCamLook.clone();
                lookTarget.x += parallaxX * 0.15; 
                lookTarget.y += parallaxY * 0.15;

                const currentLook = new THREE.Vector3(); camera.getWorldDirection(currentLook);
                const idealLook = lookTarget.sub(camera.position).normalize();
                currentLook.lerp(idealLook, delta * 2.0); 
                camera.lookAt(camera.position.clone().add(currentLook));
            }

            // --- ANIMATE ACTIVE STRUCTURES ---
            const activeGroup = structures[targetStructure];
            const interactionForce = Math.min(1.0, Math.abs(currFaceX) + Math.abs(currFaceY) + Math.abs(currFaceZ)); 
            
            if (activeGroup && activeGroup.rotation && !['GRID','MANDELBROT','TESSERACT','NETWORK','EDEN'].includes(targetStructure)) {
                activeGroup.rotation.y += moodLerpValues.rotationSpeed * idleFactor;
                if (targetStructure !== 'DOME') activeGroup.rotation.z += moodLerpValues.rotationSpeed * 0.5 * idleFactor;
            }

            if (structures['CUBES'] && structures['CUBES'].visible && coreCubes.length > 0) {
                coreCubes.forEach(c => {
                    if (c && c.rotation && c.position && c.userData) {
                        c.rotation.x += 0.01 * c.userData.speed * idleFactor; c.rotation.y += 0.012 * c.userData.speed * idleFactor;
                        const organicBreathe = Math.sin(elapsed * 2.0 * c.userData.speed + c.userData.rx) * 0.15;
                        const expansion = organicBreathe + (audioData.low * 1.5) + (interactionForce * 1.5);
                        c.position.set(
                            c.userData.baseX + c.userData.dir.x * expansion, 
                            c.userData.baseY + c.userData.dir.y * expansion, 
                            c.userData.baseZ + c.userData.dir.z * expansion
                        );
                    }
                });
            }

            if (structures['DOME'] && structures['DOME'].visible) {
                if(abyssParticles && abyssParticles.rotation && abyssParticles.scale) {
                    abyssParticles.rotation.y -= 0.005 * idleFactor;
                    abyssParticles.scale.setScalar(1.0 + audioData.low * 0.3 * idleFactor);
                }
                cathedralRings.forEach((c, i) => {
                    if(c && c.rotation && c.scale) {
                        c.rotation.y += 0.002 * (i%2==0?1:-1) * idleFactor;
                        c.scale.setScalar(1.0 + audioData.mid * 0.1);
                    }
                });
            }

            if (structures['GRID'] && structures['GRID'].visible && gridOcean && gridOcean.geometry && gridOcean.geometry.attributes.position && gridOcean.userData) {
                const positions = gridOcean.geometry.attributes.position.array; const baseYs = gridOcean.userData.baseY;
                for(let i=0; i<gridOcean.geometry.attributes.position.count; i++) {
                    positions[i*3+1] = baseYs[i] + Math.sin(positions[i*3] * 0.1 + elapsed) * 0.8 + Math.cos(positions[i*3+2] * 0.1 - elapsed * 1.2) * 0.8 + Math.sin(positions[i*3]*0.3 + positions[i*3+2]*0.3) * (audioData.low * 3.0 * idleFactor);
                }
                gridOcean.geometry.attributes.position.needsUpdate = true;
            }

            if (structures['MANDELBROT'] && structures['MANDELBROT'].visible && mandelbrotSystem && mandelbrotSystem.rotation && mandelbrotSystem.geometry && mandelbrotSystem.geometry.attributes.position && mandelbrotSystem.userData) {
                mandelbrotSystem.rotation.y = elapsed * 0.05;
                const positions = mandelbrotSystem.geometry.attributes.position.array; const mData = mandelbrotSystem.userData.data;
                const colors = mandelbrotSystem.geometry.attributes.color.array;
                for(let i=0; i<mData.length; i++) {
                    const wave = Math.sin(mData[i].baseX*0.5 + elapsed) * Math.cos(mData[i].baseZ*0.5 + elapsed) * (audioData.low * 3.0);
                    positions[i*3+1] = mData[i].baseY + (audioData.low * 4.0 * mData[i].iterRatio * idleFactor) + wave;
                    const c = new THREE.Color().copy(moodLerpValues.baseColor).lerp(moodLerpValues.accentColor, mData[i].iterRatio + audioData.mid);
                    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                }
                mandelbrotSystem.geometry.attributes.position.needsUpdate = true;
                mandelbrotSystem.geometry.attributes.color.needsUpdate = true;
            }

            if (structures['ASTROLABE'] && structures['ASTROLABE'].visible && astrolabeRings.length > 0) {
                astrolabeRings.forEach((ring, i) => {
                    if (ring && ring.rotation && ring.userData) {
                        ring.rotation.x += ring.userData.rxSpeed * (1 + audioData.mid*3);
                        ring.rotation.y += ring.userData.rySpeed * (1 + audioData.mid*3);
                    }
                });
            }

            if (structures['TESSERACT'] && structures['TESSERACT'].visible && tesseractLines && tesseractLines.userData && tesseractLines.geometry && tesseractLines.geometry.attributes.position) {
                const tessGroup = structures['TESSERACT'];
                if (tessGroup && tessGroup.children.length > 1) {
                    const tessNodes = tessGroup.children[1];
                    tesseractLines.userData.angleXW += (0.5 + audioData.low * 3.0) * delta * idleFactor;
                    tesseractLines.userData.angleYW += (0.3 + audioData.low * 2.0) * delta * idleFactor;
                    const cosXW = Math.cos(tesseractLines.userData.angleXW), sinXW = Math.sin(tesseractLines.userData.angleXW);
                    const cosYW = Math.cos(tesseractLines.userData.angleYW), sinYW = Math.sin(tesseractLines.userData.angleYW);
                    const pts3D = [];

                        tesseractLines.userData.pts4D.forEach(p => {
                            let x = p.x, y = p.y, z = p.z, w = p.w;
                            let nx = x*cosXW - w*sinXW; let nw = x*sinXW + w*cosXW; x = nx; w = nw;
                            let ny = y*cosYW - w*sinYW; nw = y*sinYW + w*cosYW; y = ny; w = nw;
                            let w_factor = 2 / (4 - w);
                            pts3D.push(new THREE.Vector3(x*w_factor, y*w_factor, z*w_factor));
                        });
                    }
                    const lPositions = tesseractLines.geometry.attributes.position.array;
                    const edges = tesseractLines.userData.edges;
                    if (edges && pts3D.length > 0) {
                        for(let i=0; i<edges.length; i+=2) {
                            let idx = (i/2)*6; let e1 = edges[i]; let e2 = edges[i+1];
                            if (pts3D[e1] && pts3D[e2]) {
                                lPositions[idx] = pts3D[e1].x; lPositions[idx+1] = pts3D[e1].y; lPositions[idx+2] = pts3D[e1].z;
                                lPositions[idx+3] = pts3D[e2].x; lPositions[idx+4] = pts3D[e2].y; lPositions[idx+5] = pts3D[e2].z;
                            }
                        }
                    }
                    tesseractLines.geometry.attributes.position.needsUpdate = true;
                    if (tessNodes && tessNodes.geometry && tessNodes.geometry.attributes.position) {
                        const nPositions = tessNodes.geometry.attributes.position.array;
                        pts3D.forEach((p, i) => { if(p) { nPositions[i*3] = p.x; nPositions[i*3+1] = p.y; nPositions[i*3+2] = p.z; } });
                        tessNodes.geometry.attributes.position.needsUpdate = true;

                }
            }

            if (structures['NETWORK'] && structures['NETWORK'].visible && shannonLines && shannonLines.geometry && shannonNodes.length > 0) {

                        nodePos[i*3] = p.x; nodePos[i*3+1] = p.y; nodePos[i*3+2] = p.z;
                        let connected = 0;
                        for(let j=i+1; j<120; j++) {
                            if(connected > 3 || !shannonNodes[j] || !shannonNodes[j].pos) break;
                            if(p.distanceTo(shannonNodes[j].pos) < 6 + (audioData.high * 6)) { 
                                linePts.push(p, shannonNodes[j].pos); connected++; 
                            }
                        }
                    }
                    netGroup.children[0].geometry.attributes.position.needsUpdate = true;
                    if(linePts.length > 0) shannonLines.geometry.setFromPoints(linePts);
                    else shannonLines.geometry.setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)]);
                }

            if (structures['MOBIUS'] && structures['MOBIUS'].visible && mobiusSystem && mobiusSystem.geometry && mobiusSystem.geometry.attributes.position && mobiusSystem.userData) {
                const positions = mobiusSystem.geometry.attributes.position.array; const mData = mobiusSystem.userData.data;
                const flowOffset = elapsed * (2 + audioData.mid * 4);

                    for(let i=0; i<mData.length; i++) {
                        const u = mData[i].u + flowOffset; const v = mData[i].v; const R = 3.0, r = 1.5;
                        positions[i*3] = (R + r * v * Math.cos(u/2)) * Math.cos(u);
                        positions[i*3+1] = (R + r * v * Math.cos(u/2)) * Math.sin(u);
                        positions[i*3+2] = r * v * Math.sin(u/2);
                    }
                }
                mobiusSystem.geometry.attributes.position.needsUpdate = true;
            }

            if (structures['QUANTUM'] && structures['QUANTUM'].visible && quantumRings.length > 0) {

                        }

                        if (qLine.material && qLine.material.color) {
                            qLine.material.color.setHSL((qLine.userData.colorPhase + elapsed*0.1 + audioData.mid) % 1.0, 1.0, 0.5);

            }

            if (structures['EDEN'] && structures['EDEN'].visible) {

                }
                edenDebris.forEach(d => {
                    if(d && d.position && d.userData) {
                        d.position.z += (d.userData.speed * moodLerpValues.particleSpeedScale) + (audioData.mid * 5);
                        if(d.position.z > 30) {
                            d.position.z = -100;
                            d.position.x = (Math.random()-0.5)*35;
                            d.position.y = (Math.random()-0.5)*35;
                        }
                    }
                });
            }

            if (structures['NONE'] && structures['NONE'].visible && matrixLines.length > 0) {
                matrixLines.forEach(line => { 
                    if(line && line.position && line.userData) {
                        line.position.y += line.userData.speed * (1 + audioData.mid * 3); 
                        if (line.position.y > 20) line.position.y = -20; 
                    }
                });
            }

            // --- GLOBAL PARTICLES (Galactic Supernova Logic) ---
            if (particleSystem && particleSystem.geometry && particleSystem.geometry.attributes.position && particleSystem.geometry.attributes.color && particleSystem.userData) {
                const positions = particleSystem.geometry.attributes.position.array;
                const pData = particleSystem.userData.data; const colors = particleSystem.geometry.attributes.color.array;
                const targetPhiIsHorizontal = (targetStructure === 'DOME' || targetStructure === 'GRID');

                if (pData) {
                    for (let i = 0; i < pData.length; i++) {
                        const p = pData[i];
                        let speed = (p.speed + audioData.mid * 0.5) * moodLerpValues.particleSpeedScale * (1 + holoAmplitude * 2) * idleFactor;
                        if (scatterIntensity > 0) { 
                            speed += scatterIntensity * 3.0; 
                            p.phi += (Math.PI/2 - p.phi) * scatterIntensity * delta * 0.5; 
                        }
                        p.theta += speed * delta;
                        if (scatterIntensity === 0) {
                            const targetPhi = targetPhiIsHorizontal ? (Math.PI / 2 + (Math.random()-0.5)*0.1) : p.basePhi;
                            p.phi = THREE.MathUtils.lerp(p.phi, targetPhi, delta * 1.0);
                        }
                        const moodRadialForce = tMood && tMood.radialForce !== undefined ? tMood.radialForce : 0;
                        let radTarget = p.baseRadius + (moodRadialForce * 5.0) + (scatterIntensity * 10.0) + (holoAmplitude * 2.0);
                        if (targetStructure === 'GRID') radTarget += 8.0;
                        p.radius = THREE.MathUtils.lerp(p.radius, radTarget, delta * 1.5);
                        positions[i*3] = p.radius * Math.sin(p.phi) * Math.cos(p.theta); positions[i*3+1] = p.radius * Math.sin(p.phi) * Math.sin(p.theta); positions[i*3+2] = p.radius * Math.cos(p.phi);
                        colors[i*3] = moodLerpValues.accentColor.r; colors[i*3+1] = moodLerpValues.accentColor.g; colors[i*3+2] = moodLerpValues.accentColor.b;
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true; particleSystem.geometry.attributes.color.needsUpdate = true;
                if(particleSystem.rotation) {
                    particleSystem.rotation.y += (0.001 + audioData.mid * 0.01) * idleFactor;
                }
            }

            // --- ENERGY LINES ---
            energyLines.forEach((line) => {
                if (line && line.userData && line.material && line.material.color) {
                    if (audioData.high > 0.3 && Math.random() > 0.98) line.userData.intensity = 1.0;
                    line.userData.intensity *= 0.95; 
                    const pulse = (Math.sin(elapsed * line.userData.pulseSpeed) + 1) / 2;
                    line.material.opacity = (0.01 + line.userData.intensity * 0.4 + pulse * 0.03) * idleFactor;
                    line.material.color.copy(moodLerpValues.accentColor);
                    if (line.userData.intensity > 0.1) line.material.color.lerp(new THREE.Color(0xffffff), line.userData.intensity);
                }
            });

            // --- HOLOGRAPHIC REACTIVITY UPDATE ---
            holoTargetAmplitude = window._fridayHoloAmplitude || 0;
            holoAmplitude += (holoTargetAmplitude - holoAmplitude) * 0.15;
            if (processOrbManager) processOrbManager.update(delta, elapsed);

            // --- POST PROCESSING ---
            if (bloomPass && holoPass && holoPass.uniforms) {
                const bloomIdle = 0.75 + idleFactor * 0.25;
                const currentBloom = moodLerpValues.bloomStrength * (0.9 + audioData.low * 2.5 + holoAmplitude * 0.8) * bloomIdle;
                bloomPass.strength = Math.max(0.7, currentBloom) + (metamorphosisFlash * 4.0);
                if(holoPass.uniforms.amount) holoPass.uniforms.amount.value = 0.003 + Math.sin(elapsed * 0.5) * 0.002 + (metamorphosisFlash * 0.01);
                if(holoPass.uniforms.angle) holoPass.uniforms.angle.value = Math.sin(elapsed * 0.2);
                if(holoPass.uniforms.grainAmount) holoPass.uniforms.grainAmount.value = moodLerpValues.grain + (metamorphosisFlash * 0.05);
                if(holoPass.uniforms.time) holoPass.uniforms.time.value = elapsed;
            }
            
            if (starField && starField.rotation) starField.rotation.y += 0.0001;
            if (composer) composer.render();
        }

        window.onload = init;

// ═══ COMMAND PALETTE (Ctrl+K) ═══
function CommandPalette({onClose,onOpenWs,openWins}){
  const[q,setQ]=useState('');
  const[sel,setSel]=useState(0);
  const[contacts,setContacts]=useState([]);
  const[routines,setRoutines]=useState([]);
  const inputRef=useRef(null);

  useEffect(()=>{inputRef.current?.focus()},[]);
  useEffect(()=>{
    fetch('/api/contacts').then(r=>r.json()).then(d=>setContacts(d.contacts||d.items||[])).catch(()=>{});
    fetch('/api/routines').then(r=>r.json()).then(d=>setRoutines(d.routines||d.items||[])).catch(()=>{});
  },[]);

  const query=q.trim().toLowerCase();
  const wsResults=WS.filter(w=>!query||w.label.toLowerCase().includes(query)||w.id.includes(query))
    .map(w=>({kind:'ws',id:w.id,ico:w.ico,label:w.label,meta:openWins.has(w.id)?'open':'open workspace'}));
  const contactResults=(query?contacts.filter(c=>(c.name||c.label||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(c=>({kind:'contact',id:c.id||c.name,ico:'👤',label:c.name||c.label,meta:c.email||c.role||'contact'}));
  const routineResults=(query?routines.filter(r=>(r.label||r.name||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(r=>({kind:'routine',id:r.id,ico:'⚡',label:r.label||r.name,meta:r.schedule||r.category||'routine'}));
  const sections=[
    {title:'Workspaces',items:wsResults},
    {title:'Contacts',items:contactResults},
    {title:'Routines',items:routineResults},
  ].filter(s=>s.items.length>0);
  const flat=sections.flatMap(s=>s.items);
  useEffect(()=>{setSel(0)},[q]);

  const activate=(item)=>{
    if(!item)return;
    if(item.kind==='ws')onOpenWs(item.id);
    else if(item.kind==='routine'){
      fetch(`/api/routines/${item.id}/run`,{method:'POST'}).catch(()=>{});
      onClose();
    }else if(item.kind==='contact'){
      onOpenWs('contacts');
    }
  };

  const onKey=(e)=>{
    if(e.key==='Escape'){e.preventDefault();onClose()}
    else if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(flat.length-1,s+1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(0,s-1))}
    else if(e.key==='Enter'){e.preventDefault();activate(flat[sel])}
  };

  return(<div className="cmd-palette-overlay" onClick={onClose}>
    <div className="cmd-palette" onClick={e=>e.stopPropagation()} onKeyDown={onKey}>
      <input ref={inputRef} className="cmd-palette-input" placeholder="Search workspaces, contacts, routines…"

      <div className="cmd-palette-results">
        {flat.length===0&&<div className="cmd-palette-empty">No matches</div>}
        {(()=>{let idx=-1;return sections.map(s=>(<div key={s.title}>
          <div className="cmd-palette-section">{s.title}</div>
          {s.items.map(it=>{idx++;const i=idx;return(
            <div key={`${it.kind}-${it.id}`} className={`cmd-palette-item ${i===sel?'selected':''}`}
              onMouseEnter={()=>setSel(i)} onClick={()=>activate(it)}>
              <span className="ico">{it.ico}</span>
              <span>{it.label}</span>
              <span className="meta">{it.meta}</span>
            </div>
          )})}

      </div>

}

// ═══ SEND-TO DROPDOWN (Data Flow) ═══
function SendTo({content,personName,eventId,emailThreadId,dataType,options}){
  const[open,setOpen]=useState(false);const[status,setStatus]=useState(null);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[open]);
  const defaultOpts=[
    {label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},
    {label:'Save to Trust Graph',dest:'trust_graph',ico:'🔗',needsPerson:true},
    {label:'Send to Calendar',dest:'calendar_notes',ico:'📅',needsEvent:true},
    {label:'Add to Briefing',dest:'briefing',ico:'📰'},
    {label:'Draft Email',dest:'gmail_draft',ico:'✉️'},
  ];
  const opts=(options||defaultOpts).filter(o=>{
    if(o.needsPerson&&!personName)return false;
    if(o.needsEvent&&!eventId)return false;
    return true;
  });
  const send=async(dest)=>{
    setStatus('sending');setOpen(false);
    try{
      const r=await fetch('/api/flow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        data_type:dataType||'general',content:typeof content==='function'?content():content,
        metadata:{person_name:personName||'',event_id:eventId||'',email_thread_id:emailThreadId||''},
        destinations:[dest]
      })});
      const d=await r.json();
      const ok=d.results&&d.results[0]&&d.results[0].ok;
      setStatus(ok?'ok':'fail');
    }catch(e){setStatus('fail')}
    setTimeout(()=>setStatus(null),2000);
  };
  if(opts.length===0)return null;
  return(<div ref={ref} style={{position:'relative',display:'inline-block'}}>
    <button onClick={e=>{e.stopPropagation();setOpen(!open)}} style={{background:'none',border:'1px solid rgba(0,212,255,0.15)',borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:status==='ok'?'#00ff80':status==='fail'?'#ff0080':'#00d4ff',transition:'color .2s'}} title="Send to...">{status==='ok'?'✓':status==='fail'?'✗':status==='sending'?'⏳':'📤'}</button>
    {open&&<div style={{position:'absolute',right:0,top:'100%',marginTop:4,background:'rgba(10,10,18,0.95)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:6,padding:4,minWidth:160,zIndex:9999,backdropFilter:'blur(12px)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
      {opts.map((o,i)=><div key={i} onClick={()=>send(o.dest)} style={{padding:'6px 10px',fontSize:11,color:'#ccc',cursor:'pointer',borderRadius:4,display:'flex',alignItems:'center',gap:6,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,212,255,0.08)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}><span>{o.ico}</span><span>{o.label}</span></div>)}
    </div>}
  </div>);
}

// ═══ CAMERA MODE ═══
// Source can be 'screen' | 'webcam' | 'both'. Captures a JPEG frame from each
// active stream every `intervalSec` seconds and stashes it on window.fridayCamera
// so chat sends and the Live-API bridge can pick it up.
function CameraMode({source,intervalSec,onClose,frameRef,setSendIndicator,facing,onChangeFacing}){
  const screenVideoRef=useRef(null);
  const webcamVideoRef=useRef(null);
  const screenStreamRef=useRef(null);
  const webcamStreamRef=useRef(null);
  const captureCanvasRef=useRef(null);
  const captureTimerRef=useRef(null);
  const[screenErr,setScreenErr]=useState('');
  const[webcamErr,setWebcamErr]=useState('');
  const[pos,setPos]=useState({x:window.innerWidth-180,y:window.innerHeight-160});
  const[dragging,setDragging]=useState(false);
  const dragOff=useRef({x:0,y:0});

  // Acquire / release streams whenever source or facing changes.
  // Cleanup only flips a cancellation flag; the body itself stops streams we
  // no longer want. Stopping all streams on every re-run would cause repeat
  // permission prompts when the user flips the front/rear webcam toggle.
  useEffect(()=>{
    let cancelled=false;
    const stopStream=(streamRef)=>{try{streamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){};streamRef.current=null};
    const wantScreen=source==='screen'||source==='both';
    const wantWebcam=source==='webcam'||source==='both';
    (async()=>{
      if(wantScreen&&!screenStreamRef.current){
        try{
          const s=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:15},audio:false});
          if(cancelled){s.getTracks().forEach(t=>t.stop());return}
          screenStreamRef.current=s;
          if(screenVideoRef.current){screenVideoRef.current.srcObject=s;screenVideoRef.current.play().catch(()=>{})}
          s.getVideoTracks()[0]?.addEventListener('ended',()=>{stopStream(screenStreamRef);if(!cancelled)onClose()});
          setScreenErr('');
        }catch(e){setScreenErr(e.name||'denied');if(source==='screen')onClose()}
      }
      if(!wantScreen&&screenStreamRef.current)stopStream(screenStreamRef);
      if(wantWebcam){
        const cur=webcamStreamRef.current;
        const curFacing=cur?.getVideoTracks?.()[0]?.getSettings?.()?.facingMode;
        if(!cur||(facing&&curFacing&&curFacing!==facing)){
          stopStream(webcamStreamRef);
          try{
            const constraints={video:facing?{facingMode:{ideal:facing}}:true,audio:false};
            const w=await navigator.mediaDevices.getUserMedia(constraints);
            if(cancelled){w.getTracks().forEach(t=>t.stop());return}
            webcamStreamRef.current=w;
            if(webcamVideoRef.current){webcamVideoRef.current.srcObject=w;webcamVideoRef.current.play().catch(()=>{})}
            setWebcamErr('');
          }catch(e){setWebcamErr(e.name||'denied');if(source==='webcam')onClose()}
        }
      }
      if(!wantWebcam&&webcamStreamRef.current)stopStream(webcamStreamRef);
    })();
    return()=>{cancelled=true};
  },[source,facing]);
  // Stop all streams on unmount.
  useEffect(()=>()=>{
    try{screenStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
    try{webcamStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
  },[]);

  // Frame capture loop.
  useEffect(()=>{
    if(!captureCanvasRef.current)captureCanvasRef.current=document.createElement('canvas');
    const grab=(video)=>{
      if(!video||video.readyState<2||!video.videoWidth)return null;
      const c=captureCanvasRef.current;c.width=Math.min(640,video.videoWidth);c.height=Math.round(c.width*video.videoHeight/video.videoWidth);
      const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);
      try{return c.toDataURL('image/jpeg',0.7).split(',')[1]}catch(e){return null}
    };
    const tick=()=>{
      const screen=grab(screenVideoRef.current);
      const webcam=grab(webcamVideoRef.current);
      const primary=screen||webcam;
      if(primary){frameRef.current={screen,webcam,primary,ts:Date.now()};setSendIndicator(true);setTimeout(()=>setSendIndicator(false),400)}
    };
    const ms=Math.max(500,(intervalSec||3)*1000);
    captureTimerRef.current=setInterval(tick,ms);
    setTimeout(tick,400); // first frame quickly
    return()=>{if(captureTimerRef.current)clearInterval(captureTimerRef.current)};
  },[intervalSec,source,facing]);

  // Drag handlers — keep PiP inside the viewport.
  useEffect(()=>{if(!dragging)return;
    const mv=e=>setPos(p=>{const x=Math.max(4,Math.min(window.innerWidth-164,e.clientX-dragOff.current.x));const y=Math.max(44,Math.min(window.innerHeight-124,e.clientY-dragOff.current.y));return{x,y}});
    const up=()=>setDragging(false);
    addEventListener('mousemove',mv);addEventListener('mouseup',up);
    return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)};
  },[dragging]);

  const showScreen=source==='screen'||source==='both';
  const showWebcam=source==='webcam'||source==='both';
  const isBoth=source==='both';

  const pip=(refKey,label,err,extraStyle)=>(<div className={`camera-pip ${dragging?'dragging':''}`}
      style={{left:pos.x+extraStyle.dx,top:pos.y+extraStyle.dy,width:isBoth?120:160,height:isBoth?90:120}}
      onMouseDown={e=>{setDragging(true);dragOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y}}}>
    {refKey==='screen'?<video ref={screenVideoRef} muted playsInline/>:<video ref={webcamVideoRef} muted playsInline/>}
    <span className="cam-label">{label}</span>
    {refKey==='webcam'&&onChangeFacing&&<button className="cam-close" style={{right:30,padding:'1px 6px'}} title="Flip camera"
      onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onChangeFacing()}}>⇄</button>}
    <button className="cam-close" onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onClose()}} title="Stop camera">×</button>
    <span className="cam-active"><span className="pulse"/>LIVE</span>
    {err&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',color:'#ff4d6a',fontSize:11,fontFamily:'JetBrains Mono'}}>{err}</div>}
  </div>);

  return(<>{showScreen&&pip('screen','SCREEN',screenErr,{dx:0,dy:0})}{showWebcam&&pip('webcam','WEBCAM',webcamErr,{dx:isBoth?-130:0,dy:0})}</>);
}

function fmtElapsed(sec){if(sec==null)return'0s';const s=Math.floor(sec);if(s<60)return s+'s';const m=Math.floor(s/60);const r=s%60;if(m<60)return m+'m '+r+'s';const h=Math.floor(m/60);return h+'h '+(m%60)+'m'}
function TaskCard({task,expanded,onToggle,onCancel,onView}){
  const status=task.status||'running';
  return(<div className={'task-card '+status}>
    <div className="task-card-edge"/>
    <div className="task-card-row">
      <div style={{flex:1,minWidth:0,cursor:'pointer'}}
        role="button" tabIndex={0}
        onClick={onToggle}
        onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onToggle()}}}
        title={expanded?'Click to collapse':'Click to expand log'}
        aria-expanded={expanded}>
        <div className="task-card-title">{task.name||'Task'}</div>
        {task.description&&<div className="task-card-sub">{task.description}</div>}
      </div>
      <div className="task-card-actions">
        <button className="task-card-btn" onClick={e=>{e.stopPropagation();onToggle()}} title={expanded?'Collapse':'Expand'} aria-label={expanded?'Collapse task log':'Expand task log'}>{expanded?'▾':'▸'}</button>
        {status==='running'&&<button className="task-card-btn cancel" onClick={e=>{e.stopPropagation();onCancel()}} title="Cancel" aria-label="Cancel task">✕</button>}
      </div>
    </div>
    <div className="task-card-meta">
      <span className="task-card-status">
        {status==='running'&&<><span className="task-card-spinner"/>EXECUTING</>}
        {status==='complete'&&<><span className="task-card-check">✓</span>COMPLETE{task.evaluation&&<span style={{marginLeft:6,fontSize:'0.75em',opacity:0.7}}>{(task.evaluation.match(/GRADE:\s*(\w+)/)||[])[1]||''}</span>}</>}
        {status==='completed_unverified'&&<><span style={{color:'#f59e0b',fontWeight:700}}>⚠</span>UNVERIFIED</>}
        {status==='failed'&&<><span style={{color:'#ff0080',fontWeight:700}}>✕</span>FAILED</>}
      </span>
      <span className="task-card-elapsed">{fmtElapsed(task.elapsed)}</span>
    </div>
    {(status==='complete'||status==='completed_unverified')&&<div style={{marginTop:6,display:'flex',gap:4}}>
      <button className="task-card-btn results" onClick={onView}>View Results</button>
    </div>}
    {expanded&&<div className="task-card-log">
      {(task.log||[]).length===0?<div className="task-card-log-line" style={{color:'#888'}}>— waiting for activity —</div>:
        (task.log||[]).slice(-30).map((line,i)=><div key={i} className="task-card-log-line">→ {line}</div>)}
    </div>}
  </div>);
}
function TaskTray({tasks,onCancel,onView}){
  const[expanded,setExpanded]=useState({});
  const[collapsed,setCollapsed]=useState(false);
  const sorted=[...tasks].sort((a,b)=>(b.created||0)-(a.created||0));
  const running=sorted.filter(t=>(t.status||'running')==='running').length;
  const total=sorted.length;
  if(total===0)return null;
  if(collapsed){
    return(<div className="task-tray-pill" onClick={()=>setCollapsed(false)}>
      {running>0?<><span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#f59e0b',marginRight:6,verticalAlign:'middle',boxShadow:'0 0 5px rgba(245,158,11,0.7)'}}/>{running} task{running===1?'':'s'} running</>:total+' task'+(total===1?'':'s')}
    </div>);
  }
  return(<div className="task-tray">
    <div className="task-tray-header">
      <span>{running>0?`${running}/${total} TASKS · LIVE`:`${total} TASKS`}</span>
      <button className="task-card-btn" style={{padding:'1px 6px'}} onClick={()=>setCollapsed(true)} title="Collapse">_</button>
    </div>
    {sorted.slice(0,8).map(t=><TaskCard key={t.task_id} task={t}
      expanded={!!expanded[t.task_id]}
      onToggle={()=>setExpanded(e=>({...e,[t.task_id]:!e[t.task_id]}))}
      onCancel={()=>onCancel(t.task_id)}
      onView={()=>onView(t)}/>)}
  </div>);
}

  useEffect(()=>{let active=true;const poll=async()=>{if(!active||document.hidden)return;try{const r=await fetch('/api/processes');if(!r.ok)return;const d=await r.json();const procs=d.processes||[];const existing=window.fridayGetOrbs?.()??[];const eIds=new Set(existing.map(o=>o.id));const pIds=new Set(procs.map(p=>p.id));for(const p of procs){if(!eIds.has(p.id))window.fridayAddOrb?.({id:p.id,label:p.label||p.name||'Task',category:p.category||'default',icon:p.icon||'⚡'});window.fridayUpdateOrb?.(p.id,{progress:p.progress||0,status:p.status||'running',label:p.label||p.name});if(p.steps)window.fridayUpdateThread?.(p.id,p.steps)}for(const o of existing){if(!pIds.has(o.id)){window.fridayUpdateOrb?.(o.id,{status:'completed',progress:1});setTimeout(()=>window.fridayRemoveOrb?.(o.id),2000)}}}catch(_){}};const timer=setInterval(poll,2000);poll();return()=>{active=false;clearInterval(timer)}},[]);

        if(cancelled)return;
        const list=Array.isArray(d)?d:(d.tasks||[]);

          // Detect newly completed tasks and notify in chat
          const newlyDone=list.filter(t=>(t.status==='complete'||t.status==='completed_unverified'||t.status==='failed')&&!lastNotifiedComplete.has(t.task_id)
            &&prev.some(p=>p.task_id===t.task_id&&p.status==='running'));
          if(newlyDone.length>0){

            setLastNotifiedComplete(seen);
            newlyDone.forEach(t=>{

          {modelMenuOpen&&<div style={{position:'absolute',top:'calc(100% + 6px)',left:0,width:320,background:'rgba(10,14,26,0.75)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:10,zIndex:200,padding:'10px 0',boxShadow:'0 4px 30px rgba(0,0,0,0.3)',fontFamily:'Inter',fontSize:11}}>

    {[...openWins].map(id=>{const w=wsInfo[id];if(!w)return null;return(<FWin key={id} id={id} title={w.label} emoji={w.ico} zIndex={zMap[id]||41} onClose={()=>close(id)} onFocus={()=>bringFront(id)}><Safe name={w.label}>{wsMap[id]||<div>Coming soon</div>}</Safe></FWin>)})}

            {m.role==='user'?'You':'Friday'} · {m.time||''}

          </div>
        </div>)}
        {chatLoad&&<div className="typing-indicator"><span className="label">Friday is thinking</span><span className="dot"/><span className="dot"/><span className="dot"/></div>}

      <div style={{padding:10,borderTop:'1px solid rgba(255,255,255,0.04)'}}>

          <button className="btn" onClick={toggleVoice} title={voiceOn?'Stop voice mode':'Start voice mode (Gemini Live)'}

            {voiceOn?'■':'🎤'}
          </button>
          {/* Audio device quick-switcher */}
          <div style={{position:'relative',flexShrink:0,zIndex:1}}>
            <button data-audio-device-toggle="" className="btn" onClick={()=>setAudioDevicePopup(o=>!o)}

              style={{padding:'4px 7px',fontSize:13,color:audioDevicePopup?'#00d4ff':'#666',border:'1px solid '+(audioDevicePopup?'rgba(0,212,255,0.4)':'rgba(255,255,255,0.1)'),background:audioDevicePopup?'rgba(0,212,255,0.08)':'rgba(255,255,255,0.03)'}}>🎙</button>
            {audioDevicePopup&&<div ref={audioDevicePopupRef} style={{position:'absolute',bottom:'calc(100% + 8px)',left:0,width:226,background:'rgba(10,14,26,0.75)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:8,padding:'8px 0',zIndex:200,boxShadow:'0 4px 30px rgba(0,0,0,0.3)',fontSize:11,fontFamily:'Inter'}}>
              <div style={{padding:'4px 10px 6px',fontFamily:'Orbitron',fontSize:9,color:'rgba(0,212,255,0.75)',letterSpacing:'.14em'}}>MIC INPUT</div>
              {[{deviceId:'',label:'System Default'},...audioInputDevices].map(d=>{const sel=agentSettings.audio_input_device_id===d.deviceId;const lbl=d.label||(d.deviceId?'Mic ('+d.deviceId.slice(0,8)+'...)':'System Default');return(<div key={d.deviceId}
                onClick={()=>{saveAgentSettings({audio_input_device_id:d.deviceId});setAudioDevicePopup(false)}}
                style={{padding:'5px 10px',cursor:'pointer',color:sel?'#00d4ff':'#ccc',background:sel?'rgba(0,212,255,0.1)':'transparent',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',transition:'background .1s'}}
                onMouseOver={e=>e.currentTarget.style.background=sel?'rgba(0,212,255,0.12)':'rgba(255,255,255,0.05)'}
                onMouseOut={e=>e.currentTarget.style.background=sel?'rgba(0,212,255,0.1)':'transparent'}>
                {sel&&<span style={{marginRight:5,color:'#00d4ff'}}>✓</span>}{lbl}
              </div>)})}
              {audioOutputDevices.length>0&&<>
                <div style={{height:1,background:'rgba(0,212,255,0.1)',margin:'5px 0'}}/>
                <div style={{padding:'4px 10px 6px',fontFamily:'Orbitron',fontSize:9,color:'rgba(0,212,255,0.75)',letterSpacing:'.14em'}}>SPEAKER OUT</div>
                {[{deviceId:'',label:'System Default'},...audioOutputDevices].map(d=>{const sel=agentSettings.audio_output_device_id===d.deviceId;const lbl=d.label||(d.deviceId?'Speaker ('+d.deviceId.slice(0,8)+'...)':'System Default');return(<div key={d.deviceId}
                  onClick={()=>{saveAgentSettings({audio_output_device_id:d.deviceId});setAudioDevicePopup(false)}}
                  style={{padding:'5px 10px',cursor:'pointer',color:sel?'#00d4ff':'#ccc',background:sel?'rgba(0,212,255,0.1)':'transparent',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',transition:'background .1s'}}
                  onMouseOver={e=>e.currentTarget.style.background=sel?'rgba(0,212,255,0.12)':'rgba(255,255,255,0.05)'}
                  onMouseOut={e=>e.currentTarget.style.background=sel?'rgba(0,212,255,0.1)':'transparent'}>
                  {sel&&<span style={{marginRight:5,color:'#00d4ff'}}>✓</span>}{lbl}
                </div>)})}
              </>}
              <div style={{height:1,background:'rgba(255,255,255,0.06)',margin:'5px 0'}}/>
              <div onClick={()=>{refreshAudioDevicesRef.current?.()}} style={{padding:'4px 10px',cursor:'pointer',color:'rgba(255,255,255,0.45)',fontSize:10,fontFamily:'JetBrains Mono',letterSpacing:'.04em'}}

            </div>}
          </div>
          <input className="input" style={{flex:1,minWidth:0}} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendChat()} placeholder={voiceOn?'Voice mode active — just speak…':'Talk to Friday...'}/>

        </div>
      </div>

    <div className={`thread-panel ${threadOrb?'open':''}`} onClick={e=>e.stopPropagation()}>
      {threadOrb&&<React.Fragment>
        <div className="thread-header">
          <div className="thread-header-left">
            <span className="thread-icon">{threadOrb.icon||'⚡'}</span>
            <span className="thread-name">{threadOrb.label||'Process'}</span>
          </div>
          <span className={`thread-status-badge ${threadOrb.status||'running'}`}>{threadOrb.status||'RUNNING'}</span>
          <span className="thread-elapsed"></span>
          <button className="thread-close" onClick={()=>setThreadOrb(null)}>✕</button>
        </div>
        <div className="thread-body" ref={threadBodyRef}>
          {threadSteps.length===0&&<div style={{textAlign:'center',color:'#666',fontSize:11,padding:20,fontFamily:'JetBrains Mono'}}>No reasoning steps yet</div>}
          {threadSteps.map((step,i)=><div key={i} className="thread-step">
            <div className={`thread-dot ${step.status||'pending'}`}/>
            <div className="thread-step-content">
              <div className="thread-step-text">{step.text||''}</div>
              {step.detail&&<div className={`thread-step-detail ${step._expanded?'expanded':''}`}

                onClick={()=>{const ns=[...threadSteps];ns[i]={...ns[i],_expanded:!ns[i]._expanded};setThreadSteps(ns)}}>
                {step._expanded?'▾ ':'▸ '}{step.detail}
              </div>}
              {step.timestamp&&<div className="thread-step-time">{step.timestamp}</div>}
            </div>
          </div>)}
        </div>
      </React.Fragment>}
    </div>

    {/* Notifications + Tasks dropdown (anchored under bell icon) */}
    {notifOpen&&<div ref={notifPanelRef} className="notif-dropdown" style={{top:notifAnchor.top,right:notifAnchor.right}}>
      <div className="notif-section-header">
        <span>TASKS{runningTaskCount>0?` · ${runningTaskCount} LIVE`:''}</span>
        <span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'rgba(255,255,255,0.7)',letterSpacing:'0.04em'}}>{sortedBgTasks.length||0}</span>
      </div>
      {sortedBgTasks.length===0
        ?<div className="notif-empty">No active tasks</div>
        :sortedBgTasks.slice(0,8).map(t=><TaskCard key={t.task_id} task={t}
          expanded={!!notifCardExpanded[t.task_id]}
          onToggle={()=>setNotifCardExpanded(e=>({...e,[t.task_id]:!e[t.task_id]}))}
          onCancel={()=>cancelBgTask(t.task_id)}
          onView={()=>viewBgTaskResult(t)}/>)}
      <div className="notif-section-divider"/>
      <div className="notif-section-header">
        <span>NOTIFICATIONS</span>
        {unread>0&&<span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#ff0080',letterSpacing:'0.04em'}}>{unread} NEW</span>}
      </div>
      {notifs.length===0
        ?<div className="notif-empty">No new notifications</div>
        :notifs.slice(0,10).map((n,i)=>{
          const key=n.id||`n_${i}`;
          const isExpanded=!!notifCardExpanded[`notif_${key}`];
          const hasDetail=!!(n.detail||n.body||(n.message&&n.title&&n.message!==n.title));
          const onClickRow=()=>{
            if(hasDetail){
              setNotifCardExpanded(e=>({...e,[`notif_${key}`]:!e[`notif_${key}`]}));
            } else if(n.url){
              window.open(n.url,'_blank');
            } else if(n.workspace){
              toggle(n.workspace);setNotifOpen(false);
            }
          };
          const clickable=hasDetail||!!n.url||!!n.workspace;
          return(<div key={key}
            role={clickable?'button':undefined}
            tabIndex={clickable?0:undefined}
            onClick={clickable?onClickRow:undefined}
            onKeyDown={clickable?(e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onClickRow()}}):undefined}
            className={clickable?'notif-row clickable':'notif-row'}
            style={{padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12,color:n.read?'rgba(255,255,255,0.72)':'#fff',cursor:clickable?'pointer':'default',transition:'background .15s'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'Inter',fontSize:12,lineHeight:1.4,fontWeight:n.read?400:500}}>{n.title||n.message||n.text||'Notification'}</div>
                {n.time&&<div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#aaa',marginTop:3}}>{n.time}</div>}
              </div>
              {hasDetail&&<span aria-hidden="true" style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(255,255,255,0.55)',marginTop:1}}>{isExpanded?'▾':'▸'}</span>}
              {!hasDetail&&n.url&&<span aria-hidden="true" style={{fontSize:11,color:'#00d4ff'}}>↗</span>}
            </div>
            {isExpanded&&hasDetail&&<div style={{marginTop:8,padding:'8px 10px',background:'rgba(0,0,0,0.35)',borderRadius:6,border:'1px solid rgba(255,255,255,0.06)',fontSize:11,color:'rgba(220,220,235,0.85)',lineHeight:1.5,fontFamily:'Inter',whiteSpace:'pre-wrap'}}>{n.detail||n.body||n.message}</div>}
          </div>);
        })}

        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>SETTINGS</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {settingsSaveMsg&&<span style={{fontSize:11,color:'#00ff80',fontFamily:'JetBrains Mono'}}>{settingsSaveMsg}</span>}
          <button onClick={()=>setSettingsOpen(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer'}}>&#x2715;</button>
        </div>
      </div>

            style={{flex:1,background:'rgba(255,255,255,0.04)',color:'#ddd',border:'1px solid rgba(0,212,255,0.18)',borderRadius:5,padding:'6px 10px',fontFamily:'Orbitron',fontSize:12,letterSpacing:'0.06em',outline:'none'}}/>
        </div>
        {[
          {label:'Orchestrator',subtitle:'Main agent brain',key:'orchestrator_model',models:ORCHESTRATOR_MODELS},
          {label:'Subagent',subtitle:'Background tasks & drafts',key:'subagent_model',models:SUBAGENT_MODELS},
          {label:'Creative',subtitle:'Images, voice, vision',key:'creative_model',models:CREATIVE_MODELS},

                <button key={m.id}

                  style={{fontSize:11,padding:'4px 8px'}}
                  onClick={()=>saveAgentSettings({[cat.key]:m.id})}>
                  {m.label}
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>

          <div className="settings-section-title" style={{margin:0}}>Agent Intelligence</div>
          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'rgba(0,212,255,0.6)'}}>{openSections.intel?'▾':'▸'}</span>

        {openSections.intel&&<div style={{padding:'0 16px 14px'}}>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
            <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>Precise</span>
            <span style={{fontFamily:'Orbitron',fontSize:13,color:'#00d4ff'}}>{(agentSettings.temperature??0.7).toFixed(2)}</span>
            <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>Creative</span>
          </div>
          <input type="range" min="0" max="1" step="0.05"
            value={agentSettings.temperature??0.7}
            onChange={e=>setAgentSettings(s=>({...s,temperature:parseFloat(e.target.value)}))}
            onMouseUp={e=>saveAgentSettings({temperature:parseFloat(e.target.value)})}
            onTouchEnd={e=>saveAgentSettings({temperature:parseFloat(e.target.value)})}
            style={{width:'100%',accentColor:'#00d4ff',cursor:'pointer'}}/>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.72)',marginTop:4,marginBottom:14}}>Lower = deterministic, fact-anchored. Higher = exploratory, more variation.</div>

          {/* Default Model — configured in Agent Identity section above */}
          <div className="settings-subtitle">Configured Models</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:14}}>
            {[
              {label:ORCHESTRATOR_MODELS.find(m=>m.id===agentSettings.orchestrator_model)?.label||agentSettings.orchestrator_model,role:'Orchestrator'},
              {label:SUBAGENT_MODELS.find(m=>m.id===agentSettings.subagent_model)?.label||agentSettings.subagent_model,role:'Subagent'},
              {label:CREATIVE_MODELS.find(m=>m.id===agentSettings.creative_model)?.label||agentSettings.creative_model,role:'Creative'},
              {label:VOICE_MODELS.find(m=>m.id===agentSettings.voice_model)?.label||agentSettings.voice_model,role:'Voice'},
            ].map((m,i)=>(
              <span key={i} className="model-pill" style={{fontSize:10}}>
                <span className="dot active"/>{m.role}: {m.label}
              </span>

              <button key={v} className={`settings-btn ${agentSettings.response_length===v?'active':''}`}
                style={{textAlign:'center',textTransform:'capitalize'}}
                onClick={()=>saveAgentSettings({response_length:v})}>{v}</button>
            )}
          </div>
          <div className="settings-toggle" onClick={()=>saveAgentSettings({include_sources:!agentSettings.include_sources})}>
            <span className="settings-toggle-label">Always include sources</span>

          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:12}}>

                onClick={()=>toggleNewsTopic(t)}>
                <span style={{marginRight:5,color:on?'#00d4ff':'#444'}}>{on?'☑':'☐'}</span>{t}
              </button>

          <div className="settings-subtitle">Communication Style</div>
          <div className="settings-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
            {['professional','casual','technical'].map(v=>
              <button key={v} className={`settings-btn ${agentSettings.communication_style===v?'active':''}`}
                style={{textAlign:'center',textTransform:'capitalize'}}
                onClick={()=>saveAgentSettings({communication_style:v})}>{v}</button>
            )}
          </div>
        </div>}
      </div>

      {/* ── GROUP: Camera & Vision ── */}
      <div className="settings-section" style={{padding:0}}>
        <div onClick={()=>toggleSection('camera')} style={{cursor:'pointer',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',userSelect:'none'}}>
          <div className="settings-section-title" style={{margin:0}}>Camera &amp; Vision</div>
          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'rgba(0,212,255,0.6)'}}>{openSections.camera?'▾':'▸'}</span>
        </div>
        {openSections.camera&&<div style={{padding:'0 16px 14px'}}>
          <div className="settings-toggle" onClick={toggleCamera} style={{paddingTop:0}}>
            <span className="settings-toggle-label">Enable camera (screen / webcam capture)</span>
            <div className={`settings-toggle-switch ${cameraOn?'on':''}`}/>
          </div>
          {cameraOn&&<div className="camera-privacy-banner" style={{marginBottom:8}}><span className="pulse"/>Camera is active</div>}
          <div className="settings-subtitle" style={{marginTop:8}}>Frame Capture Interval</div>
          <div className="settings-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
            {[1,3,5].map(s=>
              <button key={s} className={`settings-btn ${cameraIntervalSec===s?'active':''}`}
                style={{textAlign:'center'}}
                onClick={()=>{setCameraIntervalSec(s);saveAgentSettings({camera_interval_sec:s})}}>{s}s</button>
            )}
          </div>
          <div className="settings-toggle" onClick={()=>{const v=!cameraAutoDescribe;setCameraAutoDescribe(v);saveAgentSettings({camera_auto_describe:v})}}>
            <span className="settings-toggle-label">Auto-describe what Friday sees</span>
            <div className={`settings-toggle-switch ${cameraAutoDescribe?'on':''}`}/>
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.72)'}}>When off, Friday only references the camera when you ask. When on, expect proactive commentary.</div>
        </div>}
      </div>

      {/* ── GROUP: Privacy ── */}
      <div className="settings-section" style={{padding:0}}>
        <div onClick={()=>toggleSection('privacy')} style={{cursor:'pointer',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',userSelect:'none'}}>
          <div className="settings-section-title" style={{margin:0}}>Privacy</div>
          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'rgba(0,212,255,0.6)'}}>{openSections.privacy?'▾':'▸'}</span>
        </div>
        {openSections.privacy&&<div style={{padding:'0 16px 14px'}}>
          <div className="settings-toggle" onClick={()=>saveAgentSettings({context_logging_enabled:!agentSettings.context_logging_enabled})}>
            <span className="settings-toggle-label">Full Context Logging</span>
            <div className={`settings-toggle-switch ${agentSettings.context_logging_enabled?'on':''}`}/>
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.72)',marginBottom:12}}>Append-only event log of chats, tool calls, wiki edits, and file reads. Stored locally in <code style={{color:'#00d4ff'}}>~/.friday/vault/context-log/</code>.</div>

          <div className="settings-toggle" onClick={()=>saveAgentSettings({off_record:!agentSettings.off_record})}>
            <span className="settings-toggle-label" style={{color:agentSettings.off_record?'#ff0080':undefined}}>Go Off Record (quick toggle)</span>
            <div className={`settings-toggle-switch ${agentSettings.off_record?'on':''}`}/>
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.72)',marginBottom:12}}>When on, chat messages are not written to the context log even if logging is enabled.</div>

          <div className="settings-subtitle">Retention Period</div>
          <div className="settings-grid" style={{gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr',marginBottom:12}}>
            {[{v:0,l:'Forever'},{v:365,l:'1 year'},{v:180,l:'6 months'},{v:90,l:'90 days'},{v:30,l:'30 days'}].map(o=>
              <button key={o.v} className={`settings-btn ${(agentSettings.context_retention_days??0)===o.v?'active':''}`}
                style={{textAlign:'center',fontSize:11}}
                onClick={()=>saveAgentSettings({context_retention_days:o.v})}>{o.l}</button>
            )}
          </div>

          <div className="settings-subtitle">Your Email (passes through unscrubbed)</div>
          <input value={agentSettings.user_email||''} onChange={e=>setAgentSettings(s=>({...s,user_email:e.target.value}))} onBlur={e=>saveAgentSettings({user_email:e.target.value})}
            placeholder="you@example.com"
            style={{width:'100%',background:'rgba(255,255,255,0.04)',color:'#ddd',border:'1px solid rgba(0,212,255,0.18)',borderRadius:5,padding:'6px 10px',fontFamily:'JetBrains Mono',fontSize:12,outline:'none',marginBottom:6}}/>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.72)',marginBottom:12}}>Other emails are replaced with <code style={{color:'#00d4ff'}}>[PII:email:hash]</code> before being sent to the Claude API and rehydrated on the way back. Yours stays plain.</div>

          <button className="settings-btn" style={{width:'100%',fontSize:12}} onClick={()=>window.open('/api/context/export','_blank')}>⤓ Export My Data (ZIP)</button>
        </div>}
      </div>

      {/* ── GROUP: Computer Control ── */}
      <div className="settings-section" style={{padding:0,border:'1px solid rgba(255,50,50,0.2)'}}>
        <div onClick={()=>toggleSection('computer_control')} style={{cursor:'pointer',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',userSelect:'none'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div className="settings-section-title" style={{margin:0}}>Computer Control</div>
            {ccGranted&&<span style={{fontSize:10,fontFamily:'Orbitron',color:'#ff3333',padding:'1px 6px',borderRadius:4,background:'rgba(255,0,0,0.12)',border:'1px solid rgba(255,0,0,0.3)'}}>ACTIVE</span>}
          </div>
          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'rgba(255,100,100,0.6)'}}>{openSections.computer_control?'▾':'▸'}</span>
        </div>
        {openSections.computer_control&&<div style={{padding:'0 16px 16px'}}>
          {!ccAvailable&&<div style={{fontSize:11,color:'#f59e0b',padding:'6px 8px',background:'rgba(245,158,11,0.08)',borderRadius:4,marginBottom:10}}>pyautogui not installed. Run <code style={{color:'#00d4ff'}}>pip install pyautogui</code> in the venv and restart the server.</div>}
          <div style={{fontSize:11,color:'rgba(255,200,200,0.85)',marginBottom:10,lineHeight:1.6}}>
            When enabled, Friday can move your mouse, click, type, and take screenshots to complete tasks on your behalf.<br/>
            <strong style={{color:'#ff6060'}}>Permission is revoked on every server restart</strong> — you must re-enable it each session.
          </div>
          <div className="settings-toggle" onClick={()=>{
            if(ccGranted){
              fetch('/api/control/permission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'revoke'})}).then(()=>setCcGranted(false)).catch(()=>{});
            }else{
              fetch('/api/control/permission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'grant'})}).then(r=>r.json()).then(d=>setCcGranted(!!d.granted)).catch(()=>{});
            }
          }} style={{borderColor:ccGranted?'rgba(255,50,50,0.4)':'undefined'}}>
            <span className="settings-toggle-label" style={{color:ccGranted?'#ff6060':undefined}}>{ccGranted?'🔴 Computer Control ACTIVE — Friday CAN move your mouse':'🟢 Computer Control OFF — Friday cannot touch your input'}</span>
            <div className={`settings-toggle-switch ${ccGranted?'on':''}`} style={ccGranted?{background:'linear-gradient(90deg,#cc0000,#ff2222)'}:{}}/>
          </div>
          {ccGranted&&<div style={{marginTop:10,padding:'10px 12px',background:'rgba(255,0,0,0.06)',border:'1px solid rgba(255,0,0,0.2)',borderRadius:6}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'#ff4444',marginBottom:6,letterSpacing:'.05em'}}>&#x26D4; KILL SWITCH</div>
            <div style={{fontSize:11,color:'rgba(255,200,200,0.8)',marginBottom:8}}>Immediately stop all computer control. Also available via <code style={{color:'#ff9999'}}>Ctrl+Shift+Q</code> at any time, even when Friday has focus elsewhere.</div>
            <button onClick={killSwitch} style={{width:'100%',padding:'8px',background:'linear-gradient(135deg,#aa0000,#cc2222)',border:'1px solid rgba(255,50,50,0.5)',borderRadius:5,color:'#fff',fontFamily:'Orbitron',fontSize:12,letterSpacing:'.1em',cursor:'pointer',fontWeight:700}}>&#x26D4; KILL COMPUTER CONTROL</button>
          </div>}
          <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:10}}>All actions are logged to the context log. Rate limited to {ccGranted?'3':'3'} actions/second. Moving the mouse to the top-left corner of the screen also aborts any running action (pyautogui failsafe).</div>
        </div>}
      </div>

      {/* Friday System Health */}
      <div className="settings-section">
        <div className="settings-section-title">Friday System Health</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11}}>
          <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
            <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Evolution Day</div>
            <div style={{fontFamily:'Orbitron',fontSize:15,color:'#00d4ff'}}>{stEvo?.day??'—'}</div>
          </div>
          <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
            <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Mood</div>
            <div style={{fontFamily:'Orbitron',fontSize:13,color:'#7c3aed'}}>{sceneState.mood||'—'}</div>
          </div>
          <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
            <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Uptime</div>
            <div style={{fontFamily:'Orbitron',fontSize:13,color:'#00ff80'}}>{formatUptime(stHealth?.uptime_seconds)}</div>
          </div>
          <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
            <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Creations Today</div>
            <div style={{fontFamily:'Orbitron',fontSize:15,color:'#f59e0b'}}>{stHealth?.creations_today??'—'}</div>
          </div>
        </div>
        <div style={{marginTop:8}}>
          <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:4}}>Active Models</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {(stHealth?.models||[{name:'Claude',active:true},{name:'Gemini',active:true}]).map((m,i)=>(
              <span key={i} className="model-pill" style={{fontSize:11}}>
                <span className={`dot ${m.active?'active':'idle'}`}/>
                {m.name}
              </span>
            ))}
          </div>
        </div>
        {stEvo?.structure&&<div style={{marginTop:8,fontSize:11,color:'#a8a8b4',fontFamily:'JetBrains Mono'}}>{stEvo.structure}</div>}
      </div>
    </div>

    {/* Quick Draft Popup */}
    {quickDraft&&<div ref={quickDraftRef} style={{position:'fixed',top:42,right:120,width:360,background:'rgba(10,14,26,0.75)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:12,zIndex:9999,padding:14,boxShadow:'0 4px 30px rgba(0,0,0,0.3)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>QUICK DRAFT</span>
        <button onClick={()=>setQuickDraft(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer'}}>&#x2715;</button>
      </div>
      <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap'}}>
        {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(qdMode===m.id?'':'btn-magenta')} style={{fontSize:11,padding:'2px 6px'}} onClick={()=>setQdMode(m.id)}>{m.ico} {m.label}</button>)}
      </div>
      <textarea className="input" style={{width:'100%',height:48,resize:'none',fontSize:11,marginBottom:6}} value={qdPrompt} onChange={e=>setQdPrompt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)qdGenerate()}} placeholder="What do you need drafted? (Ctrl+Enter)"/>
      <div style={{display:'flex',gap:4,marginBottom:qdResult||qdLoading?8:0,flexWrap:'wrap'}}>
        <button className="btn" onClick={qdGenerate} disabled={qdLoading} style={{fontSize:11,fontWeight:600}}>{qdLoading?'Generating...':'Generate'}</button>
        {qdResult&&<button className="btn" onClick={qdCopy} style={{fontSize:11}}>{qdCopied?'✓ Copied':'📋 Copy'}</button>}
        {qdResult&&<button className="btn" onClick={()=>openDraftTab(qdResult,qdMode,qdPrompt)} style={{fontSize:11}}>🔗 New Tab</button>}
      </div>
      {qdLoading&&!qdResult&&<div style={{fontSize:11,color:'#a8a8b4',fontStyle:'italic',marginBottom:6}}>⏳ Running in background — progress visible in the bell menu</div>}
      {qdResult&&<div style={{maxHeight:220,overflowY:'auto',background:'rgba(0,0,0,0.45)',border:'1px solid rgba(0,212,255,0.1)',borderRadius:8,padding:'14px 16px'}}>
        {qdResult.split(/\n\n+/).filter(Boolean).map((p,i)=><p key={i} style={{fontFamily:'Inter',fontSize:i===0?13:12,lineHeight:1.75,color:i===0?'#e8e8f0':'#ccc',marginBottom:10,whiteSpace:'pre-wrap'}}>{p}</p>)}
      </div>}
    </div>}

    {/* Dock — grouped (Life / Work / System) */}
    <div className={`dock ${dockHidden?'hidden':''}`}>
      {DOCK_GROUPS.map((g,gi)=>(<React.Fragment key={g.name}>
        {gi>0&&<div className="dock-sep"/>}
        <div className="dock-group">
          <div className="dock-group-btns">
            {g.items.map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''}`} onClick={()=>toggle(w.id)} style={{position:'relative'}}>
              <span className="ico"><img src={`assets/icons/${w.id}.svg`} alt={w.label} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='inline'}}/><span style={{display:'none'}}>{w.ico}</span></span><span>{w.label}</span><span className="dot"/>
              {w.id==='wiki'&&wikiPending>0&&<span style={{position:'absolute',top:2,right:2,minWidth:14,height:14,padding:'0 4px',borderRadius:7,background:'#f59e0b',color:'#0a0a0f',fontSize:9,fontWeight:700,fontFamily:'Orbitron',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 8px rgba(245,158,11,0.7)'}}>{wikiPending}</span>}
            </button>)}
          </div>
          <div className="dock-group-label">{g.name}</div>
        </div>
      </React.Fragment>))}
    </div>
    {paletteOpen&&<CommandPalette onClose={()=>setPaletteOpen(false)} onOpenWs={id=>{toggle(id);setPaletteOpen(false)}} openWins={openWins}/>}

    {/* Background tasks now live in the bell-icon dropdown above */}

    {/* Task Result Modal */}
    {taskResultModal&&<div onClick={()=>setTaskResultModal(null)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(720px, 90vw)',maxHeight:'85vh',overflowY:'auto',background:'rgba(10,10,18,0.96)',border:'1px solid rgba(0,212,255,0.25)',borderRadius:12,padding:18,boxShadow:'0 12px 40px rgba(0,0,0,0.8)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00d4ff',letterSpacing:'.08em'}}>TASK RESULT · {(taskResultModal.status||'').toUpperCase()}</div>
            <div style={{fontSize:14,color:'#fff',marginTop:3}}>{taskResultModal.name}</div>
          </div>
          <button className="btn" onClick={()=>setTaskResultModal(null)}>Close</button>
        </div>
        {taskResultModal.description&&<div style={{fontSize:11,color:'#888',marginBottom:10,fontStyle:'italic'}}>{taskResultModal.description}</div>}
        <pre style={{whiteSpace:'pre-wrap',fontSize:12,color:'#ddd',fontFamily:'Inter',lineHeight:1.6,background:'rgba(0,0,0,0.4)',padding:12,borderRadius:8,border:'1px solid rgba(255,255,255,0.04)'}}>{taskResultModal.result||'(no result text)'}</pre>
        {(taskResultModal.log||[]).length>0&&<div style={{marginTop:12}}>
          <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff',letterSpacing:'.08em',marginBottom:6}}>ACTIVITY LOG</div>
          <div style={{background:'rgba(0,0,0,0.4)',padding:8,borderRadius:6,maxHeight:180,overflowY:'auto'}}>
            {(taskResultModal.log||[]).map((l,i)=><div key={i} style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(200,200,220,0.7)',padding:'1px 0'}}>→ {l}</div>)}
          </div>
        </div>}
      </div>
    </div>}
  </>);
}

// Mount with error surface so mobile failures are visible instead of a blank dock.
(function mountFriday(){
  try{
    var target=document.getElementById('ui-inner')||document.getElementById('ui-root');
    if(!target){throw new Error('Mount target #ui-inner/#ui-root not found');}
    ReactDOM.createRoot(target).render(<App/>);
  }catch(err){
    console.error('[FRIDAY] React mount failed:',err);
    var host=document.getElementById('ui-inner')||document.getElementById('ui-root')||document.body;
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:rgba(20,0,10,.92);border:1px solid #ff0080;border-radius:10px;padding:12px 14px;color:#ffdbe8;font:12px/1.4 monospace;pointer-events:auto;max-height:45vh;overflow:auto';
    box.innerHTML='<div style="color:#ff5599;font-weight:700;margin-bottom:6px">FRIDAY UI failed to mount</div><pre style="white-space:pre-wrap;margin:0">'+(err&&err.stack?err.stack:String(err))+'</pre>';
    host.appendChild(box);
  }
})();
</script>
</body>
</html>
