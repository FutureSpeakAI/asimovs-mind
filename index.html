<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FRIDAY Desktop — FutureSpeak.AI</title>
<script>
// Surface any script-load failures (blocked CDN, tunnel CSP, offline) instead of blank UI.
window.__fridayCdnErrors=[];
window.addEventListener('error',function(e){
  if(e&&e.target&&(e.target.tagName==='SCRIPT'||e.target.tagName==='LINK')){
    var src=e.target.src||e.target.href||'?';
    window.__fridayCdnErrors.push(src);
    console.error('[FRIDAY] Failed to load resource:',src);
  }
},true);
</script>
<script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
<script>
// Hard fail-fast if any critical CDN didn't load — show a visible banner on mobile.
window.addEventListener('DOMContentLoaded',function(){
  var missing=[];
  if(typeof React==='undefined')missing.push('React');
  if(typeof ReactDOM==='undefined')missing.push('ReactDOM');
  if(typeof Babel==='undefined')missing.push('Babel');
  if(missing.length){
    var errs=window.__fridayCdnErrors||[];
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;top:12px;z-index:99999;background:rgba(20,0,10,.95);border:1px solid #ff0080;border-radius:10px;padding:12px 14px;color:#ffdbe8;font:12px/1.45 monospace;max-height:45vh;overflow:auto';
    box.innerHTML='<div style="color:#ff5599;font-weight:700;margin-bottom:6px">FRIDAY — CDN load failed</div>'
      +'<div>Missing: '+missing.join(', ')+'</div>'
      +(errs.length?'<div style="margin-top:6px;opacity:.75">Blocked URLs:<br>'+errs.map(function(u){return '&middot; '+u}).join('<br>')+'</div>':'')
      +'<div style="margin-top:8px;opacity:.8">Likely a tunnel CSP, ad-blocker, or offline state. Reload when a network is available.</div>';
    document.body&&document.body.appendChild(box);
  }
});
</script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; cursor: default; }
        canvas { display: block; }
        
        /* --- ETHEREAL HUD OVERLAY --- */
        #hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
            --hud-r: 0; --hud-g: 255; --hud-b: 255;
            --hud-opacity: 0.25;
        }

        /* ELEGANT OPTICAL ARCS */
        .hud-corner {
            position: absolute; width: 6vw; height: 6vw; max-width: 60px; max-height: 60px;
            border: 1px solid rgba(var(--hud-r), var(--hud-g), var(--hud-b), var(--hud-opacity));
            transition: border-color 1s ease, box-shadow 1s ease;
        }
        .top-left { top: 60px; left: 80px; border-right: none; border-bottom: none; border-top-left-radius: 100%; }
        .top-right { top: 60px; right: 80px; border-left: none; border-bottom: none; border-top-right-radius: 100%; }
        .bottom-left { bottom: 60px; left: 80px; border-right: none; border-top: none; border-bottom-left-radius: 100%; }
        .bottom-right { bottom: 60px; right: 80px; border-left: none; border-top: none; border-bottom-right-radius: 100%; }

        .hud-corner .dot {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: rgba(var(--hud-r), var(--hud-g), var(--hud-b), calc(var(--hud-opacity) + 0.4));
            box-shadow: 0 0 10px rgba(var(--hud-r), var(--hud-g), var(--hud-b), 1.0);
        }
        .top-left .dot { top: 25%; left: 25%; }
        .top-right .dot { top: 25%; right: 25%; }
        .bottom-left .dot { bottom: 25%; left: 25%; }
        .bottom-right .dot { bottom: 25%; right: 25%; }

        /* HEADER */
        .hud-header {
            position: absolute; top: 80px; left: 140px; right: 140px;
            display: flex; justify-content: space-between; align-items: flex-start;
            font-family: 'Courier New', Courier, monospace; font-size: 11px;
            color: rgba(var(--hud-r), var(--hud-g), var(--hud-b), calc(var(--hud-opacity) + 0.5));
            letter-spacing: 4px; text-shadow: 0 0 10px rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.5);
            font-weight: 300; text-transform: uppercase;
        }

        .hud-title-container { display: flex; flex-direction: column; gap: 6px; }
        .hud-main-title { 
            font-size: 13px; color: #fff; letter-spacing: 6px; font-weight: 400; 
            text-decoration: none; pointer-events: auto; cursor: pointer; transition: text-shadow 0.3s;
        }
        .hud-main-title:hover { text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        
        .hud-laws { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .status-dot.green { background: #00ff66; box-shadow: 0 0 10px #00ff66, 0 0 2px #fff inset; }
        .status-dot.red { background: #ff0033; box-shadow: 0 0 10px #ff0033, 0 0 2px #fff inset; }
        .status-dot.yellow { background: #ffcc00; box-shadow: 0 0 10px #ffcc00, 0 0 2px #fff inset; }

        /* Camera indicator: only visible when holo mode active */
        #camera-indicator.holo-active { background: #00ff66; box-shadow: 0 0 8px #00ff66; }

        /* MINORITY REPORT HAND CURSOR */
        #hand-cursor {
            position: fixed; top: -50px; left: -50px; width: 24px; height: 24px;
            border-radius: 50%; border: 4px solid rgba(0, 255, 255, 0.8);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 9999;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), inset 0 0 6px rgba(0, 255, 255, 0.3);
            display: none; opacity: 0; transition: transform 0.1s, border-color 0.2s, opacity 0.3s;
            justify-content: center; align-items: center;
        }
        #hand-cursor.active { display: flex; opacity: 1; }
        #hand-cursor.hidden { opacity: 0; }
        #hand-cursor.pinching { transform: translate(-50%, -50%) scale(0.8); border-color: #fff; box-shadow: 0 0 15px #fff; }
        
        #pinch-progress { position: absolute; top: -5px; left: -5px; width: 34px; height: 34px; transform: rotate(-90deg); opacity: 0; }
        .pinch-circle { fill: none; stroke: #ff00ff; stroke-width: 4; stroke-dasharray: 95; stroke-dashoffset: 95; transition: stroke-dashoffset 0.1s linear; }
        
        .ripple {
            position: fixed; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 9998;
            animation: rippleAnim 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes rippleAnim {
            0% { width: 0px; height: 0px; opacity: 1; border: 4px solid var(--r-color); }
            100% { width: 100px; height: 100px; opacity: 0; border: 1px solid var(--r-color); }
        }

        /* CAMERA TRACKING INDICATOR */
        #camera-indicator {
            position: fixed; bottom: 20px; right: 20px; width: 6px; height: 6px; 
            border-radius: 50%; background: #444; z-index: 200; transition: background 0.3s, box-shadow 0.3s;
        }

        /* --- REACT UI LAYER STYLES --- */

        /* Base button (used by React UI) */
        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.08); color: rgba(255, 255, 255, 0.5);
            padding: 6px 14px; font-size: 11px; cursor: pointer; border-radius: 4px;
            transition: all 0.3s ease; letter-spacing: 1px;
            font-family: 'Inter', sans-serif; pointer-events: auto;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; border-color: rgba(255,255,255,0.2); }
        .btn.active { color: #fff; background: rgba(255, 255, 255, 0.08); border-color: rgba(0,212,255,0.4); }
        .btn-magenta { border-color: rgba(255,0,128,0.2); color: rgba(255,0,128,0.7); }
        .btn-magenta:hover { background: rgba(255,0,128,0.08); color: #ff0080; border-color: rgba(255,0,128,0.4); }

        /* Top bar */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 36px; z-index: 70;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; background: rgba(3,3,8,0.7); backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        /* Model status pills */
        .model-pill {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 2px 8px; border-radius: 10px; font-size: 11px;
            font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5); transition: all 0.3s;
        }
        .model-pill .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .model-pill .dot.active { background: #00ff80; box-shadow: 0 0 6px #00ff80; }
        .model-pill .dot.idle { background: #555; }

        /* Dock */
        .dock {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 70;
            display: flex; justify-content: center; gap: 2px;
            padding: 6px 12px 8px; background: rgba(3,3,8,0.7);
            backdrop-filter: blur(16px); border-top: 1px solid rgba(255,255,255,0.04);
        }
        .dock-btn {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 6px 12px 4px; background: none; border: 1px solid transparent;
            border-radius: 8px; color: rgba(255,255,255,0.35); cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 11px; transition: all 0.25s ease;
            min-width: 56px; position: relative;
        }
        .dock-btn .ico { font-size: 18px; line-height: 1; }
        .dock-btn .dot {
            width: 3px; height: 3px; border-radius: 50%;
            background: transparent; transition: all 0.3s;
        }
        .dock-btn:hover {
            color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.04);
            border-color: rgba(0,212,255,0.15);
            box-shadow: 0 0 12px rgba(0,212,255,0.06), inset 0 0 12px rgba(0,212,255,0.03);
        }
        .dock-btn.active {
            color: #00d4ff; background: rgba(0,212,255,0.06);
            border-color: rgba(0,212,255,0.2);
            box-shadow: 0 0 16px rgba(0,212,255,0.1), inset 0 0 16px rgba(0,212,255,0.04);
        }
        .dock-btn.active .dot { background: #00d4ff; box-shadow: 0 0 6px #00d4ff; }

        /* Floating windows — glassmorphism */
        .fwin {
            position: fixed; display: flex; flex-direction: column;
            background: rgba(6,6,14,0.65); backdrop-filter: blur(14px) saturate(1.2);
            border: 1px solid rgba(0,212,255,0.1); border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 1px rgba(0,212,255,0.2);
            overflow: hidden; transition: box-shadow 0.3s;
        }
        .fwin:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,212,255,0.06); }
        .fwin-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; cursor: grab; user-select: none;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .fwin-bar:active { cursor: grabbing; }
        .fwin-title { font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
        .fwin-btns button {
            background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer;
            font-size: 16px; padding: 0 4px; transition: color 0.2s;
        }
        .fwin-btns button:hover { color: #ff0080; }
        .fwin-body { flex: 1; overflow-y: auto; padding: 12px; }
        .fwin-body::-webkit-scrollbar { width: 4px; }
        .fwin-body::-webkit-scrollbar-track { background: transparent; }
        .fwin-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .resize-h {
            position: absolute; bottom: 0; right: 0; width: 16px; height: 16px;
            cursor: nwse-resize; opacity: 0;
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px; padding: 12px; transition: border-color 0.2s;
        }
        .card:hover { border-color: rgba(255,255,255,0.08); }
        .card-title {
            font-family: 'Orbitron', monospace; font-size: 11px; color: rgba(0,212,255,0.6);
            letter-spacing: 0.08em; margin-bottom: 8px;
        }
        .stat { font-family: 'Orbitron', monospace; font-size: 22px; color: #fff; }
        .stat-label { font-size: 11px; color: #555; margin-top: 2px; }

        /* Badges */
        .badge-green { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(0,255,128,0.1); color: #00ff80; border: 1px solid rgba(0,255,128,0.2); }
        .badge-cyan { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(0,212,255,0.1); color: #00d4ff; border: 1px solid rgba(0,212,255,0.2); }
        .badge-magenta { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(255,0,128,0.1); color: #ff0080; border: 1px solid rgba(255,0,128,0.2); }
        .badge-amber { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }

        /* Progress bars */
        .progress-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

        /* Inputs */
        .input {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px; padding: 7px 10px; color: #ddd; font-size: 12px;
            font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
        }
        .input:focus { border-color: rgba(0,212,255,0.3); }

        /* Chat panel */
        .chat-panel {
            position: fixed; top: 36px; right: -340px; bottom: 44px;
            width: 320px; z-index: 65; display: flex; flex-direction: column;
            background: rgba(6,6,14,0.8); backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255,255,255,0.04);
            transition: right 0.3s ease;
        }
        .chat-panel.open { right: 0; }

        /* Greeting ticker */
        .greeting-ticker {
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
            justify-content: center;
        }
        .greeting-ticker-item {
            display: flex; align-items: baseline; gap: 6px;
            font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.35);
        }
        .greeting-ticker-item .days {
            font-family: 'Orbitron', monospace; font-size: 18px; color: #00d4ff;
            text-shadow: 0 0 12px rgba(0,212,255,0.3);
        }
        .greeting-ticker-sep {
            width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.15);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed; top: 36px; right: -360px; bottom: 44px;
            width: 340px; z-index: 68; display: flex; flex-direction: column;
            background: rgba(6,6,14,0.75); backdrop-filter: blur(18px) saturate(1.2);
            border-left: 1px solid rgba(0,212,255,0.1);
            box-shadow: -4px 0 24px rgba(0,0,0,0.4);
            transition: right 0.35s cubic-bezier(0.2, 0.8, 0.3, 1);
            overflow-y: auto;
        }
        .settings-panel.open { right: 0; }
        .settings-panel::-webkit-scrollbar { width: 4px; }
        .settings-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
        .settings-section {
            padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .settings-section-title {
            font-family: 'Orbitron', monospace; font-size: 11px; color: rgba(0,212,255,0.5);
            letter-spacing: 0.12em; margin-bottom: 10px; text-transform: uppercase;
        }
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
        }
        .settings-btn {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 5px; padding: 6px 8px; color: rgba(255,255,255,0.4);
            font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer;
            transition: all 0.2s; text-align: left; letter-spacing: 0.03em;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.12); }
        .settings-btn.active { color: #00d4ff; border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.06); box-shadow: 0 0 10px rgba(0,212,255,0.08); }
        .settings-toggle {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; cursor: pointer;
        }
        .settings-toggle-label { font-size: 11px; color: rgba(255,255,255,0.6); font-family: 'Inter', sans-serif; }
        .settings-toggle-switch {
            width: 32px; height: 18px; border-radius: 9px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            position: relative; transition: all 0.25s; cursor: pointer;
        }
        .settings-toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 12px; height: 12px; border-radius: 50%;
            background: rgba(255,255,255,0.3); transition: all 0.25s;
        }
        .settings-toggle-switch.on { background: rgba(0,212,255,0.2); border-color: rgba(0,212,255,0.4); }
        .settings-toggle-switch.on::after { left: 16px; background: #00d4ff; box-shadow: 0 0 6px rgba(0,212,255,0.5); }

        /* Discord footer */
        .discord-footer {
            position: fixed; bottom: 48px; left: 12px; z-index: 55;
            font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 1px;
        }
        .discord-footer a {
            color: rgba(0,255,255,0.4); text-decoration: none;
            border-bottom: 1px solid rgba(0,255,255,0.15); padding-bottom: 1px;
            transition: all 0.3s;
        }
        .discord-footer a:hover { color: #00ffff; border-bottom-color: rgba(0,255,255,0.5); text-shadow: 0 0 8px rgba(0,255,255,0.4); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fwinOpen {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes dockBounce {
            0% { transform: translateY(-2px) scale(1); }
            40% { transform: translateY(-4px) scale(0.94); }
            100% { transform: translateY(-2px) scale(1); }
        }
        @keyframes paletteIn {
            from { opacity: 0; transform: translate(-50%, -52%) scale(0.96); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* Enhanced transitions (Part 2) */
        .btn { transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
        .dock-btn { will-change: transform; }
        .dock-btn:hover { transform: translateY(-2px); }
        .dock-btn:active { animation: dockBounce 0.18s ease-out; }
        .dock-btn.active { transform: translateY(-1px); }
        .fwin { animation: fwinOpen 0.18s ease-out; }
        .fwin.closing { animation: fwinOpen 0.18s ease-in reverse; }
        .card { transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease; }
        .card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.25); }

        /* Dock grouping */
        .dock-group {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 0 6px;
        }
        .dock-group-btns {
            display: flex; align-items: flex-end; gap: 2px;
        }
        .dock-group-label {
            font-family: 'Orbitron', monospace; font-size: 11px;
            color: rgba(255,255,255,0.22); letter-spacing: 0.18em;
            text-transform: uppercase; margin-top: 2px;
            user-select: none;
        }
        .dock-divider {
            width: 1px; align-self: stretch; margin: 4px 2px 16px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.12), transparent);
        }

        /* Command Palette */
        .cmd-palette-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(3,3,8,0.55); backdrop-filter: blur(6px);
            display: flex; align-items: flex-start; justify-content: center;
            animation: fadeIn 0.12s ease-out;
        }
        .cmd-palette {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(560px, 90vw); max-height: 60vh;
            background: rgba(8,8,16,0.92); backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid rgba(0,212,255,0.25);
            border-radius: 12px; box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 40px rgba(0,212,255,0.08);
            display: flex; flex-direction: column; overflow: hidden;
            animation: paletteIn 0.16s cubic-bezier(0.2, 0.8, 0.3, 1);
        }
        .cmd-palette-input {
            width: 100%; background: transparent; border: none; outline: none;
            padding: 16px 20px; color: #fff; font-size: 15px;
            font-family: 'Inter', sans-serif;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .cmd-palette-input::placeholder { color: rgba(255,255,255,0.3); }
        .cmd-palette-results {
            overflow-y: auto; padding: 6px 0;
        }
        .cmd-palette-section {
            font-family: 'Orbitron', monospace; font-size: 11px;
            color: rgba(0,212,255,0.5); letter-spacing: 0.14em;

            const cursor = document.getElementById('hand-cursor');

                const landmarks = results.multiHandLandmarks[0];

                const isApproachingPinch = dist < 0.1;

                    currHandX = targetX; currHandY = targetY;

        // --- AESTHETIC CONFIGURATION ---
        const MOODS = {

                    vec4 finalColor = vec4(cr.r, cga.g, cb.b, cga.a);

        // --- THREE.JS ENGINE ---

        function setGroupOpacity(group, opacityMultiplier) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData && child.material.userData.baseOpacity !== undefined) {
                    child.material.opacity = child.material.userData.baseOpacity * opacityMultiplier;
                }
            });
        }

        function updateGroupColors(group) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData) {
                    const targetColor = child.material.userData.isAccent || (child.userData && child.userData.isAccent) ? moodLerpValues.accentColor : moodLerpValues.baseColor;
                    
                    if (child === mandelbrotSystem && mandelbrotSystem && mandelbrotSystem.geometry && mandelbrotSystem.geometry.attributes.color) {
                        const colors = child.geometry.attributes.color.array; const mData = child.userData.data;
                        for(let i=0; i<mData.length; i++) {
                            const c = new THREE.Color().copy(moodLerpValues.baseColor).lerp(moodLerpValues.accentColor, mData[i].iterRatio);
                            colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                        }
                        child.geometry.attributes.color.needsUpdate = true;
                    } else if (child.material.userData.isTunnelSolid) {
                        child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.05);
                    } else if (child.material.userData.isBossSphere) {
                        child.material.color.copy(moodLerpValues.baseColor);
                    } else if (child.material.userData.isBossWire) {
                        child.material.color.copy(moodLerpValues.accentColor).multiplyScalar(0.3);
                    } else if (child.material.userData.isPlayerBody) {
                        child.material.color.setHex(0xffffff); 
                    } else if (child.material.color && targetStructure !== 'QUANTUM') {
                        child.material.color.copy(targetColor);
                        if(child.geometry && child.geometry.type === 'BoxGeometry' && !child.material.wireframe && (currentStructure === 'CUBES' || targetStructure === 'CUBES')) {
                            child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.15); 
                        }
                    }
                }
            });
        }

        async function setupAudio() {
            if (audioContext) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
                source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
                micActive = true; lastSoundTime = clock.getElapsedTime(); 
            } catch (err) { console.warn("Using procedural heartbeat."); }
        }

            if(!camera || !renderer || !composer) return;
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);

        function smoothstep(x) { return x * x * (3 - 2 * x); }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); 
            const elapsed = clock.getElapsedTime() * 0.5;

            // --- HAND CURSOR LOGIC (Minority Report) ---
            const cursor = document.getElementById('hand-cursor');
            const pRing = document.querySelector('.pinch-circle');
            if (isHandTrackingMode) {
                currHandX += (rawHandX - currHandX) * 0.25; 
                currHandY += (rawHandY - currHandY) * 0.25; 
                cursor.style.left = `${currHandX}px`; cursor.style.top = `${currHandY}px`;
                
                if (isPinching) {
                    if(!wasPinching) { pinchStartTime = performance.now(); rightClickFired = false; cursor.classList.add('pinching'); }
                    const duration = performance.now() - pinchStartTime;
                    if (duration > 200) {
                        document.getElementById('pinch-progress').style.opacity = 1;
                        const progress = Math.min(1.0, (duration - 200) / PINCH_HOLD_TIME);
                        pRing.style.strokeDashoffset = 95 * (1.0 - progress);
                        if (progress >= 1.0 && !rightClickFired) {
                            rightClickFired = true; spawnRipple(currHandX, currHandY, '#ff00ff');
                        }
                    }
                } else {
                    if (wasPinching) {
                        const duration = performance.now() - pinchStartTime;
                        cursor.classList.remove('pinching');
                        document.getElementById('pinch-progress').style.opacity = 0; pRing.style.strokeDashoffset = 95;
                        if (duration < 500) {
                            spawnRipple(currHandX, currHandY, '#00ffff');
                            cursor.style.display = 'none'; 
                            let el = document.elementFromPoint(currHandX, currHandY);
                            cursor.style.display = 'flex';
                            if (el && typeof el.click === 'function') el.click();
                        }
                    }
                }
                wasPinching = isPinching;
            }

            // --- STABILIZED TRUE 3D HOLOGRAPHIC PARALLAX OFFSET ---
            if (isHologramMode && isFaceVisible) {
                currFaceX += (rawFaceX - currFaceX) * 0.08; 
                currFaceY += (rawFaceY - currFaceY) * 0.08;
                currFaceZ += (rawFaceZ - currFaceZ) * 0.05; 
            } else {
                currFaceX += (mouseX - currFaceX) * 0.04; 
                currFaceY += (mouseY - currFaceY) * 0.04; 
                currFaceZ += (0 - currFaceZ) * 0.04;
            }

            // --- TIME LAPSE LOGIC ---
            if (timeLapseActive) {
                timeLapseTimer += delta;
                if (timeLapseTimer > 10.0) { timeLapseTimer = 0; setEvolution((currentEvolutionIdx + 1) % EVOLUTION_PATH.length); }

function FWin({id,title,emoji,children,onClose,zIndex,onFocus}){

  useEffect(()=>{if(!resizing)return;const mv=e=>setSize({w:Math.max(400,rStart.current.w+e.clientX-rStart.current.x),h:Math.max(280,rStart.current.h+e.clientY-rStart.current.y)});const up=()=>setResizing(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[resizing]);

// ═══ COMMAND PALETTE (Ctrl+K) ═══
function CommandPalette({onClose,onOpenWs,openWins}){
  const[q,setQ]=useState('');
  const[sel,setSel]=useState(0);
  const[contacts,setContacts]=useState([]);
  const[routines,setRoutines]=useState([]);
  const inputRef=useRef(null);

  useEffect(()=>{inputRef.current?.focus()},[]);
  useEffect(()=>{
    fetch('/api/contacts').then(r=>r.json()).then(d=>setContacts(d.contacts||d.items||[])).catch(()=>{});
    fetch('/api/routines').then(r=>r.json()).then(d=>setRoutines(d.routines||d.items||[])).catch(()=>{});
  },[]);

  const query=q.trim().toLowerCase();
  const wsResults=WS.filter(w=>!query||w.label.toLowerCase().includes(query)||w.id.includes(query))
    .map(w=>({kind:'ws',id:w.id,ico:w.ico,label:w.label,meta:openWins.has(w.id)?'open':'open workspace'}));
  const contactResults=(query?contacts.filter(c=>(c.name||c.label||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(c=>({kind:'contact',id:c.id||c.name,ico:'👤',label:c.name||c.label,meta:c.email||c.role||'contact'}));
  const routineResults=(query?routines.filter(r=>(r.label||r.name||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(r=>({kind:'routine',id:r.id,ico:'⚡',label:r.label||r.name,meta:r.schedule||r.category||'routine'}));
  const sections=[
    {title:'Workspaces',items:wsResults},
    {title:'Contacts',items:contactResults},
    {title:'Routines',items:routineResults},
  ].filter(s=>s.items.length>0);
  const flat=sections.flatMap(s=>s.items);
  useEffect(()=>{setSel(0)},[q]);

  const activate=(item)=>{
    if(!item)return;
    if(item.kind==='ws')onOpenWs(item.id);
    else if(item.kind==='routine'){
      fetch(`/api/routines/${item.id}/run`,{method:'POST'}).catch(()=>{});
      onClose();
    }else if(item.kind==='contact'){
      onOpenWs('contacts');
    }
  };

  const onKey=(e)=>{
    if(e.key==='Escape'){e.preventDefault();onClose()}
    else if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(flat.length-1,s+1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(0,s-1))}
    else if(e.key==='Enter'){e.preventDefault();activate(flat[sel])}
  };

  return(<div className="cmd-palette-overlay" onClick={onClose}>
    <div className="cmd-palette" onClick={e=>e.stopPropagation()} onKeyDown={onKey}>
      <input ref={inputRef} className="cmd-palette-input" placeholder="Search workspaces, contacts, routines…"
        value={q} onChange={e=>setQ(e.target.value)}/>
      <div className="cmd-palette-results">
        {flat.length===0&&<div className="cmd-palette-empty">No matches</div>}
        {(()=>{let idx=-1;return sections.map(s=>(<div key={s.title}>
          <div className="cmd-palette-section">{s.title}</div>
          {s.items.map(it=>{idx++;const i=idx;return(
            <div key={`${it.kind}-${it.id}`} className={`cmd-palette-item ${i===sel?'selected':''}`}
              onMouseEnter={()=>setSel(i)} onClick={()=>activate(it)}>
              <span className="ico">{it.ico}</span>
              <span>{it.label}</span>
              <span className="meta">{it.meta}</span>
            </div>
          )})}
        </div>))})()}
      </div>
    </div>
  </div>);
}

// ═══ SEND-TO DROPDOWN (Data Flow) ═══
function SendTo({content,personName,eventId,emailThreadId,dataType,options}){
  const[open,setOpen]=useState(false);const[status,setStatus]=useState(null);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[open]);
  const defaultOpts=[
    {label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},
    {label:'Save to Trust Graph',dest:'trust_graph',ico:'🔗',needsPerson:true},
    {label:'Send to Calendar',dest:'calendar_notes',ico:'📅',needsEvent:true},
    {label:'Add to Briefing',dest:'briefing',ico:'📰'},
    {label:'Draft Email',dest:'gmail_draft',ico:'✉️'},
  ];
  const opts=(options||defaultOpts).filter(o=>{
    if(o.needsPerson&&!personName)return false;
    if(o.needsEvent&&!eventId)return false;
    return true;
  });
  const send=async(dest)=>{
    setStatus('sending');setOpen(false);
    try{
      const r=await fetch('/api/flow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        data_type:dataType||'general',content:typeof content==='function'?content():content,
        metadata:{person_name:personName||'',event_id:eventId||'',email_thread_id:emailThreadId||''},
        destinations:[dest]
      })});
      const d=await r.json();
      const ok=d.results&&d.results[0]&&d.results[0].ok;
      setStatus(ok?'ok':'fail');
    }catch(e){setStatus('fail')}
    setTimeout(()=>setStatus(null),2000);
  };
  if(opts.length===0)return null;
  return(<div ref={ref} style={{position:'relative',display:'inline-block'}}>
    <button onClick={e=>{e.stopPropagation();setOpen(!open)}} style={{background:'none',border:'1px solid rgba(0,212,255,0.15)',borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:status==='ok'?'#00ff80':status==='fail'?'#ff0080':'#00d4ff',transition:'color .2s'}} title="Send to...">{status==='ok'?'✓':status==='fail'?'✗':status==='sending'?'⏳':'📤'}</button>
    {open&&<div style={{position:'absolute',right:0,top:'100%',marginTop:4,background:'rgba(10,10,18,0.95)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:6,padding:4,minWidth:160,zIndex:9999,backdropFilter:'blur(12px)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
      {opts.map((o,i)=><div key={i} onClick={()=>send(o.dest)} style={{padding:'6px 10px',fontSize:11,color:'#ccc',cursor:'pointer',borderRadius:4,display:'flex',alignItems:'center',gap:6,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,212,255,0.08)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}><span>{o.ico}</span><span>{o.label}</span></div>)}
    </div>}
  </div>);
}

        <div className="settings-section-title">Consciousness</div>
        <div className="settings-toggle" onClick={()=>window.fridayVibe?.toggleHologram()}>
          <span className="settings-toggle-label">Hologram Mode (face tracking)</span>
          <div className={`settings-toggle-switch ${sceneState.holo?'on':''}`}/>
        </div>
        <div className="settings-toggle" onClick={()=>window.fridayVibe?.toggleHands()}>
          <span className="settings-toggle-label">Hand Tracking (Minority Report)</span>
          <div className={`settings-toggle-switch ${sceneState.hands?'on':''}`}/>
        </div>
      </div>

      <div className="settings-section">
        <div className="settings-section-title">Dev Mode</div>
        <div className="settings-toggle" onClick={()=>window.fridayVibe?.toggleTimeLapse()}>
          <span className="settings-toggle-label">Timelapse (auto-cycle structures)</span>
          <div className={`settings-toggle-switch ${sceneState.timelapse?'on':''}`}/>
        </div>
      </div>
    </div>

    {/* Quick Draft Popup */}
    {quickDraft&&<div style={{position:'fixed',top:42,right:120,width:360,background:'rgba(6,6,11,0.95)',backdropFilter:'blur(20px)',border:'1px solid rgba(0,212,255,0.12)',borderRadius:12,zIndex:9999,padding:14,boxShadow:'0 8px 32px rgba(0,0,0,0.6)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>QUICK DRAFT</span>
        <button onClick={()=>setQuickDraft(false)} style={{background:'none',border:'none',color:'#555',cursor:'pointer'}}>&#x2715;</button>
      </div>
      <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap'}}>
        {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(qdMode===m.id?'':'btn-magenta')} style={{fontSize:11,padding:'2px 6px'}} onClick={()=>setQdMode(m.id)}>{m.ico} {m.label}</button>)}
      </div>
      <textarea className="input" style={{width:'100%',height:48,resize:'none',fontSize:11,marginBottom:6}} value={qdPrompt} onChange={e=>setQdPrompt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)qdGenerate()}} placeholder="What do you need drafted? (Ctrl+Enter)"/>
      <div style={{display:'flex',gap:4,marginBottom:qdResult?8:0}}>
        <button className="btn" onClick={qdGenerate} disabled={qdLoading} style={{fontSize:11,fontWeight:600}}>{qdLoading?'Generating...':'Generate'}</button>
        {qdResult&&<button className="btn" onClick={qdCopy} style={{fontSize:11}}>{qdCopied?'✓ Copied':'📋 Copy'}</button>}
      </div>
      {qdResult&&<div style={{marginTop:4,maxHeight:180,overflowY:'auto',background:'rgba(255,255,255,0.02)',borderRadius:6,padding:8}}>
        <pre style={{whiteSpace:'pre-wrap',fontSize:11,color:'#ccc',fontFamily:'JetBrains Mono',margin:0,lineHeight:1.5}}>{qdResult}</pre>
      </div>}
    </div>}

    {/* Discord Footer */}
    <div className="discord-footer">
      <a href="https://discord.gg/f2VM6qNk" target="_blank" rel="noopener">discord.gg/f2VM6qNk</a>
    </div>

    {/* Dock — grouped (Life / Work / System) */}
    <div className="dock">
      {DOCK_GROUPS.map((g,gi)=>(<React.Fragment key={g.name}>
        {gi>0&&<div className="dock-sep"/>}
        <div className="dock-group">
          <div className="dock-group-btns">
            {g.items.map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''}`} onClick={()=>toggle(w.id)}>
              <span className="ico"><img src={`assets/icons/${w.id}.svg`} alt={w.label} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='inline'}}/><span style={{display:'none'}}>{w.ico}</span></span><span>{w.label}</span><span className="dot"/>
            </button>)}
          </div>
          <div className="dock-group-label">{g.name}</div>
        </div>
      </React.Fragment>))}
    </div>
    {paletteOpen&&<CommandPalette onClose={()=>setPaletteOpen(false)} onOpenWs={id=>{toggle(id);setPaletteOpen(false)}} openWins={openWins}/>}
  </>);
}

// Mount with error surface so mobile failures are visible instead of a blank dock.
(function mountFriday(){
  try{
    var target=document.getElementById('ui-inner')||document.getElementById('ui-root');
    if(!target){throw new Error('Mount target #ui-inner/#ui-root not found');}
    ReactDOM.createRoot(target).render(<App/>);
  }catch(err){
    console.error('[FRIDAY] React mount failed:',err);
    var host=document.getElementById('ui-inner')||document.getElementById('ui-root')||document.body;
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:rgba(20,0,10,.92);border:1px solid #ff0080;border-radius:10px;padding:12px 14px;color:#ffdbe8;font:12px/1.4 monospace;pointer-events:auto;max-height:45vh;overflow:auto';
    box.innerHTML='<div style="color:#ff5599;font-weight:700;margin-bottom:6px">FRIDAY UI failed to mount</div><pre style="white-space:pre-wrap;margin:0">'+(err&&err.stack?err.stack:String(err))+'</pre>';
    host.appendChild(box);
  }
})();
</script>
</body>
</html>
