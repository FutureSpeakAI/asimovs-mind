<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FRIDAY Desktop — FutureSpeak.AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; cursor: default; }
        canvas { display: block; }
        
        /* --- ETHEREAL HUD OVERLAY --- */
        #hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
            --hud-r: 0; --hud-g: 255; --hud-b: 255;
            --hud-opacity: 0.25;
        }

        /* ELEGANT OPTICAL ARCS */
        .hud-corner {
            position: absolute; width: 6vw; height: 6vw; max-width: 60px; max-height: 60px;
            border: 1px solid rgba(var(--hud-r), var(--hud-g), var(--hud-b), var(--hud-opacity));
            transition: border-color 1s ease, box-shadow 1s ease;
        }
        .top-left { top: 60px; left: 80px; border-right: none; border-bottom: none; border-top-left-radius: 100%; }
        .top-right { top: 60px; right: 80px; border-left: none; border-bottom: none; border-top-right-radius: 100%; }
        .bottom-left { bottom: 60px; left: 80px; border-right: none; border-top: none; border-bottom-left-radius: 100%; }
        .bottom-right { bottom: 60px; right: 80px; border-left: none; border-top: none; border-bottom-right-radius: 100%; }

        .hud-corner .dot {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: rgba(var(--hud-r), var(--hud-g), var(--hud-b), calc(var(--hud-opacity) + 0.4));
            box-shadow: 0 0 10px rgba(var(--hud-r), var(--hud-g), var(--hud-b), 1.0);
        }
        .top-left .dot { top: 25%; left: 25%; }
        .top-right .dot { top: 25%; right: 25%; }
        .bottom-left .dot { bottom: 25%; left: 25%; }
        .bottom-right .dot { bottom: 25%; right: 25%; }

        /* HEADER */
        .hud-header {
            position: absolute; top: 80px; left: 140px; right: 140px;
            display: flex; justify-content: space-between; align-items: flex-start;
            font-family: 'Courier New', Courier, monospace; font-size: 9px;
            color: rgba(var(--hud-r), var(--hud-g), var(--hud-b), calc(var(--hud-opacity) + 0.5));
            letter-spacing: 4px; text-shadow: 0 0 10px rgba(var(--hud-r), var(--hud-g), var(--hud-b), 0.5);
            font-weight: 300; text-transform: uppercase;
        }

        .hud-title-container { display: flex; flex-direction: column; gap: 6px; }
        .hud-main-title { 
            font-size: 13px; color: #fff; letter-spacing: 6px; font-weight: 400; 
            text-decoration: none; pointer-events: auto; cursor: pointer; transition: text-shadow 0.3s;
        }
        .hud-main-title:hover { text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        
        .hud-laws { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .status-dot.green { background: #00ff66; box-shadow: 0 0 10px #00ff66, 0 0 2px #fff inset; }
        .status-dot.red { background: #ff0033; box-shadow: 0 0 10px #ff0033, 0 0 2px #fff inset; }
        .status-dot.yellow { background: #ffcc00; box-shadow: 0 0 10px #ffcc00, 0 0 2px #fff inset; }

        /* Camera indicator: only visible when holo mode active */
        #camera-indicator.holo-active { background: #00ff66; box-shadow: 0 0 8px #00ff66; }

        /* MINORITY REPORT HAND CURSOR */
        #hand-cursor {
            position: fixed; top: -50px; left: -50px; width: 24px; height: 24px;
            border-radius: 50%; border: 4px solid rgba(0, 255, 255, 0.8);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 9999;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), inset 0 0 6px rgba(0, 255, 255, 0.3);
            display: none; opacity: 0; transition: transform 0.1s, border-color 0.2s, opacity 0.3s;
            justify-content: center; align-items: center;
        }
        #hand-cursor.active { display: flex; opacity: 1; }
        #hand-cursor.hidden { opacity: 0; }
        #hand-cursor.pinching { transform: translate(-50%, -50%) scale(0.8); border-color: #fff; box-shadow: 0 0 15px #fff; }
        
        #pinch-progress { position: absolute; top: -5px; left: -5px; width: 34px; height: 34px; transform: rotate(-90deg); opacity: 0; }
        .pinch-circle { fill: none; stroke: #ff00ff; stroke-width: 4; stroke-dasharray: 95; stroke-dashoffset: 95; transition: stroke-dashoffset 0.1s linear; }
        
        .ripple {
            position: fixed; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 9998;
            animation: rippleAnim 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes rippleAnim {
            0% { width: 0px; height: 0px; opacity: 1; border: 4px solid var(--r-color); }
            100% { width: 100px; height: 100px; opacity: 0; border: 1px solid var(--r-color); }
        }

        /* CAMERA TRACKING INDICATOR */
        #camera-indicator {
            position: fixed; bottom: 20px; right: 20px; width: 6px; height: 6px; 
            border-radius: 50%; background: #444; z-index: 200; transition: background 0.3s, box-shadow 0.3s;
        }

        /* --- REACT UI LAYER STYLES --- */

        /* Base button (used by React UI) */
        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.08); color: rgba(255, 255, 255, 0.5);
            padding: 6px 14px; font-size: 10px; cursor: pointer; border-radius: 4px;
            transition: all 0.3s ease; letter-spacing: 1px;
            font-family: 'Inter', sans-serif; pointer-events: auto;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; border-color: rgba(255,255,255,0.2); }
        .btn.active { color: #fff; background: rgba(255, 255, 255, 0.08); border-color: rgba(0,212,255,0.4); }
        .btn-magenta { border-color: rgba(255,0,128,0.2); color: rgba(255,0,128,0.7); }
        .btn-magenta:hover { background: rgba(255,0,128,0.08); color: #ff0080; border-color: rgba(255,0,128,0.4); }

        /* Top bar */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 36px; z-index: 70;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; background: rgba(3,3,8,0.7); backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        /* Model status pills */
        .model-pill {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 2px 8px; border-radius: 10px; font-size: 9px;
            font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5); transition: all 0.3s;
        }
        .model-pill .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .model-pill .dot.active { background: #00ff80; box-shadow: 0 0 6px #00ff80; }
        .model-pill .dot.idle { background: #555; }

        /* Dock */
        .dock {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 70;
            display: flex; justify-content: center; gap: 2px;
            padding: 6px 12px 8px; background: rgba(3,3,8,0.7);
            backdrop-filter: blur(16px); border-top: 1px solid rgba(255,255,255,0.04);
        }
        .dock-btn {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 6px 12px 4px; background: none; border: 1px solid transparent;
            border-radius: 8px; color: rgba(255,255,255,0.35); cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 9px; transition: all 0.25s ease;
            min-width: 56px; position: relative;
        }
        .dock-btn .ico { font-size: 18px; line-height: 1; }
        .dock-btn .dot {
            width: 3px; height: 3px; border-radius: 50%;
            background: transparent; transition: all 0.3s;
        }
        .dock-btn:hover {
            color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.04);
            border-color: rgba(0,212,255,0.15);
            box-shadow: 0 0 12px rgba(0,212,255,0.06), inset 0 0 12px rgba(0,212,255,0.03);
        }
        .dock-btn.active {
            color: #00d4ff; background: rgba(0,212,255,0.06);
            border-color: rgba(0,212,255,0.2);
            box-shadow: 0 0 16px rgba(0,212,255,0.1), inset 0 0 16px rgba(0,212,255,0.04);
        }
        .dock-btn.active .dot { background: #00d4ff; box-shadow: 0 0 6px #00d4ff; }

        /* Floating windows — glassmorphism */
        .fwin {
            position: fixed; display: flex; flex-direction: column;
            background: rgba(6,6,14,0.65); backdrop-filter: blur(14px) saturate(1.2);
            border: 1px solid rgba(0,212,255,0.1); border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 1px rgba(0,212,255,0.2);
            overflow: hidden; transition: box-shadow 0.3s;
        }
        .fwin:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,212,255,0.06); }
        .fwin-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; cursor: grab; user-select: none;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .fwin-bar:active { cursor: grabbing; }
        .fwin-title { font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
        .fwin-btns button {
            background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer;
            font-size: 16px; padding: 0 4px; transition: color 0.2s;
        }
        .fwin-btns button:hover { color: #ff0080; }
        .fwin-body { flex: 1; overflow-y: auto; padding: 12px; }
        .fwin-body::-webkit-scrollbar { width: 4px; }
        .fwin-body::-webkit-scrollbar-track { background: transparent; }
        .fwin-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .resize-h {
            position: absolute; bottom: 0; right: 0; width: 16px; height: 16px;
            cursor: nwse-resize; opacity: 0;
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px; padding: 12px; transition: border-color 0.2s;
        }
        .card:hover { border-color: rgba(255,255,255,0.08); }
        .card-title {
            font-family: 'Orbitron', monospace; font-size: 10px; color: rgba(0,212,255,0.6);
            letter-spacing: 0.08em; margin-bottom: 8px;
        }
        .stat { font-family: 'Orbitron', monospace; font-size: 22px; color: #fff; }
        .stat-label { font-size: 11px; color: #555; margin-top: 2px; }

        /* Badges */
        .badge-green { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; background: rgba(0,255,128,0.1); color: #00ff80; border: 1px solid rgba(0,255,128,0.2); }
        .badge-cyan { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; background: rgba(0,212,255,0.1); color: #00d4ff; border: 1px solid rgba(0,212,255,0.2); }
        .badge-magenta { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; background: rgba(255,0,128,0.1); color: #ff0080; border: 1px solid rgba(255,0,128,0.2); }
        .badge-amber { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }

        /* Progress bars */
        .progress-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

        /* Inputs */
        .input {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px; padding: 7px 10px; color: #ddd; font-size: 12px;
            font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
        }
        .input:focus { border-color: rgba(0,212,255,0.3); }

        /* Chat panel */
        .chat-panel {
            position: fixed; top: 36px; right: -340px; bottom: 44px;
            width: 320px; z-index: 65; display: flex; flex-direction: column;
            background: rgba(6,6,14,0.8); backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255,255,255,0.04);
            transition: right 0.3s ease;
        }
        .chat-panel.open { right: 0; }

        /* Greeting ticker */
        .greeting-ticker {
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
            justify-content: center;
        }
        .greeting-ticker-item {
            display: flex; align-items: baseline; gap: 6px;
            font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.35);
        }
        .greeting-ticker-item .days {
            font-family: 'Orbitron', monospace; font-size: 18px; color: #00d4ff;
            text-shadow: 0 0 12px rgba(0,212,255,0.3);
        }
        .greeting-ticker-sep {
            width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.15);
        }

        /* Settings panel */
        .settings-panel {
            position: fixed; top: 36px; right: -360px; bottom: 44px;
            width: 340px; z-index: 68; display: flex; flex-direction: column;
            background: rgba(6,6,14,0.75); backdrop-filter: blur(18px) saturate(1.2);
            border-left: 1px solid rgba(0,212,255,0.1);
            box-shadow: -4px 0 24px rgba(0,0,0,0.4);
            transition: right 0.35s cubic-bezier(0.2, 0.8, 0.3, 1);
            overflow-y: auto;
        }
        .settings-panel.open { right: 0; }
        .settings-panel::-webkit-scrollbar { width: 4px; }
        .settings-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
        .settings-section {
            padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .settings-section-title {
            font-family: 'Orbitron', monospace; font-size: 9px; color: rgba(0,212,255,0.5);
            letter-spacing: 0.12em; margin-bottom: 10px; text-transform: uppercase;
        }
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
        }
        .settings-btn {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 5px; padding: 6px 8px; color: rgba(255,255,255,0.4);
            font-family: 'JetBrains Mono', monospace; font-size: 9px; cursor: pointer;
            transition: all 0.2s; text-align: left; letter-spacing: 0.03em;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.12); }
        .settings-btn.active { color: #00d4ff; border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.06); box-shadow: 0 0 10px rgba(0,212,255,0.08); }
        .settings-toggle {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; cursor: pointer;
        }
        .settings-toggle-label { font-size: 11px; color: rgba(255,255,255,0.6); font-family: 'Inter', sans-serif; }
        .settings-toggle-switch {
            width: 32px; height: 18px; border-radius: 9px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            position: relative; transition: all 0.25s; cursor: pointer;
        }
        .settings-toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 12px; height: 12px; border-radius: 50%;
            background: rgba(255,255,255,0.3); transition: all 0.25s;
        }
        .settings-toggle-switch.on { background: rgba(0,212,255,0.2); border-color: rgba(0,212,255,0.4); }
        .settings-toggle-switch.on::after { left: 16px; background: #00d4ff; box-shadow: 0 0 6px rgba(0,212,255,0.5); }

        /* Discord footer */
        .discord-footer {
            position: fixed; bottom: 48px; left: 12px; z-index: 55;
            font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 1px;
        }
        .discord-footer a {
            color: rgba(0,255,255,0.4); text-decoration: none;
            border-bottom: 1px solid rgba(0,255,255,0.15); padding-bottom: 1px;
            transition: all 0.3s;
        }
        .discord-footer a:hover { color: #00ffff; border-bottom-color: rgba(0,255,255,0.5); text-shadow: 0 0 8px rgba(0,255,255,0.4); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>

<body>
    <!-- Hand Cursor -->
    <div id="hand-cursor" class="hidden">
        <svg id="pinch-progress">
            <circle class="pinch-circle" cx="17" cy="17" r="15" />
        </svg>
    </div>

    <!-- Parallax Tracker Dot -->
    <div id="camera-indicator"></div>

    <div id="hud-overlay">
        <!-- Minimalist Optical Arcs -->
        <div class="hud-corner top-left"><div class="dot"></div></div>
        <div class="hud-corner top-right"><div class="dot"></div></div>
        <div class="hud-corner bottom-left"><div class="dot"></div></div>
        <div class="hud-corner bottom-right"><div class="dot"></div></div>
        
        <div class="hud-header">
            <div class="hud-title-container">
                <a href="https://futurespeak.ai" target="_blank" class="hud-main-title">FutureSpeak.AI</a>
                <span>AGENT FRIDAY v.2.0.0 // <span id="evolution-day-text">DAY 1: GENESIS LATTICE</span></span>
            </div>
            <div class="hud-laws">
                ASIMOV cLAWS VERIFIED <div class="status-dot green"></div>
            </div>
        </div>

    </div>

    <!-- Friday OS React UI Layer -->
    <div id="ui-root" style="position:fixed;inset:0;z-index:60;pointer-events:none">
        <div id="ui-inner" style="pointer-events:auto;height:100vh"></div>
    </div>
    <div style="position:fixed;bottom:8px;left:12px;z-index:1;font-family:Orbitron,monospace;font-size:10px;color:rgba(124,58,237,0.08);letter-spacing:.1em;pointer-events:none">FutureSpeak.AI</div>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Three.js + Post-Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        // --- UI INTERACTION LOGIC ---

        // Mouse Tracker Fallback
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2.0;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2.0;
        });

        // --- COMPUTER VISION ENGINE (MediaPipe Shared Camera) ---
        let cameraMP = null;
        let videoElement = document.createElement('video');
        videoElement.setAttribute('autoplay', ''); videoElement.setAttribute('playsinline', '');
        
        // Hologram (Face) State
        let isHologramMode = false;
        let faceDetectionMP = null;
        let rawFaceX = 0, rawFaceY = 0, rawFaceZ = 0; 
        let currFaceX = 0, currFaceY = 0, currFaceZ = 0; 
        let isFaceVisible = false;
        let faceLostTimeout = null;

        // Hands State
        let isHandTrackingMode = false;
        let handsMP = null;
        let rawHandX = window.innerWidth/2, rawHandY = window.innerHeight/2;
        let currHandX = window.innerWidth/2, currHandY = window.innerHeight/2;
        let isPinching = false, wasPinching = false;
        let pinchStartTime = 0;
        let rightClickFired = false;
        let handVisible = false;
        const PINCH_HOLD_TIME = 1000; // ms for right click

        async function startSharedCamera() {
            if (!cameraMP) {
                cameraMP = new Camera(videoElement, {
                    onFrame: async () => { 
                        if (isHologramMode && faceDetectionMP) await faceDetectionMP.send({image: videoElement}); 
                        if (isHandTrackingMode && handsMP) await handsMP.send({image: videoElement});
                    },
                    width: 320, height: 240
                });
                await cameraMP.start();
            }
        }

        // --- HAND TRACKING (Minority Report) ---
        async function toggleHands() {
            isHandTrackingMode = !isHandTrackingMode;
            const cursor = document.getElementById('hand-cursor');
            if (isHandTrackingMode) {
                if (cursor) cursor.classList.add('active');
                if (!handsMP) {
                    handsMP = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
                    handsMP.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                    handsMP.onResults(onHandsResults);
                }
                await startSharedCamera();
            } else {
                if (cursor) cursor.classList.remove('active');
            }
        }

        function onHandsResults(results) {
            const cursor = document.getElementById('hand-cursor');

        function setGroupOpacity(group, opacityMultiplier) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData && child.material.userData.baseOpacity !== undefined) {
                    child.material.opacity = child.material.userData.baseOpacity * opacityMultiplier;
                }
            });
        }

        function updateGroupColors(group) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData) {
                    const targetColor = child.material.userData.isAccent || (child.userData && child.userData.isAccent) ? moodLerpValues.accentColor : moodLerpValues.baseColor;
                    
                    if (child === mandelbrotSystem && mandelbrotSystem && mandelbrotSystem.geometry && mandelbrotSystem.geometry.attributes.color) {
                        const colors = child.geometry.attributes.color.array; const mData = child.userData.data;
                        for(let i=0; i<mData.length; i++) {
                            const c = new THREE.Color().copy(moodLerpValues.baseColor).lerp(moodLerpValues.accentColor, mData[i].iterRatio);
                            colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                        }
                        child.geometry.attributes.color.needsUpdate = true;
                    } else if (child.material.userData.isTunnelSolid) {
                        child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.05);
                    } else if (child.material.userData.isBossSphere) {
                        child.material.color.copy(moodLerpValues.baseColor);
                    } else if (child.material.userData.isBossWire) {
                        child.material.color.copy(moodLerpValues.accentColor).multiplyScalar(0.3);
                    } else if (child.material.userData.isPlayerBody) {
                        child.material.color.setHex(0xffffff); 
                    } else if (child.material.color && targetStructure !== 'QUANTUM') {
                        child.material.color.copy(targetColor);
                        if(child.geometry && child.geometry.type === 'BoxGeometry' && !child.material.wireframe && (currentStructure === 'CUBES' || targetStructure === 'CUBES')) {
                            child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.15); 
                        }
                    }
                }
            });
        }

        async function setupAudio() {
            if (audioContext) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
                source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
                micActive = true; lastSoundTime = clock.getElapsedTime(); 
            } catch (err) { console.warn("Using procedural heartbeat."); }
        }

        function onWindowResize() {

            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        }

        function smoothstep(x) { return x * x * (3 - 2 * x); }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); 
            const elapsed = clock.getElapsedTime() * 0.5;

            // --- HAND CURSOR LOGIC (Minority Report) ---
            const cursor = document.getElementById('hand-cursor');
            const pRing = document.querySelector('.pinch-circle');
            if (isHandTrackingMode) {
                currHandX += (rawHandX - currHandX) * 0.25;

                cursor.style.left = `${currHandX}px`; cursor.style.top = `${currHandY}px`;
                
                if (isPinching) {

                    const duration = performance.now() - pinchStartTime;
                    if (duration > 200) {
                        document.getElementById('pinch-progress').style.opacity = 1;
                        const progress = Math.min(1.0, (duration - 200) / PINCH_HOLD_TIME);
                        pRing.style.strokeDashoffset = 95 * (1.0 - progress);
                        if (progress >= 1.0 && !rightClickFired) {

                        }

                } else {
                    if (wasPinching) {

                        cursor.classList.remove('pinching');
                        document.getElementById('pinch-progress').style.opacity = 0; pRing.style.strokeDashoffset = 95;
                        if (duration < 500) {
                            spawnRipple(currHandX, currHandY, '#00ffff');
                            cursor.style.display = 'none'; 
                            let el = document.elementFromPoint(currHandX, currHandY);
                            cursor.style.display = 'flex';
                            if (el && typeof el.click === 'function') el.click();
                        }
                    }
                }
                wasPinching = isPinching;
            }

            // --- STABILIZED TRUE 3D HOLOGRAPHIC PARALLAX OFFSET ---
            if (isHologramMode && isFaceVisible) {
                currFaceX += (rawFaceX - currFaceX) * 0.08; 
                currFaceY += (rawFaceY - currFaceY) * 0.08;
                currFaceZ += (rawFaceZ - currFaceZ) * 0.05; 
            } else {
                currFaceX += (mouseX - currFaceX) * 0.04; 
                currFaceY += (mouseY - currFaceY) * 0.04; 
                currFaceZ += (0 - currFaceZ) * 0.04;
            }

            // --- TIME LAPSE LOGIC ---
            if (timeLapseActive) {
                timeLapseTimer += delta;
                if (timeLapseTimer > 10.0) { timeLapseTimer = 0; setEvolution((currentEvolutionIdx + 1) % EVOLUTION_PATH.length); }
            }

            if (metamorphosisFlash > 0) metamorphosisFlash = Math.max(0, metamorphosisFlash - delta * 0.3);

            // --- AUDIO PROCESSING ---
            const heartbeat = (Math.sin(elapsed * Math.PI) + 1) / 2;
            if (micActive && analyser && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let low = 0, mid = 0, high = 0;
                for(let i=0; i<8; i++) low += dataArray[i]; for(let i=8; i<40; i++) mid += dataArray[i]; for(let i=40; i<100; i++) high += dataArray[i];
                audioData.low = (low / 8 / 255) + (heartbeat * 0.05); audioData.mid = mid / 32 / 255; audioData.high = high / 60 / 255;
                audioData.total = (audioData.low + audioData.mid + audioData.high) / 3;
                if (audioData.total > 0.02) lastSoundTime = elapsed;
            } else {
                audioData.low = heartbeat * 0.15; audioData.mid = heartbeat * 0.05; audioData.high = 0; audioData.total = audioData.low;
            }

            const isQuiet = (elapsed - lastSoundTime > 6.0);
            const targetIdle = isQuiet ? 0.2 : 1.0;
            idleFactor = THREE.MathUtils.lerp(idleFactor, targetIdle, delta * (isQuiet ? 0.3 : 2.0));

            // --- MOOD LERPING ---
            const moodLerp = delta * 0.5; const tMood = MOODS[currentMood];
            if(tMood) {
                moodLerpValues.baseColor.lerp(new THREE.Color(tMood.baseColor), moodLerp);
                moodLerpValues.accentColor.lerp(new THREE.Color(tMood.accentColor), moodLerp);
                moodLerpValues.rotationSpeed = THREE.MathUtils.lerp(moodLerpValues.rotationSpeed, tMood.rotationSpeed, moodLerp);
                moodLerpValues.bloomStrength = THREE.MathUtils.lerp(moodLerpValues.bloomStrength, tMood.bloomStrength, moodLerp);
                moodLerpValues.particleSpeedScale = THREE.MathUtils.lerp(moodLerpValues.particleSpeedScale, tMood.particleSpeedScale, moodLerp);

                hudEl.style.setProperty('--hud-b', Math.floor(moodLerpValues.baseColor.b * 255));
                hudEl.style.setProperty('--hud-opacity', Math.min(0.8, 0.2 + (audioData.total * 1.5) + (metamorphosisFlash * 0.5)));
                hudEl.style.transform = `perspective(1000px) rotateY(${currFaceX * -2}deg) rotateX(${currFaceY * 2}deg) translateZ(0px)`;
            }


            nebulaClouds.forEach(cloud => {
                if(cloud && cloud.material && cloud.userData && cloud.rotation) {
                    const targetColor = cloud.userData.isAccent ? moodLerpValues.accentColor : moodLerpValues.baseColor;
                    cloud.material.color.copy(targetColor);
                    cloud.material.opacity = 0.03 + audioData.low * 0.05 + (metamorphosisFlash * 0.1);
                    cloud.rotation.z += cloud.userData.speed;
                    cloud.position.z += delta * 0.5; if(cloud.position.z > 0) cloud.position.z = -100;
                }
            });

            // --- STRUCTURE TRANSITIONS ---
            if (transitionProgress < 1.0) transitionProgress = Math.min(1.0, transitionProgress + delta * 0.125);
            const ease = smoothstep(transitionProgress); 
            const scatterIntensity = Math.sin(transitionProgress * Math.PI) + (metamorphosisFlash * 1.5); 

            Object.keys(structures).forEach(key => {
                const g = structures[key];
                if(g) {
                    updateGroupColors(g);
                    if (key === targetStructure) { g.visible = true; setGroupOpacity(g, ease); g.scale.setScalar(1.2 - ease * 0.2); }
                    else if (key === currentStructure && transitionProgress < 1.0) { setGroupOpacity(g, 1 - ease); g.scale.setScalar(1.0 + ease * 0.5); }
                    else g.visible = false;

            if (transitionProgress >= 1.0 && currentStructure !== targetStructure) currentStructure = targetStructure;

            // --- CINEMATIC TRUE-3D CAMERA PARALLAX ---
            if(camera) {
                if (targetStructure === 'DOME') { targetCamPos.set(0, -6 + Math.sin(elapsed*0.2)*2, 18); targetCamLook.set(0, 5, 0); } 
                else if (targetStructure === 'GRID') { targetCamPos.set(0, 2 + Math.sin(elapsed*0.2)*1, 15 - (elapsed*2) % 10); targetCamLook.set(0, 1, 0); } 
                else if (targetStructure === 'CABLES' || targetStructure === 'ASTROLABE') { targetCamPos.set(Math.sin(elapsed*0.1)*12, Math.cos(elapsed*0.1)*12, 15 + Math.sin(elapsed*0.2)*5); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'MANDELBROT') { targetCamPos.set(Math.sin(elapsed*0.2)*14, 8 + Math.sin(elapsed*0.3)*3, Math.cos(elapsed*0.2)*14); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'NETWORK') { targetCamPos.set(Math.sin(elapsed*0.2)*10, Math.sin(elapsed*0.3)*6, Math.cos(elapsed*0.2)*10); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'EDEN') { targetCamPos.set(Math.sin(elapsed*0.5)*2, Math.cos(elapsed*0.3)*1.5, 28); targetCamLook.set(0, 0, 0); } 
                else { targetCamPos.set(Math.sin(elapsed*0.15)*6, 5 + Math.cos(elapsed*0.2)*2, 18 + Math.sin(elapsed*0.1)*3); targetCamLook.set(0, 0, 0); }

                baseCamPos.lerp(targetCamPos, delta * 0.8);

                const parallaxX = currFaceX * 5.0; 
                const parallaxY = currFaceY * -5.0; 
                const parallaxZ = currFaceZ * -8.0; 

                camera.position.x = baseCamPos.x + parallaxX;
                camera.position.y = baseCamPos.y + parallaxY;
                camera.position.z = baseCamPos.z + parallaxZ;

                const lookTarget = targetCamLook.clone();
                lookTarget.x += parallaxX * 0.15; 
                lookTarget.y += parallaxY * 0.15;

                const currentLook = new THREE.Vector3(); camera.getWorldDirection(currentLook);
                const idealLook = lookTarget.sub(camera.position).normalize();
                currentLook.lerp(idealLook, delta * 2.0); 
                camera.lookAt(camera.position.clone().add(currentLook));
            }

            // --- ANIMATE ACTIVE STRUCTURES ---
            const activeGroup = structures[targetStructure];
            const interactionForce = Math.min(1.0, Math.abs(currFaceX) + Math.abs(currFaceY) + Math.abs(currFaceZ)); 
            
            if (activeGroup && activeGroup.rotation && !['GRID','MANDELBROT','TESSERACT','NETWORK','EDEN'].includes(targetStructure)) {
                activeGroup.rotation.y += moodLerpValues.rotationSpeed * idleFactor;
                if (targetStructure !== 'DOME') activeGroup.rotation.z += moodLerpValues.rotationSpeed * 0.5 * idleFactor;
            }

            if (structures['CUBES'] && structures['CUBES'].visible && coreCubes.length > 0) {
                coreCubes.forEach(c => {
                    if (c && c.rotation && c.position && c.userData) {
                        c.rotation.x += 0.01 * c.userData.speed * idleFactor; c.rotation.y += 0.012 * c.userData.speed * idleFactor;
                        const organicBreathe = Math.sin(elapsed * 2.0 * c.userData.speed + c.userData.rx) * 0.15;

                            c.userData.baseX + c.userData.dir.x * expansion, 
                            c.userData.baseY + c.userData.dir.y * expansion, 
                            c.userData.baseZ + c.userData.dir.z * expansion
                        );
                    }
                });
            }

            if (structures['DOME'] && structures['DOME'].visible) {
                if(abyssParticles && abyssParticles.rotation && abyssParticles.scale) {
                    abyssParticles.rotation.y -= 0.005 * idleFactor;
                    abyssParticles.scale.setScalar(1.0 + audioData.low * 0.3 * idleFactor);

                cathedralRings.forEach((c, i) => {
                    if(c && c.rotation && c.scale) {

            }

            if (structures['GRID'] && structures['GRID'].visible && gridOcean && gridOcean.geometry && gridOcean.geometry.attributes.position && gridOcean.userData) {

                for(let i=0; i<gridOcean.geometry.attributes.position.count; i++) {
                    positions[i*3+1] = baseYs[i] + Math.sin(positions[i*3] * 0.1 + elapsed) * 0.8 + Math.cos(positions[i*3+2] * 0.1 - elapsed * 1.2) * 0.8 + Math.sin(positions[i*3]*0.3 + positions[i*3+2]*0.3) * (audioData.low * 3.0 * idleFactor);
                }
                gridOcean.geometry.attributes.position.needsUpdate = true;
            }

            if (structures['MANDELBROT'] && structures['MANDELBROT'].visible && mandelbrotSystem && mandelbrotSystem.rotation && mandelbrotSystem.geometry && mandelbrotSystem.geometry.attributes.position && mandelbrotSystem.userData) {
                mandelbrotSystem.rotation.y = elapsed * 0.05;
                const positions = mandelbrotSystem.geometry.attributes.position.array; const mData = mandelbrotSystem.userData.data;
                const colors = mandelbrotSystem.geometry.attributes.color.array;
                for(let i=0; i<mData.length; i++) {
                    const wave = Math.sin(mData[i].baseX*0.5 + elapsed) * Math.cos(mData[i].baseZ*0.5 + elapsed) * (audioData.low * 3.0);
                    positions[i*3+1] = mData[i].baseY + (audioData.low * 4.0 * mData[i].iterRatio * idleFactor) + wave;
                    const c = new THREE.Color().copy(moodLerpValues.baseColor).lerp(moodLerpValues.accentColor, mData[i].iterRatio + audioData.mid);
                    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                }
                mandelbrotSystem.geometry.attributes.position.needsUpdate = true;
                mandelbrotSystem.geometry.attributes.color.needsUpdate = true;
            }

            if (structures['ASTROLABE'] && structures['ASTROLABE'].visible && astrolabeRings.length > 0) {
                astrolabeRings.forEach((ring, i) => {
                    if (ring && ring.rotation && ring.userData) {
                        ring.rotation.x += ring.userData.rxSpeed * (1 + audioData.mid*3);
                        ring.rotation.y += ring.userData.rySpeed * (1 + audioData.mid*3);
                    }
                });
            }

            if (structures['TESSERACT'] && structures['TESSERACT'].visible && tesseractLines && tesseractLines.userData && tesseractLines.geometry && tesseractLines.geometry.attributes.position) {
                const tessGroup = structures['TESSERACT'];
                if (tessGroup && tessGroup.children.length > 1) {
                    const tessNodes = tessGroup.children[1];
                    tesseractLines.userData.angleXW += (0.5 + audioData.low * 3.0) * delta * idleFactor;

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>SETTINGS</span>
        <button onClick={()=>setSettingsOpen(false)} style={{background:'none',border:'none',color:'#555',cursor:'pointer'}}>&#x2715;</button>
      </div>

      <div className="settings-section">
        <div className="settings-section-title">Evolution Structure</div>
        <div className="settings-grid">
          {(structures.length>0?structures:Array.from({length:13},(_,i)=>({name:'DAY '+(i+1)}))).map((s,i)=>
            <button key={i} className={`settings-btn ${sceneState.structIdx===i?'active':''}`}
              onClick={()=>window.fridayVibe?.setStructure(i)}>
              <span style={{opacity:0.5,marginRight:4}}>D{i+1}</span> {s.name}
            </button>
          )}
        </div>
      </div>

      <div className="settings-section">
        <div className="settings-section-title">Mood</div>
        <div className="settings-grid">
          {moods.map(m=>
            <button key={m} className={`settings-btn ${sceneState.mood===m?'active':''}`}
              onClick={()=>window.fridayVibe?.setMood(m)}>{m}</button>
          )}
        </div>
      </div>

      <div className="settings-section">
        <div className="settings-section-title">Consciousness</div>
        <div className="settings-toggle" onClick={()=>window.fridayVibe?.toggleHologram()}>
          <span className="settings-toggle-label">Hologram Mode (face tracking)</span>
          <div className={`settings-toggle-switch ${sceneState.holo?'on':''}`}/>
        </div>
        <div className="settings-toggle" onClick={()=>window.fridayVibe?.toggleHands()}>
          <span className="settings-toggle-label">Hand Tracking (Minority Report)</span>
          <div className={`settings-toggle-switch ${sceneState.hands?'on':''}`}/>
        </div>
      </div>

      <div className="settings-section">
        <div className="settings-section-title">Dev Mode</div>
        <div className="settings-toggle" onClick={()=>window.fridayVibe?.toggleTimeLapse()}>
          <span className="settings-toggle-label">Timelapse (auto-cycle structures)</span>
          <div className={`settings-toggle-switch ${sceneState.timelapse?'on':''}`}/>
        </div>
      </div>
    </div>

    {/* Discord Footer */}
    <div className="discord-footer">
      <a href="https://discord.gg/f2VM6qNk" target="_blank" rel="noopener">discord.gg/f2VM6qNk</a>
    </div>

    {/* Dock */}
    <div className="dock">
      {WS.map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''}`} onClick={()=>toggle(w.id)}>
        <span className="ico">{w.ico}</span><span>{w.label}</span><span className="dot"/>
      </button>)}
    </div>
  </>);
}
ReactDOM.createRoot(document.getElementById('ui-inner')||document.getElementById('ui-root')).render(<App/>);
</script>
</body>
</html>
